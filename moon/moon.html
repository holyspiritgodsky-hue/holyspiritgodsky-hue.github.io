<!doctype html>
<html lang="zh-CN">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Moon Pilot - Solar Physics Prototype</title>
	<style>
		:root {
			--bg-1: #02040c;
			--bg-2: #0b1528;
			--accent: #ffd166;
			--accent-2: #71c7ec;
			--text: #eef4ff;
			--danger: #ff6b6b;
			--ok: #80ed99;
		}

		* {
			box-sizing: border-box;
		}

		html,
		body {
			margin: 0;
			width: 100%;
			height: 100%;
			overflow: hidden;
			background:
				radial-gradient(circle at 20% 20%, rgba(113, 199, 236, 0.2), transparent 40%),
				radial-gradient(circle at 80% 30%, rgba(255, 209, 102, 0.2), transparent 42%),
				linear-gradient(145deg, var(--bg-2), var(--bg-1));
			color: var(--text);
			font-family: "Trebuchet MS", "Segoe UI", sans-serif;
		}

		#app {
			position: fixed;
			inset: 0;
		}

		#ui {
			position: fixed;
			top: 14px;
			left: 14px;
			z-index: 10;
			width: min(360px, calc(100vw - 28px));
			background: rgba(5, 9, 19, 0.55);
			border: 1px solid rgba(255, 255, 255, 0.2);
			border-radius: 14px;
			padding: 12px 14px;
			backdrop-filter: blur(6px);
			box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
			animation: panel-in 600ms ease-out;
		}

		#topBar {
			display: flex;
			align-items: center;
			justify-content: space-between;
			gap: 10px;
		}

		#helpToggle,
		#pauseButton {
			appearance: none;
			border: 1px solid rgba(255, 255, 255, 0.18);
			background: rgba(255, 255, 255, 0.08);
			color: var(--text);
			border-radius: 999px;
			padding: 8px 12px;
			font-size: 12px;
			line-height: 1;
			cursor: pointer;
		}

		#helpToggle {
			flex: 0 0 auto;
		}

		#actionButtons {
			position: fixed;
			top: 14px;
			right: 14px;
			z-index: 16;
			display: flex;
			gap: 8px;
		}

		#pauseButton,
		#earthLinkButton {
			display: inline-flex;
			align-items: center;
			justify-content: center;
			min-width: 64px;
			backdrop-filter: blur(6px);
			background: rgba(5, 9, 19, 0.7);
			box-shadow: 0 10px 30px rgba(0, 0, 0, 0.28);
			text-decoration: none;
		}

		#earthLinkButton {
			background: linear-gradient(135deg, #ffd166, #ff9f1c);
			border-color: rgba(255, 245, 214, 0.95);
			color: #1b1b1b;
			font-weight: 800;
			text-shadow: none;
			box-shadow: 0 10px 30px rgba(255, 160, 28, 0.35), 0 0 0 1px rgba(0, 0, 0, 0.2) inset;
		}

		#earthLinkButton:hover {
			filter: brightness(1.05);
		}

		#brief {
			margin-top: 8px;
			font-size: 13px;
			line-height: 1.4;
			opacity: 0.95;
		}

		#helpPanel {
			margin-top: 8px;
		}

		#ui.compact #helpPanel {
			display: none;
		}

		h1 {
			margin: 0 0 8px;
			font-size: 17px;
			letter-spacing: 0.4px;
		}

		p,
		li {
			margin: 0;
			font-size: 13px;
			line-height: 1.4;
			opacity: 0.95;
		}

		ul {
			margin: 8px 0 0;
			padding-left: 18px;
		}

		#status {
			margin-top: 10px;
			font-size: 13px;
			color: var(--accent);
			font-weight: 700;
			min-height: 18px;
		}

		#hud {
			margin-top: 8px;
			display: grid;
			gap: 4px;
			font-size: 12px;
			color: rgba(238, 244, 255, 0.9);
		}

		#earthHpBar {
			width: 100%;
			height: 8px;
			border-radius: 999px;
			overflow: hidden;
			background: rgba(255, 255, 255, 0.2);
			margin-top: 2px;
		}

		#earthHpBar.hit {
			box-shadow: 0 0 10px rgba(255, 120, 120, 0.95);
		}

		#pauseOverlay {
			display: none;
			position: fixed;
			inset: 0;
			z-index: 20;
			background: rgba(2, 4, 12, 0.72);
			align-items: center;
			justify-content: center;
			flex-direction: column;
			gap: 10px;
		}
		#pauseOverlay.active {
			display: flex;
		}
		#pauseOverlay span {
			font-size: 36px;
			font-weight: 700;
			letter-spacing: 2px;
			color: var(--accent);
			text-shadow: 0 0 18px rgba(255, 209, 102, 0.6);
		}
		#pauseOverlay small {
			font-size: 14px;
			color: rgba(238, 244, 255, 0.65);
		}

		#earthHpFill {
			display: block;
			height: 100%;
			width: 100%;
			background: linear-gradient(90deg, #80ed99, #ffd166);
			transition: width 90ms linear;
		}

		#crosshair {
			position: fixed;
			left: 50%;
			top: 50%;
			transform: translate(-50%, -50%);
			display: none;
			width: 26px;
			height: 26px;
			border-radius: 50%;
			border: 1px solid rgba(255, 255, 255, 0.35);
			pointer-events: none;
			z-index: 5;
		}

		#crosshair::before,
		#crosshair::after {
			content: "";
			position: absolute;
			left: 50%;
			top: 50%;
			transform: translate(-50%, -50%);
			background: rgba(255, 255, 255, 0.4);
		}

		#crosshair::before {
			width: 10px;
			height: 1px;
		}

		#crosshair::after {
			width: 1px;
			height: 10px;
		}

		@keyframes panel-in {
			from {
				opacity: 0;
				transform: translateY(-8px);
			}
			to {
				opacity: 1;
				transform: translateY(0);
			}
		}

		@media (max-width: 680px) {
			#ui {
				top: 10px;
				left: 10px;
				width: min(250px, calc(100vw - 88px));
				padding: 10px 12px;
				font-size: 12px;
			}

			h1 {
				font-size: 15px;
				margin: 0;
			}

			#brief,
			#status {
				font-size: 12px;
			}

			#hud {
				gap: 3px;
				font-size: 11px;
			}

			#actionButtons {
				top: 10px;
				right: 10px;
				gap: 6px;
			}

			#pauseButton,
			#earthLinkButton {
				padding: 10px 12px;
				min-width: 58px;
			}

			#pauseOverlay span {
				font-size: 28px;
			}
		}
	</style>
</head>
<body>
	<div id="app"></div>
	<div id="crosshair"></div>
	<div id="actionButtons">
		<button id="pauseButton" type="button">暂停</button>
		<a id="earthLinkButton" href="https://gameart.top/time" target="_blank" rel="noreferrer">回到地球</a>
	</div>
	<div id="pauseOverlay"><span>⏸ 已暂停</span></div>
	<section id="ui" class="compact">
		<div id="topBar">
			<h1>Crazy Moon</h1>
			<button id="helpToggle" type="button">展开说明</button>
		</div>
		<p id="brief">目标: 控制月球并撞击行星。</p>
		<div id="helpPanel">
		<ul>
			<li>移动: W / A / S / D 或方向键</li>
			<li>升降: Q / E</li>
			<li>冲刺推进: Shift</li>
			<li>重置月球: R</li>
		</ul>
		</div>
		<div id="status">任务: 撞击地球 (距离 &lt; 6)</div>
		<div id="hud">
			<div id="speed">速度: 0.00</div>
			<div id="distance">目标距离: 0.00</div>
			<div id="score">完成进度: 0 / 3</div>
			<div id="earthHpLabel">地球耐久: 100%</div>
			<div id="earthHpBar"><span id="earthHpFill"></span></div>
		</div>
	</section>

	<script src="https://cdn.jsdelivr.net/npm/three@0.149.0/build/three.min.js"></script>
	<script>
		(function () {
			var app = document.getElementById("app");
			var statusEl = document.getElementById("status");
			var speedEl = document.getElementById("speed");
			var distanceEl = document.getElementById("distance");
			var scoreEl = document.getElementById("score");
			var earthHpLabelEl = document.getElementById("earthHpLabel");
			var earthHpBarEl = document.getElementById("earthHpBar");
			var earthHpFillEl = document.getElementById("earthHpFill");
			var crosshair = document.getElementById("crosshair");
			var uiEl = document.getElementById("ui");
			var helpToggleEl = document.getElementById("helpToggle");
			var pauseButtonEl = document.getElementById("pauseButton");
			var pauseOverlay = document.getElementById("pauseOverlay");
			var paused = false;
			var helpExpanded = false;
			var mouseControl = { active: false, nx: 0, nz: 0 };

			function fail(message) {
				statusEl.textContent = message;
				statusEl.style.color = "var(--danger)";
				crosshair.style.display = "none";
			}

			function setHelpExpanded(expanded) {
				helpExpanded = expanded;
				uiEl.classList.toggle("compact", !expanded);
				helpToggleEl.textContent = expanded ? "收起说明" : "展开说明";
			}

			function setPaused(nextPaused) {
				paused = nextPaused;
				pauseOverlay.classList.toggle("active", paused);
				pauseButtonEl.textContent = paused ? "继续" : "暂停";
				if (paused) {
					keys = {};
					keyCodes = {};
					mouseControl.active = false;
					mouseControl.nx = 0;
					mouseControl.nz = 0;
				} else {
					clock.getDelta();
				}
			}

			function hasWebGL() {
				try {
					var canvas = document.createElement("canvas");
					return !!(window.WebGLRenderingContext && (canvas.getContext("webgl") || canvas.getContext("experimental-webgl")));
				} catch (e) {
					return false;
				}
			}

			if (!window.THREE) {
				fail("Three.js 加载失败: 请联网后刷新，或改用本地服务器打开。");
				return;
			}
			if (!hasWebGL()) {
				fail("当前浏览器不支持 WebGL，无法渲染 3D 画面。");
				return;
			}

			try {
				var renderer = new THREE.WebGLRenderer({ antialias: true });
				renderer.setSize(window.innerWidth, window.innerHeight);
				renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
				renderer.outputEncoding = THREE.sRGBEncoding;
				renderer.setClearColor(0x02040c, 1);
				app.appendChild(renderer.domElement);
crosshair.style.display = "none";

				var scene = new THREE.Scene();
				// 不加雾，避免遮住星星

				var camera = new THREE.PerspectiveCamera(62, window.innerWidth / window.innerHeight, 0.1, 2000);
				camera.position.set(0, 24, 42);
				var camOffset = new THREE.Vector3(0, 28, 55);
				var camTarget = new THREE.Vector3();
				var camDesiredPos = new THREE.Vector3();
				var camForward = new THREE.Vector3();
				var camRight = new THREE.Vector3();
				var worldMove = new THREE.Vector3();

				scene.add(new THREE.AmbientLight(0x8cabff, 0.5));
				var sunLight = new THREE.PointLight(0xfff2cc, 2.6, 900, 1.6);
				scene.add(sunLight);

				var stars = new THREE.BufferGeometry();
				var starCount = 2500;
				var starPositions = new Float32Array(starCount * 3);
				for (var i = 0; i < starCount; i += 1) {
					var r = 120 + Math.random() * 180;
					var theta = Math.random() * Math.PI * 2;
					var phi = Math.acos(2 * Math.random() - 1);
					starPositions[i * 3] = r * Math.sin(phi) * Math.cos(theta);
					starPositions[i * 3 + 1] = r * Math.cos(phi);
					starPositions[i * 3 + 2] = r * Math.sin(phi) * Math.sin(theta);
				}
				stars.setAttribute("position", new THREE.BufferAttribute(starPositions, 3));
				scene.add(new THREE.Points(stars, new THREE.PointsMaterial({ color: 0xaabbd4, size: 0.9, sizeAttenuation: true, transparent: true, opacity: 0.6 })));

				var sphereGeo = new THREE.SphereGeometry(1, 40, 40);

				function makePlanet(opts) {
					var mat = new THREE.MeshStandardMaterial({
						color: opts.color,
						roughness: opts.roughness !== undefined ? opts.roughness : 0.9,
						metalness: opts.metalness !== undefined ? opts.metalness : 0.08,
						emissive: opts.emissive || 0x000000,
						emissiveIntensity: opts.emissiveIntensity || 0,
					});
					var mesh = new THREE.Mesh(sphereGeo, mat);
					mesh.scale.setScalar(opts.radius);
					scene.add(mesh);

					if (opts.ring) {
						var ringGeo = new THREE.RingGeometry(opts.ring.inner, opts.ring.outer, 72);
						var ringMat = new THREE.MeshBasicMaterial({
							color: opts.ring.color,
							side: THREE.DoubleSide,
							transparent: true,
							opacity: opts.ring.opacity,
						});
						var ringMesh = new THREE.Mesh(ringGeo, ringMat);
						ringMesh.rotation.x = Math.PI / 2.25;
						mesh.add(ringMesh);
					}

					return {
						name: opts.name,
						mesh: mesh,
						orbitRadius: opts.orbitRadius,
						orbitSpeed: opts.orbitSpeed,
						phase: opts.phase,
						mass: opts.mass,
						affectGravity: opts.affectGravity !== false,
						radius: opts.radius,
						position: new THREE.Vector3(),
					};
				}

				var bodies = [
					makePlanet({ name: "太阳", radius: 11, color: 0xffd166, orbitRadius: 0, orbitSpeed: 0, phase: 0, mass: 3000, emissive: 0xffa94d, emissiveIntensity: 0.9 }),
					makePlanet({ name: "水星", radius: 0.55, color: 0xb8b8b8, orbitRadius: 17, orbitSpeed: 0, phase: 0.3, mass: 95, affectGravity: false }),
					makePlanet({ name: "金星", radius: 0.95, color: 0xd7b47f, orbitRadius: 21, orbitSpeed: 0, phase: 2.1, mass: 220, affectGravity: false }),
					makePlanet({ name: "地球", radius: 2.1, color: 0x1a6faa, orbitRadius: 23, orbitSpeed: 0, phase: 0.8, mass: 300, roughness: 0.55, metalness: 0.2 }),
					makePlanet({ name: "火星", radius: 1.6, color: 0xe76f51, orbitRadius: 36, orbitSpeed: 0, phase: 2.5, mass: 180 }),
					makePlanet({
						name: "木星",
						radius: 3.8,
						color: 0xf4a261,
						orbitRadius: 49,
						orbitSpeed: 0,
						phase: 1.6,
						mass: 720,
					}),
					makePlanet({
						name: "土星",
						radius: 3.3,
						color: 0xdab678,
						orbitRadius: 62,
						orbitSpeed: 0,
						phase: 2.8,
						mass: 540,
						ring: { inner: 3.9, outer: 5.0, color: 0xffecd1, opacity: 0.32 },
					}),
					makePlanet({
						name: "天王星",
						radius: 0.78,
						color: 0x9ed9e8,
						orbitRadius: 72,
						orbitSpeed: 0,
						phase: 5.0,
						mass: 410,
						affectGravity: false,
					}),
					makePlanet({
						name: "海王星",
						radius: 2.5,
						color: 0x5a7dff,
						orbitRadius: 82,
						orbitSpeed: 0,
						phase: 4.0,
						mass: 430,
					}),
					makePlanet({
						name: "冥王星",
						radius: 0.38,
						color: 0xcdbfae,
						orbitRadius: 93,
						orbitSpeed: 0,
						phase: 5.7,
						mass: 20,
						affectGravity: false,
					}),
				];
				var earthBody = bodies.find(function (b) { return b.name === "地球"; });
				var marsBody = bodies.find(function (b) { return b.name === "火星"; });
				var jupiterBody = bodies.find(function (b) { return b.name === "木星"; });
				// 地球贴图
				var earthTexLoader = new THREE.TextureLoader();
				earthTexLoader.load("earth.jpg", function (tex) {
					tex.encoding = THREE.sRGBEncoding;
					earthBody.mesh.material.map = tex;
					earthBody.mesh.material.color.set(0xffffff);
					earthBody.mesh.material.roughness = 0.75;
					earthBody.mesh.material.metalness = 0.05;
					earthBody.mesh.material.needsUpdate = true;
				});
				// 地球大气层光晕
				var earthAtmosphere = new THREE.Mesh(
					new THREE.SphereGeometry(1, 32, 32),
					new THREE.MeshBasicMaterial({
						color: 0x4ea8e8,
						transparent: true,
						opacity: 0.14,
						side: THREE.BackSide,
						depthWrite: false,
					})
				);
				earthAtmosphere.scale.setScalar(1.22);
				earthBody.mesh.add(earthAtmosphere);
				var earthState = { hp: 100, maxHp: 100 };
				var earthCollisionLatch = false;
				var extraCollisionLatch = {
					"火星": false,
					"木星": false,
				};
				var earthHitUiTimer = 0;
				var hitHintTimer = 0;
				var hitHintText = "";

				var impactFlash = new THREE.Mesh(
					new THREE.SphereGeometry(1, 20, 20),
					new THREE.MeshBasicMaterial({
						color: 0xffa86b,
						transparent: true,
						opacity: 0,
						depthWrite: false,
						blending: THREE.AdditiveBlending,
					})
				);
				impactFlash.visible = false;
				scene.add(impactFlash);
				var impactFlashLife = 0;

				var moon = new THREE.Mesh(
					new THREE.IcosahedronGeometry(1.15, 4),
					new THREE.MeshStandardMaterial({ color: 0xdde1e6, roughness: 0.85, metalness: 0.05, emissive: 0x111111, emissiveIntensity: 0.15 })
				);
				scene.add(moon);

				var trailLen = 160;
				var trailPos = new Float32Array(trailLen * 3);
				var moonTrailGeo = new THREE.BufferGeometry();
				moonTrailGeo.setAttribute("position", new THREE.BufferAttribute(trailPos, 3));
				var moonTrail = new THREE.Line(moonTrailGeo, new THREE.LineBasicMaterial({ color: 0xb6ccfe, transparent: true, opacity: 0.62 }));
				scene.add(moonTrail);

				var moonState = {
					position: new THREE.Vector3(24, 0, 0),
					velocity: new THREE.Vector3(0, 0, 12),
					acceleration: new THREE.Vector3(),
					baseThrust: 120,
					boostThrust: 240,
					damping: 0.990,
					maxSpeed: 120,
				};

				function resetMoon() {
					moonState.position.set(24, 0, 0);
					moonState.velocity.set(0, 0, 12);
					moonState.acceleration.set(0, 0, 0);
					earthState.hp = earthState.maxHp;
					earthHpLabelEl.textContent = "地球耐久: 100%";
					earthHpFillEl.style.width = "100%";
					earthHpFillEl.style.background = "linear-gradient(90deg, #80ed99, #ffd166)";
					earthHpBarEl.classList.remove("hit");
					earthCollisionLatch = false;
					extraCollisionLatch["火星"] = false;
					extraCollisionLatch["木星"] = false;
					earthHitUiTimer = 0;
					hitHintTimer = 0;
					hitHintText = "";
					impactFlash.visible = false;
					impactFlashLife = 0;
					for (var j = 0; j < trailLen; j += 1) {
						trailPos[j * 3] = moonState.position.x;
						trailPos[j * 3 + 1] = moonState.position.y;
						trailPos[j * 3 + 2] = moonState.position.z;
					}
					moonTrailGeo.attributes.position.needsUpdate = true;
				}
				resetMoon();

				var keys = {};
				var keyCodes = {};
				var codeMap = {
					KeyW: "w",
					KeyA: "a",
					KeyS: "s",
					KeyD: "d",
					KeyQ: "q",
					KeyE: "e",
					ArrowUp: "arrowup",
					ArrowDown: "arrowdown",
					ArrowLeft: "arrowleft",
					ArrowRight: "arrowright",
					ShiftLeft: "shift",
					ShiftRight: "shift",
					KeyR: "r",
					KeyP: "p",
					Space: "space",
				};
				var blockedKeys = {
					w: true,
					a: true,
					s: true,
					d: true,
					q: true,
					e: true,
					arrowup: true,
					arrowdown: true,
					arrowleft: true,
					arrowright: true,
					shift: true,
					r: true,
					p: true,
					space: true,
				};
				window.addEventListener("keydown", function (ev) {
					var key = ev.key.toLowerCase();
					var code = ev.code;
					if (codeMap[code]) {
						key = codeMap[code];
						keyCodes[code] = true;
					}
					if (blockedKeys[key]) ev.preventDefault();
					keys[key] = true;
					if (key === "r") {
						resetMoon();
						mission.stage = 0;
						mission.completed = false;
					}
					if (key === "p" || key === "space") {
						setPaused(!paused);
					}
				}, { passive: false });
				helpToggleEl.addEventListener("click", function () {
					setHelpExpanded(!helpExpanded);
				});
				pauseButtonEl.addEventListener("click", function () {
					setPaused(!paused);
				});
				window.addEventListener("blur", function () {
					keys = {};
					keyCodes = {};
					mouseControl.active = false;
					mouseControl.nx = 0;
					mouseControl.nz = 0;
				});
				window.addEventListener("keyup", function (ev) {
					var key = ev.key.toLowerCase();
					var code = ev.code;
					if (codeMap[code]) {
						key = codeMap[code];
						keyCodes[code] = false;
					}
					if (blockedKeys[key]) ev.preventDefault();
					keys[key] = false;
				}, { passive: false });

				function updateMouseControlFromEvent(ev) {
					var rect = renderer.domElement.getBoundingClientRect();
					var cx = rect.left + rect.width * 0.5;
					var cy = rect.top + rect.height * 0.5;
					var nx = (ev.clientX - cx) / Math.max(1, rect.width * 0.5);
					var nz = (ev.clientY - cy) / Math.max(1, rect.height * 0.5);
					mouseControl.nx = Math.max(-1, Math.min(1, nx));
					mouseControl.nz = Math.max(-1, Math.min(1, nz));
				}

				renderer.domElement.addEventListener("mousedown", function (ev) {
					if (ev.button !== 0) return;
					ev.preventDefault();
					mouseControl.active = true;
					updateMouseControlFromEvent(ev);
				}, { passive: false });

				renderer.domElement.addEventListener("mousemove", function (ev) {
					if (!mouseControl.active) return;
					updateMouseControlFromEvent(ev);
				});

				window.addEventListener("mouseup", function (ev) {
					if (ev.button !== 0) return;
					mouseControl.active = false;
					mouseControl.nx = 0;
					mouseControl.nz = 0;
				});

				var missionTargets = ["地球", "火星", "木星"];
				var mission = { stage: 0, completed: false };
				var tempVec = new THREE.Vector3();
				var gConst = 1.1;
				var clock = new THREE.Clock();
				setHelpExpanded(window.innerWidth > 680);

				function updateBodies() {
					for (var k = 0; k < bodies.length; k += 1) {
						var body = bodies[k];
						if (body.orbitRadius === 0) {
							body.position.set(0, 0, 0);
						} else {
							var ang = body.phase;
							body.position.set(Math.cos(ang) * body.orbitRadius, Math.sin(ang * 0.5) * 1.1, Math.sin(ang) * body.orbitRadius);
						}
						body.mesh.position.copy(body.position);
						body.mesh.rotation.y += 0.002 + body.radius * 0.0004;
					}
				}

				function getInputForce() {
					var xAxis = 0;
					var yAxis = 0;
					var zAxis = 0;
					if (keys.w || keys.arrowup || keyCodes.KeyW || keyCodes.ArrowUp) zAxis -= 1;
					if (keys.s || keys.arrowdown || keyCodes.KeyS || keyCodes.ArrowDown) zAxis += 1;
					if (keys.a || keys.arrowleft || keyCodes.KeyA || keyCodes.ArrowLeft) xAxis -= 1;
					if (keys.d || keys.arrowright || keyCodes.KeyD || keyCodes.ArrowRight) xAxis += 1;
					if (keys.q || keyCodes.KeyQ) yAxis += 1;
					if (keys.e || keyCodes.KeyE) yAxis -= 1;
					if (mouseControl.active) {
						xAxis += mouseControl.nx;
						zAxis += mouseControl.nz;
					}

					if (xAxis === 0 && yAxis === 0 && zAxis === 0) return worldMove.set(0, 0, 0);

					camForward.set(0, 0, -1).applyQuaternion(camera.quaternion);
					camForward.y = 0;
					if (camForward.lengthSq() < 0.0001) camForward.set(0, 0, -1);
					camForward.normalize();

					camRight.set(1, 0, 0).applyQuaternion(camera.quaternion);
					camRight.y = 0;
					if (camRight.lengthSq() < 0.0001) camRight.set(1, 0, 0);
					camRight.normalize();

					worldMove.set(0, 0, 0);
					worldMove.addScaledVector(camRight, xAxis);
					worldMove.addScaledVector(camForward, -zAxis);
					worldMove.y += yAxis;
					worldMove.normalize();

					var thrust = (keys.shift || keyCodes.ShiftLeft || keyCodes.ShiftRight) ? moonState.boostThrust : moonState.baseThrust;
					return worldMove.multiplyScalar(thrust);
				}

				var sunSafeRadius = bodies[0].radius + 2.5; // 太阳表面安全距离
                var moonHitRadius = 1.15;

				function applyPlanetImpact(body, latchKey, impactScale) {
					if (!body) return;
					tempVec.subVectors(moonState.position, body.position);
					var bodyDist = tempVec.length();
					var impactDist = body.radius + moonHitRadius + 0.2;
					if (bodyDist < impactDist) {
						var impactSpeed = moonState.velocity.length();
						var pushDir = tempVec.normalize();
						moonState.position.copy(body.position.clone().add(pushDir.clone().multiplyScalar(impactDist + 0.3)));
						moonState.velocity.add(pushDir.multiplyScalar((impactScale || 14) + impactSpeed * 0.2));

						if (!extraCollisionLatch[latchKey]) {
							extraCollisionLatch[latchKey] = true;
							hitHintText = "撞击成功: " + latchKey;
							hitHintTimer = 0.8;
							impactFlash.visible = true;
							impactFlash.position.copy(body.position);
							impactFlash.scale.setScalar(body.radius + Math.min(impactSpeed * 0.05, 3));
							impactFlash.material.opacity = 0.8;
							impactFlashLife = 0.16;
						}
					} else {
						extraCollisionLatch[latchKey] = false;
					}
				}

				function updateMoon(dt) {
					moonState.acceleration.set(0, 0, 0);
					for (var m = 0; m < bodies.length; m += 1) {
						var body = bodies[m];
						if (!body.affectGravity) continue;
						tempVec.subVectors(body.position, moonState.position);
						var dist = tempVec.length();
						var distSq = Math.max(dist * dist, (body.radius + 1) * (body.radius + 1));
						var rawForce = (gConst * body.mass) / distSq;
						// 加强引力弹弓效应，同时限制太阳防止吸死
						var capForce = (m === 0) ? 26 : 80;
						var force = Math.min(rawForce, capForce);
						moonState.acceleration.add(tempVec.normalize().multiplyScalar(force));
					}
					moonState.acceleration.add(getInputForce());
					moonState.velocity.addScaledVector(moonState.acceleration, dt);
					moonState.velocity.multiplyScalar(moonState.damping);
					var speed = moonState.velocity.length();
					if (speed > moonState.maxSpeed) moonState.velocity.multiplyScalar(moonState.maxSpeed / speed);
					moonState.position.addScaledVector(moonState.velocity, dt);

					// 太阳表面硬弹：进入安全半径内则把月球推出去并给逃逸速度
					var sunDist = moonState.position.length();
					if (sunDist < sunSafeRadius) {
						// 从太阳向外的方向给一个强推力弹飞
						var eject = moonState.position.clone().normalize();
						moonState.position.copy(eject.clone().multiplyScalar(sunSafeRadius + 0.5));
						var outSpeed = Math.max(moonState.velocity.length(), 60);
						moonState.velocity.copy(eject.multiplyScalar(outSpeed));
					}

					// 月球撞地球会进行一次性撞击结算，并把月球弹开
					if (earthBody) {
						tempVec.subVectors(moonState.position, earthBody.position);
						var earthDist = tempVec.length();
						var impactDist = earthBody.radius + moonHitRadius + 0.2;
						if (earthDist < impactDist && earthState.hp > 0) {
							var impactSpeed = moonState.velocity.length();
							var pushDir = tempVec.normalize();
							moonState.position.copy(earthBody.position.clone().add(pushDir.clone().multiplyScalar(impactDist + 0.3)));
							moonState.velocity.add(pushDir.multiplyScalar(16 + impactSpeed * 0.22));

							if (!earthCollisionLatch) {
								// 高速弹弓一击通常可打掉约40%~55%地球耐久
								var impactDamage = Math.min(earthState.maxHp * 0.55, Math.max(earthState.maxHp * 0.12, 6 + impactSpeed * 0.45));
								earthState.hp = Math.max(0, earthState.hp - impactDamage);
								earthCollisionLatch = true;

								earthHitUiTimer = 0.14;
								impactFlash.visible = true;
								impactFlash.position.copy(earthBody.position);
								impactFlash.scale.setScalar(earthBody.radius + Math.min(impactSpeed * 0.07, 4));
								impactFlash.material.opacity = 0.85;
								impactFlashLife = 0.18;
							}
						} else {
							earthCollisionLatch = false;
						}
						var hpRatio = earthState.hp / earthState.maxHp;
						earthHpLabelEl.textContent = "地球耐久: " + Math.round(hpRatio * 100) + "%";
						earthHpFillEl.style.width = (hpRatio * 100).toFixed(1) + "%";
						earthHpFillEl.style.background = hpRatio > 0.4 ? "linear-gradient(90deg, #80ed99, #ffd166)" : "linear-gradient(90deg, #ff6b6b, #ffd166)";
					}

					if (earthHitUiTimer > 0) {
						earthHitUiTimer -= dt;
						earthHpBarEl.classList.add("hit");
					} else {
						earthHpBarEl.classList.remove("hit");
					}

					if (impactFlashLife > 0) {
						impactFlashLife -= dt;
						impactFlash.scale.multiplyScalar(1 + dt * 5.5);
						impactFlash.material.opacity = Math.max(0, impactFlashLife / 0.18);
						if (impactFlashLife <= 0) {
							impactFlash.visible = false;
						}
					}

					applyPlanetImpact(marsBody, "火星", 13);
					applyPlanetImpact(jupiterBody, "木星", 17);
					if (hitHintTimer > 0) hitHintTimer -= dt;

					moon.position.copy(moonState.position);
					moon.rotation.x += 0.01;
					moon.rotation.y += 0.008;

					for (var n = trailLen - 1; n > 0; n -= 1) {
						trailPos[n * 3] = trailPos[(n - 1) * 3];
						trailPos[n * 3 + 1] = trailPos[(n - 1) * 3 + 1];
						trailPos[n * 3 + 2] = trailPos[(n - 1) * 3 + 2];
					}
					trailPos[0] = moonState.position.x;
					trailPos[1] = moonState.position.y;
					trailPos[2] = moonState.position.z;
					moonTrailGeo.attributes.position.needsUpdate = true;
				}

				function updateMission() {
					if (mission.completed) {
						statusEl.textContent = "任务完成，按 R 重开";
						statusEl.style.color = "var(--ok)";
						distanceEl.textContent = "目标距离: 0.00";
						scoreEl.textContent = "完成进度: 3 / 3";
						return;
					}

					if (earthState.hp <= 0) {
						statusEl.textContent = "地球已毁，任务完成，按 R 重开";
						statusEl.style.color = "var(--ok)";
						scoreEl.textContent = "完成进度: 3 / 3";
						return;
					}

					var targetName = missionTargets[mission.stage];
					var target = null;
					for (var p = 0; p < bodies.length; p += 1) {
						if (bodies[p].name === targetName) {
							target = bodies[p];
							break;
						}
					}
					if (!target) return;

					var dist = moonState.position.distanceTo(target.position);
					var threshold = target.radius + 3.9;
					var safeDist = moonState.position.distanceTo(bodies[0].position);

					distanceEl.textContent = "目标距离: " + dist.toFixed(2);
					scoreEl.textContent = "完成进度: " + mission.stage + " / 3";

					if (safeDist < 7.2) {
						statusEl.textContent = "警告: 太靠近太阳，按 Shift 脱离";
						statusEl.style.color = "var(--danger)";
						return;
					}

					if (dist <= threshold) {
						mission.stage += 1;
						if (mission.stage >= missionTargets.length) {
							mission.completed = true;
							statusEl.textContent = "任务完成，按 R 重开";
							statusEl.style.color = "var(--ok)";
							scoreEl.textContent = "完成进度: 3 / 3";
						} else {
							statusEl.textContent = "已接近" + targetName + "，下个: " + missionTargets[mission.stage];
							statusEl.style.color = "var(--accent)";
						}
					} else {
						statusEl.textContent = "任务: 接近" + targetName + " (< " + threshold.toFixed(1) + ")";
						statusEl.style.color = "var(--accent)";
					}

					if (hitHintTimer > 0) {
						statusEl.textContent = hitHintText;
						statusEl.style.color = "var(--ok)";
					}
				}

				function animate() {
					var dt = paused ? 0 : Math.min(clock.getDelta(), 0.033);
					if (!paused) {
						updateBodies();
						updateMoon(dt);
						updateMission();
					}
					if (!paused) speedEl.textContent = "速度: " + moonState.velocity.length().toFixed(2);
					crosshair.style.display = mouseControl.active ? "block" : "none";
					camTarget.copy(moon.position);
					camDesiredPos.copy(camTarget).add(camOffset);
					camera.position.lerp(camDesiredPos, 0.07);
					camera.lookAt(camTarget);
					renderer.render(scene, camera);
					requestAnimationFrame(animate);
				}

				animate();

				window.addEventListener("resize", function () {
					camera.aspect = window.innerWidth / window.innerHeight;
					camera.updateProjectionMatrix();
					renderer.setSize(window.innerWidth, window.innerHeight);
					renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
				});
			} catch (err) {
				fail("3D 初始化失败: " + (err && err.message ? err.message : err));
				console.error(err);
			}
		})();
	</script>
</body>
</html>
