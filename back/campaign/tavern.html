<!DOCTYPE html>
<html lang="zh-CN">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>贞德：逆转时空 - 酒馆休整</title>
	<link rel="stylesheet" href="campaign.css" />
</head>
<body class="restPage tavernPage" data-stage="tavern">
	<main class="restShell">
		<section class="restHero">
				<div class="restIntro">
					<p id="pageEyebrow" class="restEyebrow"></p>
					<h1 id="pageTitle" class="restTitle"></h1>
					<p id="pageLead" class="restLead"></p>
					<div class="restActions">
						<button id="recruitBtn" class="primaryBtn" type="button"></button>
						<a id="nextStageBtn" class="ghostBtn" href="picardy.html"></a>
					</div>
				</div>

			<section class="tavernScene" aria-label="酒馆休整场景">
				<div class="tavernGlow"></div>
				<div id="sceneBanner" class="tavernBanner"></div>
				<div class="tavernTable">
					<div id="mugStrip" class="tavernMugStrip"></div>
				</div>
				<div id="sceneCast" class="tavernCast"></div>
			</section>

				<div id="cardsGrid" class="restGrid"></div>
		</section>

		<aside class="restSidebar">
			<section class="restPanel">
				<h2 id="statsTitle"></h2>
				<div class="restStat"><span class="restStatLabel">贞德等级</span><span id="restLevel" class="restStatValue">-</span></div>
				<div class="restStat"><span class="restStatLabel">当前经验</span><span id="restXp" class="restStatValue">-</span></div>
				<div class="restStat"><span class="restStatLabel">已入队英雄</span><span id="heroCount" class="restStatValue">-</span></div>
				<div class="restStat"><span id="recruitStatusLabel" class="restStatLabel"></span><span id="recruitStatus" class="restStatValue">待招募</span></div>
			</section>
			<section class="restPanel">
				<h2 id="planTitle"></h2>
				<ol id="planList" class="restList"></ol>
			</section>
		</aside>
	</main>

	<nav class="chapterNav" aria-label="章节导航">
		<a href="index.html" data-stage-link="orleans">奥尔良</a>
		<a href="reims.html" data-stage-link="reims">兰斯</a>

		<a href="brazilRise.html" data-stage-link="brazilRise">巴西起势</a>
		<a href="mali.html" data-stage-link="mali">马里</a>
	</nav>

			<div id="interludeDialogTitle" class="panelTitle"></div>
			<div id="interludeDialogText" class="panelText"></div>
			<div class="panelActions">
				<button id="interludeDialogBtn" type="button">继续</button>
			</div>
		</div>
	</div>
