<!DOCTYPE html>
<html lang="zh-CN">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>贞德：逆转时空</title>
	<style>
		:root {
			color-scheme: dark;
		}

		* {
			box-sizing: border-box;
		}

		body {
			margin: 0;
			min-height: 100vh;
			display: grid;
			place-items: center;
			background: url("img/fm.png") center center / cover no-repeat;
			font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
			overflow: hidden;
		}

		.cover {
			position: relative;
			z-index: 1;
			display: grid;
			place-items: center;
			padding: 24px;
			width: 100%;
		}

		.play-button {
			position: relative;
			display: inline-flex;
			align-items: center;
			justify-content: center;
			min-width: clamp(200px, 30vw, 340px);
			padding: clamp(16px, 2vw, 24px) clamp(34px, 5vw, 56px);
			text-decoration: none;
			background: linear-gradient(180deg, rgba(149, 102, 36, 0.96), rgba(90, 55, 16, 0.98));
			border: 1px solid rgba(255, 222, 158, 0.7);
			border-radius: 999px;
			box-shadow:
				0 18px 36px rgba(0, 0, 0, 0.34),
				inset 0 1px 0 rgba(255, 240, 196, 0.5),
				inset 0 -2px 0 rgba(33, 17, 4, 0.35);
			transform-origin: center;
			transition: transform 0.22s ease, box-shadow 0.22s ease, background 0.22s ease;
		}

		.play-button::before {
			content: "";
			position: absolute;
			inset: 4px;
			border-radius: 999px;
			border: 2px solid rgba(214, 167, 78, 0.88);
			box-shadow:
				inset 0 0 0 1px rgba(255, 235, 189, 0.35),
				0 0 0 1px rgba(67, 37, 8, 0.35);
			pointer-events: none;
		}

		.play-button::after {
			content: "";
			position: absolute;
			left: 14px;
			right: 14px;
			top: 7px;
			height: 42%;
			border-radius: 999px;
			background: linear-gradient(180deg, rgba(255, 238, 203, 0.24), rgba(255, 238, 203, 0));
			pointer-events: none;
		}

		.play-button span {
			position: relative;
			font-size: clamp(24px, 3vw, 38px);
			font-weight: 900;
			line-height: 1;
			letter-spacing: 0.14em;
			font-family: "Times New Roman", "STSong", "Songti SC", "SimSun", serif;
			color: #f5ddb0;
			text-shadow:
				0 1px 0 rgba(71, 35, 4, 0.9),
				0 2px 10px rgba(0, 0, 0, 0.18);
		}

		.play-button:hover {
			transform: scale(1.04);
			background: linear-gradient(180deg, rgba(166, 114, 42, 0.98), rgba(101, 61, 18, 1));
			box-shadow:
				0 22px 44px rgba(0, 0, 0, 0.4),
				inset 0 1px 0 rgba(255, 240, 196, 0.56),
				inset 0 -2px 0 rgba(33, 17, 4, 0.35);
		}

		.play-button:active {
			transform: scale(0.985);
		}

		@media (max-width: 640px) {
			body {
				background-position: 40% center;
			}
		}
	</style>
</head>
<body>
	<main class="cover">
		<a class="play-button" href="campaign/index.html" aria-label="开启旅程">
			<span>开启旅程</span>
		</a>
	</main>
</body>
</html>
