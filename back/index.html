<!DOCTYPE html>
<html lang="zh-CN">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>贞德：逆转时空</title>
	<style>
		:root {
			color-scheme: dark;
		}

		* {
			box-sizing: border-box;
		}

		body {
			margin: 0;
			min-height: 100vh;
			display: grid;
			place-items: center;
			background-color: #120b08;
			background: url("img/fm.png") center center / cover no-repeat;
			font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
			overflow: hidden;
		}

		body::before {
			content: "";
			position: fixed;
			inset: 0;
			background:
				radial-gradient(circle at 50% 32%, rgba(255, 233, 185, 0.18), transparent 26%),
				radial-gradient(circle at 50% 110%, rgba(18, 10, 6, 0.5), transparent 32%),
				linear-gradient(180deg, rgba(15, 10, 7, 0.12), rgba(15, 10, 7, 0.34));
			pointer-events: none;
		}

		.cover {
			position: relative;
			z-index: 1;
			display: grid;
			place-items: center;
			gap: 22px;
			padding: 24px;
			width: 100%;
		}

		.cover-art {
			display: none;
		}

		.cover-panel {
			display: grid;
			justify-items: center;
			gap: 10px;
			padding: clamp(18px, 3vw, 30px) clamp(20px, 4vw, 40px);
			border-radius: 30px;
			background: linear-gradient(180deg, rgba(38, 23, 15, 0.5), rgba(17, 11, 8, 0.32));
			border: 1px solid rgba(255, 222, 164, 0.18);
			backdrop-filter: blur(4px);
			box-shadow: 0 24px 60px rgba(0, 0, 0, 0.24), inset 0 1px 0 rgba(255,255,255,0.08);
		}

		.cover-kicker {
			font-size: 12px;
			letter-spacing: 0.28em;
			text-transform: uppercase;
			color: rgba(255, 229, 180, 0.82);
		}

		.cover-title {
			margin: 0;
			font-size: clamp(34px, 6vw, 72px);
			line-height: 0.96;
			font-family: "STZhongsong", "Songti SC", "Noto Serif SC", "Times New Roman", serif;
			letter-spacing: 0.04em;
			color: #f8e6bf;
			text-align: center;
			text-shadow: 0 4px 18px rgba(0, 0, 0, 0.34);
		}

		.cover-subtitle {
			margin: 0;
			font-size: clamp(13px, 2vw, 18px);
			line-height: 1.6;
			color: rgba(255, 240, 213, 0.82);
			text-align: center;
		}

		.play-button {
			position: relative;
			display: inline-flex;
			align-items: center;
			justify-content: center;
			min-width: clamp(200px, 30vw, 340px);
			padding: clamp(16px, 2vw, 24px) clamp(34px, 5vw, 56px);
			text-decoration: none;
			background: linear-gradient(180deg, rgba(149, 102, 36, 0.96), rgba(90, 55, 16, 0.98));
			border: 1px solid rgba(255, 222, 158, 0.7);
			border-radius: 999px;
			box-shadow:
				0 18px 36px rgba(0, 0, 0, 0.34),
				inset 0 1px 0 rgba(255, 240, 196, 0.5),
				inset 0 -2px 0 rgba(33, 17, 4, 0.35);
			transform-origin: center;
			transition: transform 0.22s ease, box-shadow 0.22s ease, background 0.22s ease;
		}

		.play-button::before {
			content: "";
			position: absolute;
			inset: 4px;
			border-radius: 999px;
			border: 2px solid rgba(214, 167, 78, 0.88);
			box-shadow:
				inset 0 0 0 1px rgba(255, 235, 189, 0.35),
				0 0 0 1px rgba(67, 37, 8, 0.35);
			pointer-events: none;
		}

		.play-button::after {
			content: "";
			position: absolute;
			left: 14px;
			right: 14px;
			top: 7px;
			height: 42%;
			border-radius: 999px;
			background: linear-gradient(180deg, rgba(255, 238, 203, 0.24), rgba(255, 238, 203, 0));
			pointer-events: none;
		}

		.play-button span {
			position: relative;
			font-size: clamp(24px, 3vw, 38px);
			font-weight: 900;
			line-height: 1;
			letter-spacing: 0.14em;
			font-family: "Times New Roman", "STSong", "Songti SC", "SimSun", serif;
			color: #f5ddb0;
			text-shadow:
				0 1px 0 rgba(71, 35, 4, 0.9),
				0 2px 10px rgba(0, 0, 0, 0.18);
		}

		.play-button:hover {
			transform: scale(1.04);
			background: linear-gradient(180deg, rgba(166, 114, 42, 0.98), rgba(101, 61, 18, 1));
			box-shadow:
				0 22px 44px rgba(0, 0, 0, 0.4),
				inset 0 1px 0 rgba(255, 240, 196, 0.56),
				inset 0 -2px 0 rgba(33, 17, 4, 0.35);
		}

		.play-button:active {
			transform: scale(0.985);
		}

		@media (max-width: 640px) {
			body {
				display: block;
				overflow-x: hidden;
				overflow-y: auto;
				background: #120b08;
			}

			body::before {
				background:
					linear-gradient(180deg, rgba(12, 8, 6, 0.7), rgba(12, 8, 6, 0.18) 24%, rgba(12, 8, 6, 0.78)),
					radial-gradient(circle at 50% 18%, rgba(255, 220, 166, 0.1), transparent 24%);
			}

			.cover-art {
				display: block;
				position: fixed;
				inset: 0;
				width: 100%;
				height: 100%;
				object-fit: contain;
				object-position: center 56%;
				pointer-events: none;
				z-index: 0;
			}

			.cover {
				display: flex;
				flex-direction: column;
				justify-content: space-between;
				align-items: center;
				min-height: 100svh;
				padding: max(18px, env(safe-area-inset-top)) 14px max(28px, env(safe-area-inset-bottom));
			}

			.cover-panel {
				gap: 8px;
				padding: 16px 18px 18px;
				border-radius: 22px;
				width: min(100%, 320px);
				margin-top: 8px;
			}

			.play-button {
				min-width: min(100%, 280px);
				width: min(100%, 280px);
				margin-top: auto;
			}
		}

		@media (max-width: 430px) {
				.cover-art {
					object-position: center 58%;
			}

			.cover-title {
				font-size: clamp(30px, 10vw, 42px);
			}

			.cover-subtitle {
				font-size: 13px;
			}

			.play-button span {
				font-size: clamp(22px, 7vw, 30px);
			}
		}
	</style>
</head>
<body>
	<img class="cover-art" src="img/fm.png" alt="" decoding="async" fetchpriority="high" />
	<main class="cover">
		<section class="cover-panel" aria-label="章节封面">
			<div class="cover-kicker">Chronicle</div>
			<h1 class="cover-title">贞德：逆转时空</h1>
			<p class="cover-subtitle">从奥尔良开始，改写之后每一场本该发生的命运。</p>
		</section>
		<a class="play-button" href="campaign/index.html" aria-label="开启旅程">
			<span>开启旅程</span>
		</a>
	</main>
</body>
</html>
