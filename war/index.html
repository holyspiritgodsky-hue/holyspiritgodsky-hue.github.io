		function drawMini() {
			miniCtx.clearRect(0, 0, mini.width, mini.height);
			const sx = mini.width / CFG.worldW;
			const sy = mini.height / CFG.worldH;
			const mw = mini.width;
			const mh = mini.height;

			if (miniMapImageReady) {
				miniCtx.drawImage(miniMapImage, 0, 0, mw, mh);
			} else {
				// fallback: no image file found yet
				miniCtx.fillStyle = "#18364c";
				miniCtx.fillRect(0, 0, mw, mh);
				miniCtx.fillStyle = "#6d9a57";
				miniCtx.beginPath();
				miniCtx.moveTo(mw * 0.58, mh * 0.05);
				miniCtx.lineTo(mw * 0.75, mh * 0.06);
				miniCtx.lineTo(mw * 0.9, mh * 0.13);
				miniCtx.lineTo(mw * 0.86, mh * 0.33);
				miniCtx.lineTo(mw * 0.74, mh * 0.45);
				miniCtx.lineTo(mw * 0.76, mh * 0.66);
				miniCtx.lineTo(mw * 0.68, mh * 0.84);
				miniCtx.lineTo(mw * 0.52, mh * 0.95);
				miniCtx.lineTo(mw * 0.28, mh * 0.99);
				miniCtx.lineTo(mw * 0.26, mh * 0.96);
				miniCtx.lineTo(mw * 0.42, mh * 0.9);
				miniCtx.lineTo(mw * 0.58, mh * 0.72);
				miniCtx.lineTo(mw * 0.62, mh * 0.52);
				miniCtx.lineTo(mw * 0.58, mh * 0.36);
				miniCtx.lineTo(mw * 0.52, mh * 0.24);
				miniCtx.lineTo(mw * 0.58, mh * 0.05);
				miniCtx.fill();
			}

			// 底图进一步压暗，显著提高标记对比
			miniCtx.fillStyle = "rgba(0, 0, 0, 0.44)";
			miniCtx.fillRect(0, 0, mw, mh);
			const focusLight = miniCtx.createRadialGradient(mw * 0.53, mh * 0.55, mw * 0.06, mw * 0.53, mh * 0.55, mw * 0.6);
			focusLight.addColorStop(0, "rgba(255,255,255,0.10)");
			focusLight.addColorStop(1, "rgba(255,255,255,0)");
			miniCtx.fillStyle = focusLight;
			miniCtx.fillRect(0, 0, mw, mh);

			// 取消据点黄圈高亮，仅保留图标本体高亮

			// ── 据点：按资源/功能图标显示（不再使用圆圈）────────────────────
			function drawMiniLabel(text, x, y) {
				miniCtx.font = "700 9px Microsoft YaHei";
				miniCtx.textAlign = "left";
				miniCtx.textBaseline = "middle";
				miniCtx.strokeStyle = "rgba(0, 0, 0, 0.88)";
				miniCtx.lineWidth = 2.2;
				miniCtx.strokeText(text, x + 7, y - 7);
				miniCtx.fillStyle = "rgba(255, 242, 185, 0.98)";
				miniCtx.fillText(text, x + 7, y - 7);
			}

			function drawMiniOutpostLabel(text, x, y) {
				miniCtx.font = "700 9px Microsoft YaHei";
				miniCtx.textAlign = "center";
				miniCtx.textBaseline = "middle";
				miniCtx.strokeStyle = "rgba(0, 0, 0, 0.88)";
				miniCtx.lineWidth = 2.2;
				miniCtx.strokeText(text, x, y - 8);
				miniCtx.fillStyle = "rgba(255, 242, 185, 0.98)";
				miniCtx.fillText(text, x, y - 8);
			}

			function drawOutpostIcon(outpost) {
				const x = outpost.x * sx;
				const y = outpost.y * sy;
				const iconY = y + 7;
				const s = 1.35;

				function drawGlowGoldMineIcon() {
					miniCtx.fillStyle = "rgba(255, 220, 108, 0.36)";
					miniCtx.beginPath();
					miniCtx.arc(0, 0, 6.2, 0, Math.PI * 2);
					miniCtx.fill();
					miniCtx.fillStyle = "#ffe27a";
					miniCtx.beginPath();
					miniCtx.moveTo(-3.8, 2.3);
					miniCtx.lineTo(-1.8, -2.6);
					miniCtx.lineTo(2.1, -2.1);
					miniCtx.lineTo(4.1, 2.0);
					miniCtx.closePath();
					miniCtx.fill();
					miniCtx.stroke();
					miniCtx.strokeStyle = "rgba(95,62,24,0.95)";
					miniCtx.lineWidth = 1;
					miniCtx.beginPath();
					miniCtx.moveTo(-3.2, -3.2);
					miniCtx.lineTo(1.8, 2.6);
					miniCtx.moveTo(-0.8, -3.0);
					miniCtx.lineTo(2.2, -3.8);
					miniCtx.stroke();
				}

				miniCtx.save();
				miniCtx.translate(x, iconY);
				miniCtx.scale(s, s);

				// 根据归属轻微描边，避免和底图混在一起
				miniCtx.strokeStyle = outpost.owner === "ally" ? "rgba(255,240,170,0.9)" : outpost.owner === "enemy" ? "rgba(255,150,130,0.9)" : "rgba(205,190,240,0.9)";
				miniCtx.lineWidth = 1.1;

				if (outpost.name === "江陵") {
					// 绿色十字（医馆资源）
					miniCtx.fillStyle = "#66f3a0";
					miniCtx.fillRect(-4, -1, 8, 2);
					miniCtx.fillRect(-1, -4, 2, 8);
					miniCtx.strokeRect(-4.5, -1.5, 9, 3);
					miniCtx.strokeRect(-1.5, -4.5, 3, 9);
					miniCtx.restore();
					drawMiniOutpostLabel(outpost.name, x, y);
					return;
				}

				if (outpost.name === "北平") {
					// 马（简化图标）
					miniCtx.fillStyle = "#ffcc7d";
					miniCtx.fillRect(-4, -2, 7, 4);      // body
					miniCtx.fillRect(2, -4, 3, 3);      // head
					miniCtx.fillRect(-3.5, 1.8, 1, 2.5); // leg1
					miniCtx.fillRect(-1, 1.8, 1, 2.5);   // leg2
					miniCtx.fillRect(1.5, 1.8, 1, 2.5); // leg3
					miniCtx.restore();
					drawMiniOutpostLabel(outpost.name, x, y);
					return;
				}

				if (outpost.name === "建业") {
					// 船（港口资源）
					miniCtx.fillStyle = "#b9e7ff";
					miniCtx.beginPath();
					miniCtx.moveTo(-4.5, 1.8);
					miniCtx.lineTo(4.5, 1.8);
					miniCtx.lineTo(2.5, 4);
					miniCtx.lineTo(-2.5, 4);
					miniCtx.closePath();
					miniCtx.fill();
					miniCtx.fillRect(-0.3, -4.8, 0.9, 6); // mast
					miniCtx.beginPath();
					miniCtx.moveTo(0.6, -4.5);
					miniCtx.lineTo(3.4, -2.2);
					miniCtx.lineTo(0.6, -0.2);
					miniCtx.closePath();
					miniCtx.fill();
					miniCtx.restore();
					drawMiniOutpostLabel(outpost.name, x, y);
					return;
				}

				if (outpost.name === "邺城" || outpost.name === "襄阳") {
					// 发光金矿（统一样式）
					drawGlowGoldMineIcon();
					miniCtx.restore();
					drawMiniOutpostLabel(outpost.name, x, y);
					return;
				}

				if (outpost.name === "汉阳") {
					// 铁（锭块）
					miniCtx.fillStyle = "#ecf6ff";
					miniCtx.beginPath();
					miniCtx.moveTo(-4, 2.2);
					miniCtx.lineTo(-2.5, -2.6);
					miniCtx.lineTo(2.5, -2.6);
					miniCtx.lineTo(4, 2.2);
					miniCtx.closePath();
					miniCtx.fill();
					miniCtx.stroke();
					miniCtx.fillStyle = "rgba(255,255,255,0.60)";
					miniCtx.fillRect(-1.8, -1.4, 3.6, 0.9);
					miniCtx.restore();
					drawMiniOutpostLabel(outpost.name, x, y);
					return;
				}

				// 其他据点：小方块（非圆形）
				miniCtx.fillStyle = outpost.owner === "ally" ? "#dbc16c" : outpost.owner === "enemy" ? "#d66b54" : "#9e84d4";
				miniCtx.fillRect(-2.2, -2.2, 4.4, 4.4);
				miniCtx.strokeRect(-2.6, -2.6, 5.2, 5.2);
				miniCtx.restore();
				drawMiniOutpostLabel(outpost.name, x, y);
			}

			for (const o of outposts) drawOutpostIcon(o);

			// ── 单位 ─────────────────────────────────────────────────────────
			miniCtx.fillStyle = "#ffe7a5";
			for (const u of allies) {
				if (u.dead) continue;
				miniCtx.fillRect(u.x * sx, u.y * sy, 1.8, 1.8);
			}
			miniCtx.fillStyle = "#f7a78f";
			for (const u of enemyUnits) {
				if (u.dead) continue;
				miniCtx.fillRect(u.x * sx, u.y * sy, 1.8, 1.8);
			}

			// ── 玩家 ────────────────────────────────────────────────────────
			miniCtx.fillStyle = "#f3d26b";
			miniCtx.beginPath();
			miniCtx.arc(player.x * sx, player.y * sy, 3.2, 0, Math.PI * 2);
			miniCtx.fill();

			// 嘉峪关
			miniCtx.fillStyle = "#d4c07a";
			miniCtx.fillRect(jiayuguan.x * sx - 3, jiayuguan.y * sy - 2, 6, 4);
			drawMiniLabel(jiayuguan.name, jiayuguan.x * sx, jiayuguan.y * sy);

			// 地狱入口
			miniCtx.fillStyle = hellGate.level >= hellGate.maxLevel ? "#ff8d72" : "#c6927f";
			miniCtx.fillRect(hellGate.x * sx - 3, hellGate.y * sy - 3, 6, 6);
			drawMiniLabel(`${hellGate.name} ${hellGate.level}/${hellGate.maxLevel}`, hellGate.x * sx, hellGate.y * sy);

			// 武当山茅屋
			miniCtx.fillStyle = wudangHut.captured ? "#cfb35e" : "#9e84d4";
			miniCtx.fillRect(wudangHut.x * sx - 2, wudangHut.y * sy - 2, 4, 4);

			// 诸葛亮
			if (zhugeliang && !zhugeliang.dead) {
				miniCtx.fillStyle = "#78c0ff";
				miniCtx.beginPath();
				miniCtx.arc(zhugeliang.x * sx, zhugeliang.y * sy, 2.5, 0, Math.PI * 2);
				miniCtx.fill();
			}
			if (sunshangxiang && !sunshangxiang.dead) {
				miniCtx.fillStyle = "#7fc7ff";
				miniCtx.fillRect(sunshangxiang.x * sx - 1.4, sunshangxiang.y * sy - 1.4, 2.8, 2.8);
			}
			if (daqiao && !daqiao.dead) {
				miniCtx.fillStyle = "#89c2ff";
				miniCtx.fillRect(daqiao.x * sx - 1.4, daqiao.y * sy - 1.4, 2.8, 2.8);
			}
			if (xiaoqiao && !xiaoqiao.dead) {
				miniCtx.fillStyle = "#dfa9ff";
				miniCtx.fillRect(xiaoqiao.x * sx - 1.4, xiaoqiao.y * sy - 1.4, 2.8, 2.8);
			}

			// 东海航线标注（类似城市名称样式）
			miniCtx.font = "700 9px Microsoft YaHei";
			miniCtx.textAlign = "right";
			miniCtx.textBaseline = "middle";
			miniCtx.strokeStyle = "rgba(0, 0, 0, 0.9)";
			miniCtx.lineWidth = 2.2;
			miniCtx.strokeText("去日本", mw - 7, mh * 0.52);
			miniCtx.strokeText("去南美", mw - 7, mh * 0.74);
			miniCtx.fillStyle = "rgba(197, 235, 255, 0.98)";
			miniCtx.fillText("去日本", mw - 7, mh * 0.52);
			miniCtx.fillText("去南美", mw - 7, mh * 0.74);
			miniCtx.fillStyle = "rgba(161, 220, 255, 0.9)";
			miniCtx.fillRect(mw - 13, mh * 0.52 - 4, 3, 3);
			miniCtx.fillRect(mw - 13, mh * 0.74 - 4, 3, 3);

			// ── 视口框 ──────────────────────────────────────────────────────
			miniCtx.strokeStyle = "rgba(255,244,200,0.90)";
			miniCtx.lineWidth = 1;
			miniCtx.strokeRect(camera.x * sx, camera.y * sy, canvas.width * sx, canvas.height * sy);
		}

		function resize() {
			canvas.width = window.innerWidth;
			canvas.height = window.innerHeight;
			const compactUI = window.matchMedia("(max-width: 900px), (pointer: coarse)").matches;
			mini.width = compactUI ? 176 : 240;
			mini.height = compactUI ? 118 : 160;
			camera.x = clamp(camera.x, 0, CFG.worldW - canvas.width);
			camera.y = clamp(camera.y, 0, CFG.worldH - canvas.height);
			applyTopPanelLayout();
		}

		const gameState = {
			over: false,
			paused: false,
			result: "",
			freePlay: false
		};

		const moveInput = {
			up: false,
			down: false,
			left: false,
			right: false
		};

		function togglePause() {
			gameState.paused = !gameState.paused;
			pauseBtn.textContent = gameState.paused ? "继续" : "暂停";
		}

		function continueGame() {
			if (!gameState.over || gameState.result !== "游戏通关") return;
			gameState.over = false;
			gameState.result = "";
			gameState.freePlay = true;
			gameState.paused = false;
			pauseBtn.textContent = "暂停";
			if (player.dead) {
				player.dead = false;
				player.hp = Math.max(player.maxHp * 0.55, 70);
			}
		}

		function castCharge() {
			if (gameState.paused || gameState.over || player.dead || player.chargeCool > 0) return;
			player.chargeCool = 8;
			chargeEffects.push({ x: player.x, y: player.y, life: 1, r: 8 });
			const chargeR = 200;
			for (const u of enemyUnits) {
				if (!u.dead && dist(player, u) < chargeR) {
					pushAwayOnly(player, u, 95);
					u.hp -= 18;
				}
			}
			for (const e of enemies) {
				if (!e.active || e.dead) continue;
				if (dist(player, e) < chargeR) {
					pushAwayOnly(player, e, 65);
					e.hp -= 35;
					e.hitFlash = Math.max(e.hitFlash || 0, 0.16);
				}
			}
		}

		function issueMoveCommand(clientX, clientY) {
			if (gameState.over || gameState.paused || player.dead || isAnyModalOpen()) return;
			const p = viewToWorld(clientX, clientY);
			player.target = {
				x: clamp(p.x, 0, CFG.worldW),
				y: clamp(p.y, 0, CFG.worldH)
			};
			clickMarker.x = player.target.x;
			clickMarker.y = player.target.y;
			clickMarker.life = 1;
		}

		function issueMiniMapCommand(clientX, clientY) {
			if (gameState.over || gameState.paused || player.dead || isAnyModalOpen()) return;
			const p = miniToWorld(clientX, clientY);
			player.target = {
				x: clamp(p.x, 0, CFG.worldW),
				y: clamp(p.y, 0, CFG.worldH)
			};
			clickMarker.x = player.target.x;
			clickMarker.y = player.target.y;
			clickMarker.life = 1;
		}

		canvas.addEventListener("contextmenu", (e) => e.preventDefault());
		window.addEventListener("keydown", (e) => {
			tryStartBgm();
			const key = e.key.toLowerCase();
			if (isAnyModalOpen()) {
				if (e.key === "Escape") {
					if (tavernDialogState.open) closeTavernDialog();
					else if (shipGateDialogState.open) closeShipGateDialog();
					else closeCityBuildDialog();
				}
				if (key === "w" || key === "a" || key === "s" || key === "d" || e.key.startsWith("Arrow") || e.code === "Space" || key === "p" || key === "q") {
					e.preventDefault();
				}
				return;
			}
			if (key === "w" || e.key === "ArrowUp") moveInput.up = true;
			if (key === "s" || e.key === "ArrowDown") moveInput.down = true;
			if (key === "a" || e.key === "ArrowLeft") moveInput.left = true;
			if (key === "d" || e.key === "ArrowRight") moveInput.right = true;
			if (key === "w" || key === "a" || key === "s" || key === "d" || e.key.startsWith("Arrow")) {
				e.preventDefault();
			}
			if (e.code === "Space" || e.key.toLowerCase() === "p") {
				e.preventDefault();
				togglePause();
			}
			if (e.key.toLowerCase() === "q") castCharge();
		});
		window.addEventListener("keyup", (e) => {
			const key = e.key.toLowerCase();
			if (key === "w" || e.key === "ArrowUp") moveInput.up = false;
			if (key === "s" || e.key === "ArrowDown") moveInput.down = false;
			if (key === "a" || e.key === "ArrowLeft") moveInput.left = false;
			if (key === "d" || e.key === "ArrowRight") moveInput.right = false;
		});
		window.addEventListener("blur", () => {
			resetMoveInput();
		});
		cityBuildOk.addEventListener("click", () => {
			applyCityBuildDialogAction();
		});
		cityBuildCancel.addEventListener("click", () => {
			closeCityBuildDialog();
		});
		shipGateToJapan.addEventListener("click", () => jumpFromShipGate("jap.html"));
		shipGateToSouth.addEventListener("click", () => jumpFromShipGate("south.html"));
		shipGateCancel.addEventListener("click", () => closeShipGateDialog());
		tavernRecruitSun.addEventListener("click", () => recruitSunshangxiang());
		tavernRecruitDa.addEventListener("click", () => recruitDaqiao());
		tavernRecruitXiao.addEventListener("click", () => recruitXiaoqiao());
		tavernClose.addEventListener("click", () => closeTavernDialog());
		pauseBtn.addEventListener("click", () => {
			tryStartBgm();
			togglePause();
		});
		musicBtn.addEventListener("click", () => {
			bgmEnabled = !bgmEnabled;
			syncMusicBtn();
			if (bgmEnabled) {
				tryStartBgm();
			} else {
				stopSynthBgm();
				if (audioCtx && audioCtx.state === "running") audioCtx.suspend();
			}
		});
		chargeBtn.addEventListener("click", () => castCharge());
		bydTestBtn.addEventListener("click", () => {
			spawnBydCarNearPlayer();
		});
		continueGameBtn.addEventListener("click", () => continueGame());
		canvas.addEventListener("pointerdown", (e) => {
			if (e.pointerType === "mouse" && e.button !== 0) return;
			if (e.pointerType !== "mouse") e.preventDefault();
			tryStartBgm();
			issueMoveCommand(e.clientX, e.clientY);
		}, { passive: false });
		let miniDragging = false;
		mini.addEventListener("pointerdown", (e) => {
			if (e.pointerType === "mouse" && e.button !== 0) return;
			miniDragging = true;
			if (typeof mini.setPointerCapture === "function") mini.setPointerCapture(e.pointerId);
			e.preventDefault();
			tryStartBgm();
			issueMiniMapCommand(e.clientX, e.clientY);
		}, { passive: false });
		mini.addEventListener("pointermove", (e) => {
			if (!miniDragging) return;
			e.preventDefault();
			issueMiniMapCommand(e.clientX, e.clientY);
		}, { passive: false });
		mini.addEventListener("pointerup", (e) => {
			miniDragging = false;
			if (typeof mini.releasePointerCapture === "function") {
				try { mini.releasePointerCapture(e.pointerId); } catch (_err) {}
			}
		});
		mini.addEventListener("pointercancel", () => {
			miniDragging = false;
		});
		if (!window.PointerEvent) {
			canvas.addEventListener("touchstart", (e) => {
				if (!e.touches || e.touches.length === 0) return;
				e.preventDefault();
				const t = e.touches[0];
				tryStartBgm();
				issueMoveCommand(t.clientX, t.clientY);
			}, { passive: false });
			mini.addEventListener("touchstart", (e) => {
				if (!e.touches || e.touches.length === 0) return;
				e.preventDefault();
				const t = e.touches[0];
				tryStartBgm();
				issueMiniMapCommand(t.clientX, t.clientY);
			}, { passive: false });
			mini.addEventListener("touchmove", (e) => {
				if (!e.touches || e.touches.length === 0) return;
				e.preventDefault();
				const t = e.touches[0];
				issueMiniMapCommand(t.clientX, t.clientY);
			}, { passive: false });
		}

		document.addEventListener("visibilitychange", () => {
			if (document.hidden) {
				if (audioCtx && audioCtx.state === "running") audioCtx.suspend();
			} else if (bgmEnabled) {
				tryStartBgm();
			}
		});
		syncMusicBtn();

		window.addEventListener("resize", resize);
		resize();

		let last = performance.now();
		function loop(now) {
			const dt = Math.min(0.033, (now - last) / 1000);
			const dtMs = dt * 1000;
			last = now;

			if (!gameState.over && !gameState.paused) {
				player.slashCd = Math.max(0, player.slashCd - dt);
				player.hitStop = Math.max(0, player.hitStop - dt);
				if (player.hitStop <= 0) player.slashTimer = Math.max(0, player.slashTimer - dt);
				player.attackLock = Math.max(0, player.attackLock - dt);
				player.recoverTimer = Math.max(0, player.recoverTimer - dt);
				player.hitFlash = Math.max(0, player.hitFlash - dt * 1.6);
				for (const e of enemies) {
					e.slashCd = Math.max(0, e.slashCd - dt);
					e.hitStop = Math.max(0, (e.hitStop || 0) - dt);
					if (e.hitStop <= 0) e.slashTimer = Math.max(0, e.slashTimer - dt);
					e.attackLock = Math.max(0, e.attackLock - dt);
					e.recoverTimer = Math.max(0, e.recoverTimer - dt);
					e.hitFlash = Math.max(0, e.hitFlash - dt * 1.6);
				}
				for (const u of allies) {
					u.slashCd = Math.max(0, u.slashCd - dt);
					u.slashTimer = Math.max(0, u.slashTimer - dt);
				}
				for (const u of enemyUnits) {
					u.slashCd = Math.max(0, u.slashCd - dt);
					u.slashTimer = Math.max(0, u.slashTimer - dt);
				}

				updatePlayer(dt);
				updateEnemyWaves(dt);
				updateEnemyLeaders(dt);

				const activeEnemyLeaders = enemies.filter((e) => e.active && !e.dead);
				updateUnitSwarm(allies, player, allies, enemyUnits, activeEnemyLeaders, dt);
				for (const e of activeEnemyLeaders) {
					if (!e.dead) {
						const myUnits = enemyUnits.filter((u) => !u.dead && u.owner === e);
						updateUnitSwarm(myUnits, e, myUnits, allies, [player], dt);
					}
				}

				// Zhang Fei direct melee vs enemy units
				if (!player.dead) {
					for (const u of enemyUnits) {
						if (u.dead) continue;
						const du = dist(player, u);
						if (du < CFG.attackRange + 8) {
							u.hp -= 58 * getTeamAttackMultiplier(player.team) * dt;
							applyKnockback(player, u, 0.9);
							if (player.slashCd <= 0) triggerLeaderSlash(player, u);
						}
						if (u.hp <= 0) u.dead = true;
					}
				}

				// 敌方攻击诸葛亮
				if (zhugeliang && !zhugeliang.dead) {
					for (const u of enemyUnits) {
						if (u.dead) continue;
						if (dist(zhugeliang, u) < CFG.attackRange + 8) {
							zhugeliang.hp -= CFG.unitDps * dt;
							zhugeliang.hitFlash = Math.max(zhugeliang.hitFlash || 0, 0.4);
						}
					}
					for (const e of activeEnemyLeaders) {
						if (e.dead) continue;
						if (dist(zhugeliang, e) < CFG.attackRange + 14) {
							zhugeliang.hp -= 22 * getTeamAttackMultiplier(e.team) * dt;
							zhugeliang.hitFlash = Math.max(zhugeliang.hitFlash || 0, 0.65);
						}
					}
				}

				const jiangdongAllies = [sunshangxiang, daqiao, xiaoqiao, elizabeth].filter((h) => h && !h.dead);
				for (const h of jiangdongAllies) {
					for (const u of enemyUnits) {
						if (u.dead) continue;
						if (dist(h, u) < CFG.attackRange + 8) {
							h.hp -= CFG.unitDps * dt;
							h.hitFlash = Math.max(h.hitFlash || 0, 0.35);
						}
					}
					for (const e of activeEnemyLeaders) {
						if (e.dead) continue;
						if (dist(h, e) < CFG.attackRange + 14) {
							h.hp -= 20 * getTeamAttackMultiplier(e.team) * dt;
							h.hitFlash = Math.max(h.hitFlash || 0, 0.55);
						}
					}
				}

				for (const e of activeEnemyLeaders) {
					if (e.dead || player.dead) continue;
					const d = dist(player, e);
					if (d < CFG.attackRange + 18) {
						player.hp -= 32 * getTeamAttackMultiplier(e.team) * dt;
						e.hp -= 52 * getTeamAttackMultiplier(player.team) * dt;
						player.hitFlash = Math.max(player.hitFlash || 0, 0.78);
						player.hitStop  = Math.max(player.hitStop  || 0, 0.09);
						e.hitFlash = Math.max(e.hitFlash || 0, 0.78);
						e.hitStop  = Math.max(e.hitStop  || 0, 0.09);
						applyKnockback(e, player, 1.2);
						if (player.slashCd <= 0) triggerLeaderSlash(player, e);
						if (e.slashCd <= 0) triggerLeaderSlash(e, player);
					}
				}

				applyCrowdCollision(allies, allies, true);
				applyCrowdCollision(enemyUnits, enemyUnits, true);
				applyCrowdCollision(allies, enemyUnits, false);
				const specialAllies = [zhugeliang, lancelot_ally, sunshangxiang, daqiao, xiaoqiao, elizabeth].filter((x) => x && !x.dead);
				applyCrowdCollision(specialAllies, allies, false);
				applyCrowdCollision(specialAllies, enemyUnits, false);
				applyCrowdCollision([player], allies, false);
				applyCrowdCollision([player], enemyUnits, false);
				applyCrowdCollision([player], specialAllies, false);
				applyCrowdCollision(activeEnemyLeaders, allies, false);
				applyCrowdCollision(activeEnemyLeaders, specialAllies, false);
				applyCrowdCollision(activeEnemyLeaders, enemyUnits, false);
				applyCrowdCollision(activeEnemyLeaders, [player], false);

				spawnSystem(dtMs);
				outpostBuildSystem();
				outpostSystem(dtMs);
				mineSystem(dt, dtMs);
				clinicSystem(dt, dtMs);
				wudangHutSystem();
				jiangdongTavernSystem(dt);
				updateZhugeliang(dt);
				updateLancelotAlly(dt);
				updateSunshangxiang(dt);
				updateDaqiao(dt);
				updateXiaoqiao(dt);
				updateElizabeth(dt);
				updateSunArrows(dt);
				updateGoldPopups(dt);
				jiayuguanSystem();
				hellGateSystem(dt);
				shipyardSystem(dt);
				bydCarSystem();
				syncMainPlayerState(false);
				cleanup();

				// Charge cooldown
				if (player.chargeCool > 0) player.chargeCool = Math.max(0, player.chargeCool - dt);

				// Charge visual effects
				for (let i = chargeEffects.length - 1; i >= 0; i--) {
					chargeEffects[i].life -= dt * 1.6;
					chargeEffects[i].r += dt * 310;
					if (chargeEffects[i].life <= 0) chargeEffects.splice(i, 1);
				}

				// 雷电效果衰减
				for (let i = lightningBolts.length - 1; i >= 0; i--) {
					lightningBolts[i].life -= dt * 3.5;
					if (lightningBolts[i].life <= 0) lightningBolts.splice(i, 1);
				}

				// 茅屋碎片
				for (let i = wudangHut.breakParts.length - 1; i >= 0; i--) {
					const bp = wudangHut.breakParts[i];
					bp.x += bp.vx * dt;
					bp.y += bp.vy * dt;
					bp.vy += 220 * dt;
					bp.life -= dt * 1.4;
					if (bp.life <= 0) wudangHut.breakParts.splice(i, 1);
				}

				// Break particles physics
				for (const o of outposts) {
					for (let i = o.breakParts.length - 1; i >= 0; i--) {
						const bp = o.breakParts[i];
						bp.x += bp.vx * dt;
						bp.y += bp.vy * dt;
						bp.vy += 220 * dt;
						bp.life -= dt * 1.4;
						if (bp.life <= 0) o.breakParts.splice(i, 1);
					}
				}
			}

			clickMarker.life = Math.max(0, clickMarker.life - dt * 1.7);

			updateCamera(dt);
			drawMap();
			drawMini();

			if (!gameState.over) {
				const allyOut = outposts.filter((o) => o.owner === "ally").length;
				const deadEnemyGenerals = enemies.filter((e) => e.dead).length;
				const txt = `主线任务: 占领城池 ${Math.min(allyOut, MISSION.needOutposts)}/${MISSION.needOutposts} | 击败敌将 ${Math.min(deadEnemyGenerals, MISSION.needGenerals)}/${MISSION.needGenerals}`;
				const compactHud = window.matchMedia("(max-width: 900px), (pointer: coarse)").matches;
				const hudY = getHudTopOffset();
				const missionW = Math.max(220, Math.min(420, canvas.width - 16));
				const missionH = compactHud ? 22 : 24;
				const missionTextY = hudY + (compactHud ? 15 : 17);
				ctx.fillStyle = "rgba(0,0,0,0.40)";
				ctx.fillRect(canvas.width * 0.5 - missionW * 0.5, hudY, missionW, missionH);
				ctx.fillStyle = "#f3f6da";
				ctx.font = compactHud ? "600 11px Microsoft YaHei" : "600 13px Microsoft YaHei";
				ctx.textAlign = "center";
				ctx.fillText(txt, canvas.width * 0.5, missionTextY);

				// 金钱 HUD
				const resourceBoxW = compactHud ? 124 : 140;
				const resourceY = hudY + missionH + 6;
				ctx.fillStyle = "rgba(0,0,0,0.45)";
				ctx.fillRect(10, resourceY, resourceBoxW, missionH);
				ctx.fillStyle = "#f3cf59";
				ctx.font = compactHud ? "700 12px Microsoft YaHei" : "700 13px Microsoft YaHei";
				ctx.textAlign = "left";
				ctx.fillText(`💰 金: ${Math.floor(playerGold)}`, 18, resourceY + (compactHud ? 15 : 17));

				ctx.fillStyle = "rgba(0,0,0,0.45)";
				ctx.fillRect(14 + resourceBoxW, resourceY, resourceBoxW, missionH);
				ctx.fillStyle = "#d9e6f3";
				ctx.fillText(`⛓ 铁: ${Math.floor(playerIron)}`, 22 + resourceBoxW, resourceY + (compactHud ? 15 : 17));
			}

			if (gameState.over) {
				ctx.fillStyle = "rgba(0, 0, 0, 0.42)";
				ctx.fillRect(0, 0, canvas.width, canvas.height);
				ctx.fillStyle = gameState.result === "游戏通关" ? "#ffe78b" : "#ffc3b5";
				ctx.font = "700 54px Microsoft YaHei";
				ctx.textAlign = "center";
				ctx.fillText(gameState.result, canvas.width * 0.5, canvas.height * 0.5 - 8);
				ctx.fillStyle = "#f2f2f2";
				ctx.font = "500 18px Microsoft YaHei";
				ctx.fillText(gameState.result === "游戏通关" ? "可点击继续游戏自由探索" : "刷新页面可重新开始", canvas.width * 0.5, canvas.height * 0.5 + 34);
			}
			continueGameBtn.style.display = gameState.over && gameState.result === "游戏通关" ? "block" : "none";
			chargeBtn.disabled = gameState.paused || gameState.over || player.dead || player.chargeCool > 0;

			requestAnimationFrame(loop);
		}

		requestAnimationFrame(loop);
	</script>
</body>
</html>
