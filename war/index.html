<!DOCTYPE html>
<html lang="zh-CN">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>三国战场</title>
	<style>
		:root {
			--sky: #9ec7da;
			--ground: #7fb26b;
			--ground-dark: #5c8b53;
			--road: #8c7450;
			--river: #4a8ea8;
			--ally: #f3d26b;
			--ally-unit: #ffe7a5;
			--enemy: #e76752;
			--enemy-unit: #f7a78f;
			--neutral: #9e84d4;
			--ui-bg: rgba(0, 0, 0, 0.45);
			--ui-border: rgba(255, 255, 255, 0.22);
			--text: #f3f5ef;
		}

		html,
		body {
			margin: 0;
			width: 100%;
			height: 100%;
			overflow: hidden;
			font-family: "Segoe UI", "Microsoft YaHei", sans-serif;
			background: var(--sky);
			color: var(--text);
			user-select: none;
		}

		#game {
			width: 100vw;
			height: 100vh;
			display: block;
			cursor: crosshair;
			touch-action: none;
		}

		#miniWrap {
			position: fixed;
			right: 12px;
			bottom: 12px;
			z-index: 3;
			width: 240px;
			height: 160px;
			border-radius: 8px;
			border: 1px solid var(--ui-border);
			background: rgba(10, 12, 10, 0.6);
			overflow: hidden;
		}

		#mini {
			width: 100%;
			height: 100%;
			display: block;
			cursor: pointer;
		}

		#pauseBtn,
		#musicBtn,
		#labBtn {
			position: fixed;
			top: 14px;
			z-index: 4;
			border: 1px solid rgba(255, 255, 255, 0.35);
			color: #f2f5ee;
			height: 36px;
			padding: 0 14px;
			border-radius: 8px;
			font-size: 13px;
			font-weight: 600;
			line-height: 1;
			box-sizing: border-box;
			display: inline-flex;
			align-items: center;
			justify-content: center;
			text-decoration: none;
		}

		#pauseBtn {
			right: 14px;
			background: rgba(26, 34, 26, 0.85);
			cursor: pointer;
		}

		#pauseBtn:hover {
			background: rgba(45, 58, 45, 0.9);
		}

		#labBtn {
			right: 172px;
			background: rgba(34, 28, 22, 0.85);
		}

		#labBtn:hover {
			background: rgba(58, 47, 35, 0.92);
		}

		#musicBtn {
			right: 92px;
			background: rgba(24, 30, 44, 0.86);
			cursor: pointer;
		}

		#musicBtn:hover {
			background: rgba(37, 47, 67, 0.92);
		}

		#chargeBtn {
			position: fixed;
			left: 50%;
			transform: translateX(-50%);
			bottom: 16px;
			z-index: 4;
			border: 1px solid rgba(255, 223, 124, 0.55);
			background: rgba(79, 60, 14, 0.82);
			color: #ffe8a1;
			padding: 10px 14px;
			border-radius: 999px;
			font-size: 13px;
			font-weight: 700;
			cursor: pointer;
		}

		#chargeBtn:disabled {
			opacity: 0.58;
		}

		@media (max-width: 900px), (pointer: coarse) {
			#pauseBtn,
			#labBtn,
			#musicBtn,
			#chargeBtn {
				font-size: 14px;
				height: 40px;
				padding: 0 14px;
			}

			#pauseBtn {
				top: max(8px, env(safe-area-inset-top));
				right: max(8px, env(safe-area-inset-right));
			}

			#labBtn {
				top: max(8px, env(safe-area-inset-top));
				right: calc(max(8px, env(safe-area-inset-right)) + 164px);
			}

			#musicBtn {
				top: max(8px, env(safe-area-inset-top));
				right: calc(max(8px, env(safe-area-inset-right)) + 82px);
			}

			#chargeBtn {
				left: max(10px, env(safe-area-inset-left));
				bottom: max(10px, env(safe-area-inset-bottom));
			}

			#miniWrap {
				right: max(8px, env(safe-area-inset-right));
				bottom: max(66px, calc(env(safe-area-inset-bottom) + 56px));
				width: 176px;
				height: 118px;
			}
		}
	</style>
</head>
<body>
	<a id="labBtn" href="https://gameart.top/time">返回实验室</a>
	<button id="musicBtn">音乐: 开</button>
	<button id="pauseBtn">暂停</button>
	<button id="chargeBtn">大喝</button>
	<canvas id="game"></canvas>
	<div id="miniWrap">
		<canvas id="mini"></canvas>
	</div>

	<script>
		const canvas = document.getElementById("game");
		const ctx = canvas.getContext("2d");
		const mini = document.getElementById("mini");
		const miniCtx = mini.getContext("2d");
		const pauseBtn = document.getElementById("pauseBtn");
		const musicBtn = document.getElementById("musicBtn");
		const chargeBtn = document.getElementById("chargeBtn");

		// Procedural royalty-free BGM (single-tone synth loop)
		let audioCtx = null;
		let musicTimer = null;
		let musicStep = 0;
		let bgmEnabled = true;
		let bgmTriedAutoplay = false;

		function syncMusicBtn() {
			musicBtn.textContent = `音乐: ${bgmEnabled ? "开" : "关"}`;
		}

		function noteFreq(note) {
			return 440 * Math.pow(2, (note - 69) / 12);
		}

		function playTone(note, duration, volume, type, when) {
			if (!audioCtx) return;
			const osc = audioCtx.createOscillator();
			const gain = audioCtx.createGain();
			osc.type = type;
			osc.frequency.setValueAtTime(noteFreq(note), when);
			gain.gain.setValueAtTime(0.0001, when);
			gain.gain.exponentialRampToValueAtTime(volume, when + 0.02);
			gain.gain.exponentialRampToValueAtTime(0.0001, when + duration);
			osc.connect(gain).connect(audioCtx.destination);
			osc.start(when);
			osc.stop(when + duration + 0.02);
		}

		function stopSynthBgm() {
			if (musicTimer) {
				clearInterval(musicTimer);
				musicTimer = null;
			}
		}

		function startSynthBgm() {
			if (!audioCtx || musicTimer) return;
			const melody = [64, 67, 69, 71, 72, 71, 69, 67, 64, 67, 69, 72, 71, 69, 67, 66];
			const bass = [40, 40, 43, 43, 45, 45, 43, 43, 40, 40, 43, 43, 47, 45, 43, 42];
			const beat = 0.28;

			musicTimer = setInterval(() => {
				if (!bgmEnabled || !audioCtx || audioCtx.state !== "running") return;
				const when = audioCtx.currentTime + 0.02;
				const i = musicStep % melody.length;
				playTone(melody[i], beat * 0.95, 0.075, "triangle", when);
				if (musicStep % 2 === 0) {
					playTone(bass[i], beat * 1.8, 0.058, "sine", when);
				}
				if (musicStep % 4 === 0) {
					playTone(melody[(i + 4) % melody.length], beat * 0.45, 0.04, "square", when + 0.06);
				}
				musicStep += 1;
			}, beat * 1000);
		}

		function tryStartBgm() {
			if (!bgmEnabled || gameState.over) return;
			if (!audioCtx) {
				audioCtx = new (window.AudioContext || window.webkitAudioContext)();
			}
			audioCtx.resume().then(() => {
				startSynthBgm();
			}).catch(() => {
				if (!bgmTriedAutoplay) {
					musicBtn.textContent = "音乐: 点按开启";
				}
			});
			bgmTriedAutoplay = true;
		}

		const CFG = {
			worldW: 5200,
			worldH: 3400,
			heroSpeed: 235,
			heroHp: 340,
			unitHp: 44,
			unitSpeed: 160,
			unitDps: 16,
			attackRange: 20,
			aggroRange: 160,
			spawnTickMs: 1800,
			neutralTickMs: 2600,
			maxFollowersBase: 22
		};

		const MISSION = {
			needOutposts: 4,
			needGenerals: 3
		};

		const rand = (min, max) => min + Math.random() * (max - min);
		const clamp = (v, min, max) => Math.max(min, Math.min(max, v));
		const dist = (a, b) => Math.hypot(a.x - b.x, a.y - b.y);

		const camera = {
			x: 0,
			y: 0
		};

		const clickMarker = {
			x: 0,
			y: 0,
			life: 0
		};

		const grassDots = [];
		for (let i = 0; i < 2600; i += 1) {
			grassDots.push({
				x: rand(0, CFG.worldW),
				y: rand(0, CFG.worldH),
				r: rand(0.8, 2),
				c: Math.random() > 0.5 ? "#6e9f61" : "#5b8c52"
			});
		}

		const hills = [];
		for (let i = 0; i < 120; i += 1) {
			hills.push({
				x: rand(140, CFG.worldW - 140),
				y: rand(120, CFG.worldH - 120),
				r: rand(70, 220),
				a: rand(0.08, 0.2)
			});
		}

		const forests = [];
		for (let i = 0; i < 900; i += 1) {
			forests.push({
				x: rand(0, CFG.worldW),
				y: rand(0, CFG.worldH),
				r: rand(3, 7),
				c: Math.random() > 0.5 ? "#4f7e45" : "#446f3d"
			});
		}

		const rocks = [];
		for (let i = 0; i < 210; i += 1) {
			rocks.push({
				x: rand(40, CFG.worldW - 40),
				y: rand(40, CFG.worldH - 40),
				w: rand(12, 35),
				h: rand(8, 28)
			});
		}

		function createLeader(x, y, team) {
			return {
				x,
				y,
				team,
				name: team === "ally" ? "张飞" : "敌将",
				weaponType: team === "ally" ? "pudao" : "saber",
				hp: CFG.heroHp,
				maxHp: CFG.heroHp,
				target: { x, y },
				speed: CFG.heroSpeed,
				dir: 0,
				radius: 12,
				slashTimer: 0,
				slashCd: 0,
				attackLock: 0,
				recoverTimer: 0,
				hitFlash: 0,
				hitStop: 0,
				active: true,
				dead: false,
				thinking: 0
			};
		}

		function createUnit(owner, team) {
			return {
				x: owner.x + rand(-30, 30),
				y: owner.y + rand(-30, 30),
				team,
				hp: CFG.unitHp,
				maxHp: CFG.unitHp,
				dead: false,
				speed: CFG.unitSpeed,
				dir: 0,
				slashTimer: 0,
				slashCd: 0,
				radius: 7,
				owner
			};
		}

		const player = createLeader(CFG.worldW * 0.5, CFG.worldH * 0.5, "ally");
		const enemies = [
			createLeader(700, 620, "enemy"),
			createLeader(CFG.worldW - 800, 700, "enemy"),
			createLeader(CFG.worldW - 1200, CFG.worldH - 720, "enemy"),
			createLeader(900, CFG.worldH - 630, "enemy")
		];
		enemies[0].name = "夏侯惇";
		enemies[1].name = "张辽";
		enemies[2].name = "许褚";
		enemies[3].name = "曹仁";
		enemies[0].weaponType = "saber";
		enemies[1].weaponType = "spear";
		enemies[2].weaponType = "hammer";
		enemies[3].weaponType = "halberd";
		enemies[0].active = true;
		enemies[1].active = true;
		enemies[2].active = false;
		enemies[3].active = false;
		enemies[0].isGuardLeader = true;
		enemies[1].isGuardLeader = false;
		enemies[2].isGuardLeader = false;
		enemies[3].isGuardLeader = false;
		player.chargeCool = 0;
		const allies = [];
		const enemyUnits = [];

		for (let i = 0; i < 10; i += 1) allies.push(createUnit(player, "ally"));
		for (const e of enemies) {
			if (!e.active) continue;
			for (let i = 0; i < 7; i += 1) enemyUnits.push(createUnit(e, "enemy"));
		}

		const outposts = [
				{ x: 1300, y: 860,  owner: "neutral", tick: 0, r: 62, name: "许昌", breakParts: [] },
				{ x: 2550, y: 640,  owner: "neutral", tick: 0, r: 62, name: "邺城", breakParts: [] },
				{ x: 3880, y: 940,  owner: "neutral", tick: 0, r: 62, name: "北平", breakParts: [] },
				{ x: 2550, y: 1880, owner: "neutral", tick: 0, r: 62, name: "汉阳", breakParts: [] },
				{ x: 1470, y: 2480, owner: "neutral", tick: 0, r: 62, name: "江陵", breakParts: [] },
				{ x: 2650, y: 2730, owner: "neutral", tick: 0, r: 62, name: "襄阳", breakParts: [] },
				{ x: 3920, y: 2500, owner: "neutral", tick: 0, r: 62, name: "建业", breakParts: [] }
		];

		const mines = [
			{ x: 2425, y: 485, r: 34, name: "金矿", resource: "gold", outpost: outposts[1], tick: 0, sparkle: 0 },
			{ x: 2445, y: 1985, r: 34, name: "铁矿", resource: "iron", outpost: outposts[3], tick: 0, sparkle: 0 },
			{ x: 2665, y: 2000, r: 34, name: "铁矿", resource: "iron", outpost: outposts[3], tick: 0, sparkle: 0 },
			{ x: 2860, y: 2870, r: 34, name: "金矿", resource: "gold", outpost: outposts[5], tick: 0, sparkle: 0 }
		];
		const mineWorkers = [];
		let mineWorkerSeed = 0;
		const hanyangOutpost = outposts[3];
		const clinic = {
			x: 1325,
			y: 2595,
			r: 44,
			name: "医馆",
			outpost: outposts[4],
			pulse: 0,
			tick: 0
		};
		const stable = { x: 4065, y: 822, r: 42, name: "马场", outpost: outposts[2] };

		const xiahouDunGuardOutpost = outposts[0];
		const xiahouDunGuardPos = {
			x: xiahouDunGuardOutpost.x - xiahouDunGuardOutpost.r - 18,
			y: xiahouDunGuardOutpost.y + 18
		};
		enemies[0].guardPos = xiahouDunGuardPos;
		enemies[0].x = xiahouDunGuardPos.x;
		enemies[0].y = xiahouDunGuardPos.y;
		enemies[0].target = { ...xiahouDunGuardPos };

		const enemyReinforcementWaves = [
			{ delay: 30, indices: [2, 3] }
		];
		let enemyWaveTimer = 0;
		let enemyWaveIndex = 0;

		function activateEnemyLeader(index) {
			const e = enemies[index];
			if (!e || e.dead || e.active) return;
			e.active = true;
			e.thinking = 0;
			e.target = { x: player.x + rand(-220, 220), y: player.y + rand(-220, 220) };
			for (let i = 0; i < 7; i += 1) enemyUnits.push(createUnit(e, "enemy"));
		}

		function updateEnemyWaves(dt) {
			if (enemyWaveIndex >= enemyReinforcementWaves.length) return;
			enemyWaveTimer += dt;
			const wave = enemyReinforcementWaves[enemyWaveIndex];
			if (enemyWaveTimer < wave.delay) return;
			enemyWaveTimer = 0;
			for (const idx of wave.indices) activateEnemyLeader(idx);
			enemyWaveIndex += 1;
		}

		const biomes = [
			{ type: "wet",    x: 980,  y: 1380, r: 520 },
			{ type: "wet",    x: 3440, y: 2080, r: 460 },
			{ type: "hill",   x: 1820, y: 760,  r: 560 },
			{ type: "hill",   x: 3140, y: 980,  r: 500 },
			{ type: "forest", x: 1180, y: 2520, r: 560 },
			{ type: "forest", x: 2920, y: 2620, r: 500 }
		];

		// Western mountain chain — impassable barrier
		const mountainZones = [
			{ x: 165, y: 100,  r: 168 },
			{ x: 195, y: 375,  r: 178 },
			{ x: 155, y: 655,  r: 172 },
			{ x: 190, y: 935,  r: 180 },
			{ x: 150, y: 1210, r: 170 },
			{ x: 180, y: 1490, r: 175 },
			{ x: 158, y: 1770, r: 168 },
			{ x: 192, y: 2050, r: 176 },
			{ x: 152, y: 2330, r: 172 },
			{ x: 185, y: 2610, r: 170 },
			{ x: 162, y: 2885, r: 174 },
			{ x: 178, y: 3160, r: 168 },
			// 武当山 — left of Hanyang (2550,1880)
			{ x: 1980, y: 1760, r: 148, name: "武当山" },
			{ x: 1870, y: 1980, r: 136 },
			{ x: 2080, y: 1960, r: 122 },
			{ x: 1940, y: 2140, r: 118 }
		];

		const chargeEffects = []; // { x, y, life, r }

		function viewToWorld(cx, cy) {
			return { x: cx + camera.x, y: cy + camera.y };
		}

		function miniToWorld(clientX, clientY) {
			const rect = mini.getBoundingClientRect();
			const localX = clamp(clientX - rect.left, 0, rect.width);
			const localY = clamp(clientY - rect.top, 0, rect.height);
			return {
				x: (localX / rect.width) * CFG.worldW,
				y: (localY / rect.height) * CFG.worldH
			};
		}

		function moveTo(entity, tx, ty, speed, dt) {
			const dx = tx - entity.x;
			const dy = ty - entity.y;
			const d = Math.hypot(dx, dy);
			if (d < 0.001) return d;
			entity.dir = Math.atan2(dy, dx);
			const step = speed * dt;
			if (d <= step) {
				entity.x = tx;
				entity.y = ty;
				return d;
			}
			entity.x += (dx / d) * step;
			entity.y += (dy / d) * step;
			return d;
		}

		function nearest(list, from, predicate) {
			let best = null;
			let bestD = Infinity;
			for (const x of list) {
				if (x.dead) continue;
				if (predicate && !predicate(x)) continue;
				const d = dist(from, x);
				if (d < bestD) {
					best = x;
					bestD = d;
				}
			}
			return { target: best, d: bestD };
		}

		function pushOutMountains(entity) {
			const r = entity.radius || 7;
			for (const m of mountainZones) {
				const dx = entity.x - m.x;
				const dy = entity.y - m.y;
				const d = Math.hypot(dx, dy);
				const minD = m.r + r;
				if (d < minD) {
					const nx = d > 0.001 ? dx / d : 1;
					const ny = d > 0.001 ? dy / d : 0;
					entity.x = m.x + nx * minD;
					entity.y = m.y + ny * minD;
				}
			}
		}

		function triggerBreakAnim(o) {
			o.breakParts = [];
			for (let i = 0; i < 16; i++) {
				const angle = Math.random() * Math.PI * 2;
				const spd = rand(55, 145);
				o.breakParts.push({
					x: o.x + rand(-22, 22),
					y: o.y + rand(-12, 12),
					vx: Math.cos(angle) * spd,
					vy: Math.sin(angle) * spd - 65,
					life: 1,
					w: rand(4, 11),
					h: rand(3, 7),
					color: Math.random() > 0.5 ? "#8b7055" : "#c4a97d"
				});
			}
		}

		function createMineWorker(mine, team) {
			mineWorkerSeed += 1;
			return {
				id: mineWorkerSeed,
				x: mine.x + rand(-10, 10),
				y: mine.y + rand(-8, 8),
				team,
				mine,
				phase: "toMine",
				carrying: false,
				speed: 98,
				radius: 5,
				dir: 0,
				wait: rand(0.1, 0.9),
				offsetX: rand(-16, 16),
				offsetY: rand(-10, 10)
			};
		}

		function mineWorkerTarget(worker) {
			if (worker.phase === "toMine") {
				return {
					x: worker.mine.x + worker.offsetX,
					y: worker.mine.y + worker.offsetY
				};
			}
			return {
				x: worker.mine.outpost.x + worker.offsetX * 0.38,
				y: worker.mine.outpost.y + 16 + worker.offsetY * 0.35
			};
		}

		function getTeamAttackMultiplier(team) {
			return hanyangOutpost.owner === team ? 1.22 : 1;
		}

		function triggerUnitSlash(attacker, target) {
			attacker.slashTimer = 0.12;
			attacker.slashCd = 0.34;
			if (!target) return;
			const dx = target.x - attacker.x;
			const dy = target.y - attacker.y;
			attacker.dir = Math.atan2(dy, dx);
		}

		function updatePlayer(dt) {
			if (player.dead) return;
			const mountSpeed = stable.outpost.owner === "ally" ? CFG.heroSpeed * 1.55 : CFG.heroSpeed;
			const moveScale = (player.attackLock > 0 || player.hitStop > 0) ? 0.18 : player.recoverTimer > 0 ? 0.52 : 1;
			const moveSpeed = mountSpeed * moveScale;
			const mx = (moveInput.right ? 1 : 0) - (moveInput.left ? 1 : 0);
			const my = (moveInput.down ? 1 : 0) - (moveInput.up ? 1 : 0);
			if (mx !== 0 || my !== 0) {
				const d = Math.hypot(mx, my) || 1;
				const nx = mx / d;
				const ny = my / d;
				player.x += nx * moveSpeed * dt;
				player.y += ny * moveSpeed * dt;
				player.dir = Math.atan2(ny, nx);
				player.target.x = player.x;
				player.target.y = player.y;
			} else {
				moveTo(player, player.target.x, player.target.y, moveSpeed, dt);
			}
			player.x = clamp(player.x, 50, CFG.worldW - 50);
			player.y = clamp(player.y, 50, CFG.worldH - 50);
			pushOutMountains(player);
		}

		function applyKnockback(src, target, power) {
			const dx = target.x - src.x;
			const dy = target.y - src.y;
			const d = Math.max(0.001, Math.hypot(dx, dy));
			const nx = dx / d;
			const ny = dy / d;
			target.x += nx * power;
			target.y += ny * power;
			src.x -= nx * power * 0.2;
			src.y -= ny * power * 0.2;
		}

		function pushAwayOnly(src, target, power) {
			const dx = target.x - src.x;
			const dy = target.y - src.y;
			const d = Math.max(0.001, Math.hypot(dx, dy));
			const nx = dx / d;
			const ny = dy / d;
			target.x += nx * power;
			target.y += ny * power;
		}

		function triggerLeaderSlash(attacker, target) {
			if (attacker.team === "enemy") {
				attacker.slashTimer = 0.52;
				attacker.slashCd = 1.02;
				attacker.attackLock = 0.2;
				attacker.recoverTimer = Math.max(attacker.recoverTimer, 0.32);
			} else {
				attacker.slashTimer = 0.34;
				attacker.slashCd = 0.72;
				attacker.attackLock = 0.11;
				attacker.recoverTimer = Math.max(attacker.recoverTimer, 0.2);
			}
			if (!target) return;
			const dx = target.x - attacker.x;
			const dy = target.y - attacker.y;
			attacker.dir = Math.atan2(dy, dx);
		}

		function updateEnemyLeaders(dt) {
			for (const e of enemies) {
				if (e.dead || !e.active) continue;
				if (e.attackLock > 0 || e.recoverTimer > 0) continue;
				if (e.guardPos) {
					if (dist(e, player) < 116 && e.slashCd <= 0) triggerLeaderSlash(e, player);
					e.target = e.guardPos;
					e.x = e.guardPos.x;
					e.y = e.guardPos.y;
					continue;
				}
				e.thinking -= dt;
				if (e.thinking <= 0 || dist(e, e.target) < 40) {
					e.thinking = rand(1.1, 2.8);
					const bias = Math.random() > 0.45 ? player : null;
					if (bias) {
						e.target = { x: player.x + rand(-260, 260), y: player.y + rand(-260, 260) };
					} else {
						e.target = { x: rand(500, CFG.worldW - 300), y: rand(300, CFG.worldH - 300) };
					}
				}
				moveTo(e, e.target.x, e.target.y, e.speed * 0.6, dt);
				e.x = clamp(e.x, 60, CFG.worldW - 60);
				e.y = clamp(e.y, 60, CFG.worldH - 60);
				pushOutMountains(e);
				if (dist(e, player) < 116 && e.slashCd <= 0) triggerLeaderSlash(e, player);
			}
		}

		function formationTarget(leader, index, total) {
			const ring = Math.floor(Math.sqrt(index));
			const angle = (index * 137.5 * Math.PI) / 180;
			const rad = 36 + ring * 18 + (total > 22 ? (index % 3) * 4 : 0);
			return {
				x: leader.x + Math.cos(angle) * rad,
				y: leader.y + Math.sin(angle) * rad
			};
		}

		function updateUnitSwarm(units, leader, friendly, enemyPool, enemyLeaders, dt) {
			for (let i = 0; i < units.length; i += 1) {
				const u = units[i];
				if (u.dead) continue;

				const ne1 = nearest(enemyPool, u);
				const ne2 = nearest(enemyLeaders, u, (l) => !l.dead);
				let target = null;
				let td = Infinity;

				if (ne1.target && ne1.d < td) {
					target = ne1.target;
					td = ne1.d;
				}
				if (ne2.target && ne2.d < td) {
					target = ne2.target;
					td = ne2.d;
				}

				if (target && td < CFG.aggroRange) {
					if (td <= CFG.attackRange + 6) {
						u.dir = Math.atan2(target.y - u.y, target.x - u.x);
						if (u.slashCd <= 0) triggerUnitSlash(u, target);
						target.hp -= CFG.unitDps * getTeamAttackMultiplier(u.team) * dt;
						applyKnockback(u, target, 0.9);
					} else {
						moveTo(u, target.x, target.y, u.speed, dt);
					}
				} else {
					const p = formationTarget(leader, i, friendly.length);
					moveTo(u, p.x, p.y, u.speed, dt);
				}

				u.x = clamp(u.x, 20, CFG.worldW - 20);
				u.y = clamp(u.y, 20, CFG.worldH - 20);
				pushOutMountains(u);
				if (u.hp <= 0) u.dead = true;
			}
		}

		function applyCrowdCollision(groupA, groupB, sameGroup) {
			for (let i = 0; i < groupA.length; i += 1) {
				const a = groupA[i];
				if (!a || a.dead) continue;
				const jStart = sameGroup ? i + 1 : 0;
				for (let j = jStart; j < groupB.length; j += 1) {
					const b = groupB[j];
					if (!b || b.dead) continue;
					const dx = b.x - a.x;
					const dy = b.y - a.y;
					const d = Math.hypot(dx, dy) || 0.001;
					const minDist = (a.radius || 7) + (b.radius || 7) + 2;
					if (d < minDist) {
						const overlap = minDist - d;
						const nx = dx / d;
						const ny = dy / d;
						a.x -= nx * overlap * 0.55;
						a.y -= ny * overlap * 0.55;
						b.x += nx * overlap * 0.55;
						b.y += ny * overlap * 0.55;
					}
				}
			}
		}

		function spawnSystem(dtMs) {
			spawnSystem.timer += dtMs;
			if (spawnSystem.timer >= CFG.spawnTickMs) {
				spawnSystem.timer = 0;
				const cap = CFG.maxFollowersBase + outposts.filter((x) => x.owner === "ally").length * 2;
				if (allies.filter((u) => !u.dead).length < cap) {
					allies.push(createUnit(player, "ally"));
				}
				for (const e of enemies) {
					if (e.dead || !e.active) continue;
					const count = enemyUnits.filter((u) => !u.dead && u.owner === e).length;
					if (count < 12) enemyUnits.push(createUnit(e, "enemy"));
				}
			}
		}
		spawnSystem.timer = 0;

		function outpostSystem(dtMs) {
			for (const o of outposts) {
				const nearAlly = dist(player, o) < o.r + 24 || allies.some((u) => !u.dead && dist(u, o) < o.r + 10);
				const nearEnemy = enemies.some((e) => e.active && !e.dead && dist(e, o) < o.r + 24) || enemyUnits.some((u) => !u.dead && dist(u, o) < o.r + 10);

				const oldOwner = o.owner;
				if (nearAlly && !nearEnemy) o.owner = "ally";
				else if (nearEnemy && !nearAlly) o.owner = "enemy";
				if (o.owner !== oldOwner) triggerBreakAnim(o);

				o.tick += dtMs;
				if (o.tick >= CFG.neutralTickMs) {
					o.tick = 0;
					if (o.owner === "ally" && allies.filter((u) => !u.dead).length < 30) {
						allies.push(createUnit(player, "ally"));
					}
					if (o.owner === "enemy") {
						const activeEnemyLeaders = enemies.filter((e) => e.active && !e.dead);
						const owner = activeEnemyLeaders[Math.floor(Math.random() * Math.max(1, activeEnemyLeaders.length))];
						if (owner) enemyUnits.push(createUnit(owner, "enemy"));
					}
				}
			}
		}

		function mineSystem(dt, dtMs) {
			for (let i = mineWorkers.length - 1; i >= 0; i -= 1) {
				const worker = mineWorkers[i];
				const owner = worker.mine.outpost.owner;
				if (owner === "neutral") {
					mineWorkers.splice(i, 1);
					continue;
				}
				worker.team = owner;
				if (worker.wait > 0) {
					worker.wait = Math.max(0, worker.wait - dt);
					continue;
				}
				const target = mineWorkerTarget(worker);
				const remaining = moveTo(worker, target.x, target.y, worker.speed, dt);
				if (worker.phase === "toMine" && remaining <= 8) {
					worker.phase = "toOutpost";
					worker.carrying = true;
					worker.wait = rand(0.28, 0.75);
					worker.mine.sparkle = 1;
				} else if (worker.phase === "toOutpost" && remaining <= worker.mine.outpost.r * 0.42) {
					worker.phase = "toMine";
					worker.carrying = false;
					worker.wait = rand(0.2, 0.55);
				}
				worker.x = clamp(worker.x, 16, CFG.worldW - 16);
				worker.y = clamp(worker.y, 16, CFG.worldH - 16);
				pushOutMountains(worker);
			}

			for (const mine of mines) {
				mine.sparkle = Math.max(0, mine.sparkle - dt * 1.8);
				if (mine.outpost.owner === "neutral") {
					mine.tick = 0;
					continue;
				}
				mine.tick += dtMs;
				const activeWorkers = mineWorkers.filter((worker) => worker.mine === mine).length;
				if (mine.tick >= 2200 && activeWorkers < 3) {
					mine.tick = 0;
					mineWorkers.push(createMineWorker(mine, mine.outpost.owner));
				}
			}
		}

		function clinicSystem(dt, dtMs) {
			clinic.pulse = Math.max(0, clinic.pulse - dt * 1.8);
			if (clinic.outpost.owner === "neutral") {
				clinic.tick = 0;
				return;
			}

			const healRadius = 180;
			const nearClinic = (entity, extra) => !entity.dead && dist(entity, clinic) <= healRadius + (extra || 0);

			if (clinic.outpost.owner === "ally") {
				if (nearClinic(player, 14)) {
					player.hp = Math.min(player.maxHp, player.hp + 20 * dt);
				}
				for (const u of allies) {
					if (nearClinic(u, 4)) u.hp = Math.min(u.maxHp, u.hp + 12 * dt);
				}
			} else if (clinic.outpost.owner === "enemy") {
				for (const e of enemies) {
					if (!e.active || !nearClinic(e, 14)) continue;
					e.hp = Math.min(e.maxHp, e.hp + 18 * dt);
				}
				for (const u of enemyUnits) {
					if (nearClinic(u, 4)) u.hp = Math.min(u.maxHp, u.hp + 12 * dt);
				}
			}

			clinic.tick += dtMs;
			if (clinic.tick >= 900) {
				clinic.tick = 0;
				clinic.pulse = 1;
			}
		}

		function cleanup() {
			for (const l of [player, ...enemies]) {
				if (!l.dead && l.hp <= 0) l.dead = true;
			}
			const allyOut = outposts.filter((o) => o.owner === "ally").length;
			const deadEnemyGenerals = enemies.filter((e) => e.dead).length;
			const aliveEnemies = enemies.filter((e) => e.active && !e.dead).length;
			const missionDone = allyOut >= MISSION.needOutposts && deadEnemyGenerals >= MISSION.needGenerals;
			if (missionDone || aliveEnemies === 0) gameState.result = "游戏通关";
			if (player.dead) gameState.result = "失败";
			if (gameState.result) gameState.over = true;
		}

		function updateCamera(dt) {
			const targetX = player.x - canvas.width / 2;
			const targetY = player.y - canvas.height / 2;
			const smooth = 1 - Math.pow(0.001, dt);
			camera.x += (targetX - camera.x) * smooth;
			camera.y += (targetY - camera.y) * smooth;
			camera.x = clamp(camera.x, 0, CFG.worldW - canvas.width);
			camera.y = clamp(camera.y, 0, CFG.worldH - canvas.height);
		}

		function drawHealthBar(x, y, w, hp, maxHp, color) {
			ctx.fillStyle = "rgba(20,20,20,0.7)";
			ctx.fillRect(x - w / 2, y, w, 5);
			ctx.fillStyle = color;
			ctx.fillRect(x - w / 2 + 1, y + 1, (w - 2) * clamp(hp / maxHp, 0, 1), 3);
		}

		function drawSoldier(entity, isLeader, baseColor, accentColor) {
			ctx.save();
			ctx.translate(entity.x, entity.y);

			const scale = isLeader ? 1.25 : 0.82;
			ctx.scale(scale, scale);

			// mounted horse body
			if (isLeader && entity === player && stable.outpost.owner === "ally") {
				ctx.fillStyle = "#8b5e3c";
				ctx.beginPath();
				ctx.ellipse(0, 13, 14, 7.5, 0, 0, Math.PI * 2);
				ctx.fill();
				ctx.fillStyle = "#7a4a24";
				ctx.beginPath();
				ctx.ellipse(10, 5, 6.5, 5, -0.5, 0, Math.PI * 2);
				ctx.fill();
				ctx.strokeStyle = "#5a3010";
				ctx.lineWidth = 2.2;
				ctx.beginPath();
				ctx.moveTo(-9, 18); ctx.lineTo(-10, 26);
				ctx.moveTo(-3, 20); ctx.lineTo(-3, 28);
				ctx.moveTo(3, 20);  ctx.lineTo(4, 28);
				ctx.moveTo(9, 17);  ctx.lineTo(10, 25);
				ctx.stroke();
			}

			ctx.strokeStyle = "rgba(0,0,0,0.35)";
			ctx.lineWidth = 2;
			ctx.beginPath();
			ctx.moveTo(0, 2);
			ctx.lineTo(-4, 9);
			ctx.moveTo(0, 2);
			ctx.lineTo(4, 9);
			ctx.stroke();

			ctx.fillStyle = baseColor;
			ctx.fillRect(-4.6, -8.2, 9.2, 12.2);

			ctx.fillStyle = accentColor;
			ctx.fillRect(-6.2, -6.8, 2.6, 6);
			ctx.fillRect(3.6, -6.8, 2.6, 6);

			ctx.strokeStyle = "#2f2518";
			ctx.lineWidth = 2;
			ctx.beginPath();
			ctx.moveTo(-2, 4);
			ctx.lineTo(-2.5, 11);
			ctx.moveTo(2, 4);
			ctx.lineTo(2.5, 11);
			ctx.stroke();

			ctx.fillStyle = "#e7c59e";
			ctx.beginPath();
			ctx.arc(0, -11.5, 4.6, 0, Math.PI * 2);
			ctx.fill();

			ctx.fillStyle = "#2f1e16";
			ctx.fillRect(-5, -14.8, 10, 2.8);

			if (isLeader) {
				const empoweredBlade = entity === player && hanyangOutpost.owner === "ally";
				const weaponType = entity.weaponType || "saber";
				ctx.save();
				ctx.rotate((entity.dir || 0) + 0.06);
				if (empoweredBlade) {
					ctx.shadowColor = "rgba(255, 221, 96, 0.95)";

				if (weaponType === "pudao") {

					if (entity.slashTimer > 0) {
						const swingP = 1 - entity.slashTimer / 0.34;

						ctx.translate(ext * 0.28, -ext * 0.6);
					}

					// counterweight knob at butt of handle (刀背配重)
					ctx.fillStyle = empoweredBlade ? "#a07830" : "#4d3621";
					ctx.beginPath();
					ctx.ellipse(-5.2, 7.2, 3.2, 2.1, 0.9, 0, Math.PI * 2);
					ctx.fill();

					// shaft
					ctx.strokeStyle = empoweredBlade ? "#8a682a" : "#6b4c2d";
					ctx.lineWidth = 3;
					ctx.beginPath();
					ctx.moveTo(-3.2, 4.6);
					ctx.lineTo(16.8, -21.4);
					ctx.stroke();

					// blade body
					ctx.fillStyle = empoweredBlade ? "#f0cd60" : "#cfd7e1";
					ctx.beginPath();
					ctx.moveTo(16.2, -21.8);
					ctx.lineTo(24.6, -31.2);
					ctx.lineTo(22.6, -15.8);
					ctx.lineTo(18.4, -19.1);

					ctx.fill();

					// blade spine — dark ridge (刀背)
					ctx.strokeStyle = empoweredBlade ? "#7a5515" : "#8a9aaa";

					ctx.beginPath();
					ctx.moveTo(16.6, -21.4);
					ctx.lineTo(22.8, -15.6);
					ctx.stroke();

					// cutting edge highlight

					ctx.lineTo(22.1, -24.6);
					ctx.lineTo(21.3, -18.6);
					ctx.closePath();
					ctx.fill();

					// edge line (刀刃)
					ctx.strokeStyle = empoweredBlade ? "#f5d46d" : "#d8e0e9";

					ctx.moveTo(16.6, -21.2);
					ctx.lineTo(23.6, -29.1);

					ctx.lineTo(18, -20);
					ctx.stroke();
					ctx.strokeStyle = "#d5dce5";
					ctx.lineWidth = 1.6;

					ctx.lineTo(23, -24);
					ctx.lineTo(21, -18);
					ctx.stroke();

					ctx.beginPath();

					ctx.lineTo(9, -15);
					ctx.stroke();
					ctx.fillStyle = "#adb8c4";

					ctx.lineWidth = 2.4;
					ctx.beginPath();
					ctx.moveTo(-2, 4);
					ctx.lineTo(14, -19);
					ctx.stroke();
					ctx.strokeStyle = "#d0d9e2";
					ctx.lineWidth = 1.8;
					ctx.beginPath();
					ctx.moveTo(13.5, -19.2);
					ctx.quadraticCurveTo(22, -24, 21, -10.5);
					ctx.moveTo(14.5, -16.5);
					ctx.lineTo(7.5, -20.5);
					ctx.stroke();
				} else {
					ctx.strokeStyle = "#5f4327";
					ctx.lineWidth = 2.2;
					ctx.beginPath();
					ctx.moveTo(-2, 4);
					ctx.lineTo(14, -18);
					ctx.stroke();
				}

				ctx.restore();

				ctx.strokeStyle = "rgba(255, 248, 209, 0.9)";
				ctx.lineWidth = 2;
				ctx.beginPath();
				ctx.arc(0, -2, 14 + Math.sin(performance.now() * 0.01) * 1.2, 0, Math.PI * 2);
				ctx.stroke();

				if (entity.hitFlash > 0) {
					const hf = entity.hitFlash;
					// outer warm bloom
					ctx.fillStyle = `rgba(255, 210, 100, ${clamp(hf * 0.38, 0, 0.36)})`;
					ctx.beginPath();
					ctx.ellipse(0, -5.5, 14, 16, 0, 0, Math.PI * 2);
					ctx.fill();
					// inner white core
					ctx.fillStyle = `rgba(255, 252, 230, ${clamp(0.18 + hf * 0.52, 0, 0.72)})`;
					ctx.beginPath();
					ctx.ellipse(0, -5.5, 9.8, 11, 0, 0, Math.PI * 2);
					ctx.fill();
				}

				if (entity.slashTimer > 0) {
					const t = clamp(entity.slashTimer / 0.34, 0, 1);
					const heavy = entity.attackLock > 0 ? 0.5 : entity.recoverTimer > 0 ? -0.25 : 0;
					const swing = (1 - t) * 1.5 - 0.85 + heavy;
					const facing = entity.dir || 0;
					const sa = facing - 1.35 + swing;
					const ea = facing + 0.22 + swing;

					ctx.strokeStyle = empoweredBlade ? `rgba(255, 218, 86, ${0.48 + (1 - t) * 0.42})` : `rgba(255, 231, 156, ${0.38 + (1 - t) * 0.52})`;
					ctx.lineWidth = 4.6;
					ctx.beginPath();
					ctx.arc(0, -8, 18.8, sa, ea);
					ctx.stroke();

					ctx.strokeStyle = empoweredBlade ? `rgba(255, 248, 198, ${0.32 + (1 - t) * 0.44})` : `rgba(255, 255, 255, ${0.25 + (1 - t) * 0.4})`;
					ctx.lineWidth = 1.8;
					ctx.beginPath();
					ctx.arc(0, -8, 15.2, sa + 0.05, ea - 0.08);
					ctx.stroke();
				}
			} else if (entity.slashTimer > 0) {
				const t = clamp(entity.slashTimer / 0.12, 0, 1);
				const swing = (1 - t) * 1.35 - 0.72;
				const facing = entity.dir || 0;
				const sa = facing - 1.05 + swing;
				const ea = facing + 0.05 + swing;

				ctx.strokeStyle = `rgba(255, 228, 150, ${0.28 + (1 - t) * 0.45})`;
				ctx.lineWidth = 2.1;
				ctx.beginPath();
				ctx.arc(0, -5, 10.5, sa, ea);
				ctx.stroke();

				ctx.strokeStyle = `rgba(255, 255, 255, ${0.16 + (1 - t) * 0.28})`;
				ctx.lineWidth = 0.9;
				ctx.beginPath();
				ctx.arc(0, -5, 8.2, sa + 0.03, ea - 0.04);
				ctx.stroke();
			}

			ctx.restore();
		}

			ctx.lineWidth = 1.4;
			ctx.beginPath();
			ctx.moveTo(0, 1);
			ctx.lineTo(-2.2, 5.6);
			ctx.moveTo(0, 1);

			ctx.fillStyle = body;
			ctx.fillRect(-2.8, -4.5, 5.6, 7.2);
			ctx.fillStyle = accent;
			ctx.fillRect(-3.7, -3.3, 1.2, 4.2);

			ctx.fillStyle = "#ecc8a0";

				ctx.strokeStyle = worker.mine.resource === "iron" ? "rgba(235, 241, 247, 0.65)" : "rgba(255, 249, 201, 0.65)";
				ctx.lineWidth = 0.9;
				ctx.strokeRect(2.2, -6.2, 4.1, 4.1);
			}

		}

		function drawMap() {
			const bg = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
			bg.addColorStop(0, "#86b576");
			bg.addColorStop(1, "#6f9f63");
			ctx.fillStyle = bg;
			ctx.fillRect(0, 0, canvas.width, canvas.height);

			ctx.save();
			ctx.translate(-camera.x, -camera.y);

			for (const b of biomes) {
				if (b.x < camera.x - b.r || b.x > camera.x + canvas.width + b.r) continue;
				if (b.y < camera.y - b.r || b.y > camera.y + canvas.height + b.r) continue;
				const g = ctx.createRadialGradient(b.x, b.y, b.r * 0.15, b.x, b.y, b.r);
				if (b.type === "wet") {
					g.addColorStop(0, "rgba(107, 143, 118, 0.45)");
					g.addColorStop(1, "rgba(96, 127, 109, 0.02)");
				} else if (b.type === "hill") {
					g.addColorStop(0, "rgba(170, 155, 117, 0.4)");
					g.addColorStop(1, "rgba(154, 141, 104, 0.02)");
				} else {
					g.addColorStop(0, "rgba(75, 109, 63, 0.42)");
					g.addColorStop(1, "rgba(70, 100, 60, 0.02)");
				}
				ctx.fillStyle = g;
				ctx.beginPath();
				ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
				ctx.fill();

				if (b.type === "wet") {
					ctx.strokeStyle = "rgba(86, 125, 131, 0.22)";
					ctx.lineWidth = 2;
					for (let i = 0; i < 6; i += 1) {
						ctx.beginPath();
						const rr = b.r * (0.32 + i * 0.11);
						ctx.arc(b.x + i * 4, b.y - i * 3, rr, 0.3, Math.PI * 1.35);
						ctx.stroke();
					}
				} else if (b.type === "hill") {
					ctx.strokeStyle = "rgba(177, 160, 122, 0.22)";
					ctx.lineWidth = 2;
					for (let i = 0; i < 5; i += 1) {
						ctx.beginPath();
						ctx.ellipse(b.x, b.y, b.r * (0.35 + i * 0.13), b.r * (0.2 + i * 0.08), 0.2, 0, Math.PI * 2);
						ctx.stroke();
					}
				} else {
					ctx.fillStyle = "rgba(44, 68, 41, 0.2)";
					for (let i = 0; i < 70; i += 1) {
						const px = b.x + rand(-b.r * 0.75, b.r * 0.75);
						const py = b.y + rand(-b.r * 0.75, b.r * 0.75);
						if (Math.hypot(px - b.x, py - b.y) > b.r * 0.8) continue;
						ctx.fillRect(px, py, 2, 2);
					}
				}
			}

			for (const g of grassDots) {
				if (g.x < camera.x - 10 || g.x > camera.x + canvas.width + 10) continue;
				if (g.y < camera.y - 10 || g.y > camera.y + canvas.height + 10) continue;
				ctx.fillStyle = g.c;
				ctx.beginPath();
				ctx.arc(g.x, g.y, g.r, 0, Math.PI * 2);
				ctx.fill();
			}

			for (const h of hills) {
				if (h.x < camera.x - h.r || h.x > camera.x + canvas.width + h.r) continue;
				if (h.y < camera.y - h.r || h.y > camera.y + canvas.height + h.r) continue;
				const grad = ctx.createRadialGradient(h.x - h.r * 0.2, h.y - h.r * 0.25, h.r * 0.2, h.x, h.y, h.r);
				grad.addColorStop(0, `rgba(185, 176, 130, ${h.a + 0.06})`);
				grad.addColorStop(1, "rgba(120, 116, 82, 0)");
				ctx.fillStyle = grad;
				ctx.beginPath();
				ctx.arc(h.x, h.y, h.r, 0, Math.PI * 2);
				ctx.fill();
			}

			ctx.strokeStyle = "rgba(55, 93, 116, 0.52)";
			ctx.lineWidth = 42;
			ctx.lineCap = "round";
			ctx.beginPath();
			ctx.moveTo(420, 260);
			ctx.bezierCurveTo(1100, 900, 2200, 1150, 3200, 1600);
			ctx.bezierCurveTo(3900, 1880, 4600, 2500, 4980, 3060);
			ctx.stroke();

			ctx.strokeStyle = "#4e97b3";
			ctx.lineWidth = 31;
			ctx.beginPath();
			ctx.moveTo(420, 260);
			ctx.bezierCurveTo(1100, 900, 2200, 1150, 3200, 1600);
			ctx.bezierCurveTo(3900, 1880, 4600, 2500, 4980, 3060);
			ctx.stroke();

			ctx.strokeStyle = "#8c7450";
			ctx.lineWidth = 22;
			ctx.beginPath();
			ctx.moveTo(350, 560);
			ctx.lineTo(2200, 540);
			ctx.lineTo(4780, 840);
			ctx.stroke();

			ctx.beginPath();
			ctx.moveTo(420, 1640);
			ctx.lineTo(2300, 1700);
			ctx.lineTo(4850, 2340);
			ctx.stroke();

			ctx.beginPath();
			ctx.moveTo(600, 3000);
			ctx.lineTo(2480, 2620);
			ctx.lineTo(4860, 2860);
			ctx.stroke();

			ctx.strokeStyle = "rgba(199, 171, 120, 0.45)";
			ctx.setLineDash([7, 9]);
			ctx.lineWidth = 3;
			ctx.beginPath();
			ctx.moveTo(350, 560);
			ctx.lineTo(2200, 540);
			ctx.lineTo(4780, 840);
			ctx.moveTo(420, 1640);
			ctx.lineTo(2300, 1700);
			ctx.lineTo(4850, 2340);
			ctx.moveTo(600, 3000);
			ctx.lineTo(2480, 2620);
			ctx.lineTo(4860, 2860);
			ctx.stroke();
			ctx.setLineDash([]);

			for (const f of forests) {
				if (f.x < camera.x - 12 || f.x > camera.x + canvas.width + 12) continue;
				if (f.y < camera.y - 12 || f.y > camera.y + canvas.height + 12) continue;
				ctx.fillStyle = "rgba(39, 60, 31, 0.25)";
				ctx.beginPath();
				ctx.arc(f.x + 2, f.y + 3, f.r * 1.1, 0, Math.PI * 2);
				ctx.fill();
				ctx.fillStyle = f.c;
				ctx.beginPath();
				ctx.arc(f.x, f.y, f.r, 0, Math.PI * 2);
				ctx.fill();
			}

			for (const r of rocks) {
				if (r.x < camera.x - 20 || r.x > camera.x + canvas.width + 20) continue;
				if (r.y < camera.y - 20 || r.y > camera.y + canvas.height + 20) continue;
				ctx.fillStyle = "rgba(95, 98, 91, 0.65)";
				ctx.fillRect(r.x - r.w * 0.5, r.y - r.h * 0.5, r.w, r.h);
				ctx.fillStyle = "rgba(147, 153, 142, 0.45)";
				ctx.fillRect(r.x - r.w * 0.42, r.y - r.h * 0.42, r.w * 0.48, r.h * 0.36);
			}

			// ===== WESTERN MOUNTAIN RANGE =====
			for (const m of mountainZones) {
				if (m.x + m.r < camera.x || m.x - m.r > camera.x + canvas.width) continue;
				if (m.y + m.r < camera.y || m.y - m.r > camera.y + canvas.height) continue;

				// Drop shadow
				ctx.fillStyle = "rgba(30, 26, 20, 0.32)";
				ctx.beginPath();
				ctx.ellipse(m.x + 22, m.y + 20, m.r * 0.95, m.r * 0.55, 0, 0, Math.PI * 2);
				ctx.fill();

				// Rock body
				const mg = ctx.createRadialGradient(m.x - m.r * 0.28, m.y - m.r * 0.32, m.r * 0.04, m.x, m.y, m.r * 1.06);
				mg.addColorStop(0,   "#d2c9af");
				mg.addColorStop(0.38,"#a89470");
				mg.addColorStop(0.75,"#7a6a54");
				mg.addColorStop(1,   "rgba(58, 50, 40, 0)");
				ctx.fillStyle = mg;
				ctx.beginPath();
				ctx.arc(m.x, m.y, m.r, 0, Math.PI * 2);
				ctx.fill();

				// Snow cap
				ctx.fillStyle = "rgba(242, 240, 234, 0.86)";
				ctx.beginPath();
				ctx.arc(m.x - m.r * 0.07, m.y - m.r * 0.36, m.r * 0.30, 0, Math.PI * 2);
				ctx.fill();
				ctx.fillStyle = "rgba(255, 255, 255, 0.55)";
				ctx.beginPath();
				ctx.arc(m.x - m.r * 0.09, m.y - m.r * 0.40, m.r * 0.16, 0, Math.PI * 2);
				ctx.fill();

				// Cliff crack lines
				ctx.strokeStyle = "rgba(55, 46, 34, 0.20)";
				ctx.lineWidth = 1.5;
				for (let i = 0; i < 5; i++) {
					const ox = m.x - m.r * 0.4 + i * m.r * 0.22;
					ctx.beginPath();
					ctx.moveTo(ox, m.y - m.r * 0.12);
					ctx.lineTo(ox + m.r * 0.12, m.y + m.r * 0.28);
					ctx.stroke();
				}

				// Named mountain label
				if (m.name) {
					ctx.fillStyle = "rgba(248, 240, 220, 0.88)";
					ctx.font = "bold 15px Microsoft YaHei";
					ctx.textAlign = "center";
					ctx.fillText(m.name, m.x, m.y - m.r * 0.52);
				}
			}

			for (const mine of mines) {
				if (mine.x + 70 < camera.x || mine.x - 70 > camera.x + canvas.width) continue;
				if (mine.y + 60 < camera.y || mine.y - 60 > camera.y + canvas.height) continue;

				const banner = mine.outpost.owner === "ally" ? "#cfb35e" : mine.outpost.owner === "enemy" ? "#ca705f" : "#8f7bc0";
				const oreColor = mine.resource === "iron" ? "#9fa8b4" : "#c8ab55";
				const sparkleColor = mine.resource === "iron" ? "rgba(216, 230, 245, " : "rgba(255, 236, 140, ";
				ctx.fillStyle = "rgba(0,0,0,0.2)";
				ctx.beginPath();
				ctx.ellipse(mine.x + 5, mine.y + 24, 34, 14, 0, 0, Math.PI * 2);
				ctx.fill();

				ctx.fillStyle = "#6a5942";
				ctx.fillRect(mine.x - 26, mine.y - 8, 52, 20);
				ctx.fillStyle = "#8b7457";
				ctx.beginPath();
				ctx.moveTo(mine.x - 32, mine.y - 8);
				ctx.lineTo(mine.x, mine.y - 28);
				ctx.lineTo(mine.x + 32, mine.y - 8);
				ctx.closePath();
				ctx.fill();

				ctx.fillStyle = "#4f4536";
				ctx.beginPath();
				ctx.arc(mine.x, mine.y + 7, mine.r, 0.1, Math.PI - 0.1, true);
				ctx.fill();

				ctx.fillStyle = oreColor;
				for (let i = 0; i < 4; i += 1) {
					ctx.beginPath();
					ctx.arc(mine.x - 10 + i * 7, mine.y + 5 + (i % 2) * 3, 3.1, 0, Math.PI * 2);
					ctx.fill();
				}

				if (mine.sparkle > 0) {
					ctx.strokeStyle = `${sparkleColor}${mine.sparkle})`;
					ctx.lineWidth = 2;
					ctx.beginPath();
					ctx.arc(mine.x - 2, mine.y + 6, 12 + (1 - mine.sparkle) * 8, 0, Math.PI * 2);
					ctx.stroke();
				}

				ctx.fillStyle = banner;
				ctx.fillRect(mine.x + 23, mine.y - 31, 4, 23);
				ctx.beginPath();
				ctx.moveTo(mine.x + 27, mine.y - 31);
				ctx.lineTo(mine.x + 45, mine.y - 25);
				ctx.lineTo(mine.x + 27, mine.y - 18);
				ctx.closePath();
				ctx.fill();

				ctx.fillStyle = "#f6ead6";
				ctx.font = "700 11px Microsoft YaHei";
				ctx.textAlign = "center";
				ctx.fillText(mine.name, mine.x, mine.y - 36);
			}

			const clinicBanner = clinic.outpost.owner === "ally" ? "#cfb35e" : clinic.outpost.owner === "enemy" ? "#ca705f" : "#8f7bc0";
			ctx.fillStyle = "rgba(0,0,0,0.22)";
			ctx.beginPath();
			ctx.ellipse(clinic.x + 3, clinic.y + 27, 38, 14, 0, 0, Math.PI * 2);
			ctx.fill();

			ctx.fillStyle = "#cab6a2";
			ctx.fillRect(clinic.x - 31, clinic.y - 10, 62, 34);
			ctx.fillStyle = "#8d6f5b";
			ctx.beginPath();
			ctx.moveTo(clinic.x - 36, clinic.y - 10);
			ctx.lineTo(clinic.x, clinic.y - 34);
			ctx.lineTo(clinic.x + 36, clinic.y - 10);
			ctx.closePath();
			ctx.fill();

			ctx.fillStyle = "#f4f0e8";
			ctx.fillRect(clinic.x - 18, clinic.y + 2, 36, 14);
			ctx.fillStyle = "#cf5f5f";
			ctx.fillRect(clinic.x - 3, clinic.y - 2, 6, 22);
			ctx.fillRect(clinic.x - 11, clinic.y + 6, 22, 6);

			if (clinic.pulse > 0) {
				ctx.strokeStyle = `rgba(178, 247, 191, ${clinic.pulse * 0.85})`;
				ctx.lineWidth = 2.2;
				ctx.beginPath();
				ctx.arc(clinic.x, clinic.y + 6, 20 + (1 - clinic.pulse) * 18, 0, Math.PI * 2);
				ctx.stroke();
			}

			ctx.fillStyle = clinicBanner;
			ctx.fillRect(clinic.x + 25, clinic.y - 33, 4, 24);
			ctx.beginPath();
			ctx.moveTo(clinic.x + 29, clinic.y - 33);
			ctx.lineTo(clinic.x + 47, clinic.y - 26);
			ctx.lineTo(clinic.x + 29, clinic.y - 19);
			ctx.closePath();
			ctx.fill();

			ctx.fillStyle = "#f6ead6";
			ctx.font = "700 11px Microsoft YaHei";
			ctx.textAlign = "center";
			ctx.fillText(clinic.name, clinic.x, clinic.y - 42);

			// stable (马场) near 北平
			const stableWall = stable.outpost.owner === "ally" ? "#b59b57" : stable.outpost.owner === "enemy" ? "#b15b4a" : "#7b6aa8";
			const stableGate = stable.outpost.owner === "ally" ? "#d7c079" : stable.outpost.owner === "enemy" ? "#d68170" : "#9f8bcc";
			ctx.fillStyle = "rgba(0,0,0,0.18)";
			ctx.beginPath();
			ctx.ellipse(stable.x + 3, stable.y + 32, 50, 13, 0, 0, Math.PI * 2);
			ctx.fill();
			ctx.fillStyle = "#d6bc7e";
			ctx.fillRect(stable.x - 46, stable.y - 22, 92, 58);
			ctx.strokeStyle = stableWall;
			ctx.lineWidth = 5;
			ctx.strokeRect(stable.x - 46, stable.y - 22, 92, 58);
			ctx.lineWidth = 2.2;
			ctx.beginPath();
			ctx.moveTo(stable.x - 46, stable.y + 8);
			ctx.lineTo(stable.x + 46, stable.y + 8);
			ctx.stroke();
			ctx.fillStyle = "#7a4e28";
			ctx.beginPath();
			ctx.ellipse(stable.x - 6, stable.y + 22, 16, 8, 0, 0, Math.PI * 2);
			ctx.fill();
			ctx.beginPath();
			ctx.ellipse(stable.x + 9, stable.y + 13, 7.5, 5.5, -0.45, 0, Math.PI * 2);
			ctx.fill();
			ctx.fillStyle = stableGate;
			ctx.fillRect(stable.x + 30, stable.y - 38, 4, 22);
			ctx.beginPath();
			ctx.moveTo(stable.x + 34, stable.y - 38);
			ctx.lineTo(stable.x + 53, stable.y - 29);
			ctx.lineTo(stable.x + 34, stable.y - 22);
			ctx.closePath();
			ctx.fill();
			ctx.fillStyle = "#f6ead6";
			ctx.font = "700 11px Microsoft YaHei";
			ctx.textAlign = "center";
			ctx.fillText(stable.name, stable.x, stable.y - 48);

			for (const o of outposts) {
				const wall = o.owner === "ally" ? "#b59b57" : o.owner === "enemy" ? "#b15b4a" : "#7b6aa8";
				const gate = o.owner === "ally" ? "#d7c079" : o.owner === "enemy" ? "#d68170" : "#9f8bcc";
				ctx.fillStyle = "rgba(0,0,0,0.22)";
				ctx.fillRect(o.x - 44, o.y - 38, 88, 76);

				ctx.fillStyle = wall;
				ctx.fillRect(o.x - 40, o.y - 34, 80, 68);
				ctx.fillStyle = "#523f2e";
				ctx.fillRect(o.x - 34, o.y - 28, 68, 56);

				ctx.fillStyle = gate;
				ctx.fillRect(o.x - 11, o.y + 8, 22, 20);
				ctx.fillStyle = "#2b2220";
				ctx.fillRect(o.x - 7, o.y + 10, 14, 18);

				ctx.fillStyle = gate;
				ctx.fillRect(o.x - 3, o.y - 44, 6, 18);
				ctx.beginPath();
				ctx.moveTo(o.x + 3, o.y - 44);
				ctx.lineTo(o.x + 24, o.y - 36);
				ctx.lineTo(o.x + 3, o.y - 28);
				ctx.closePath();
				ctx.fill();

				ctx.fillStyle = "#f6ead6";
				ctx.font = "700 12px Microsoft YaHei";
				ctx.textAlign = "center";
				ctx.fillText(o.name, o.x, o.y - 50);

				// Gate-break debris particles
				for (const bp of o.breakParts) {
					ctx.globalAlpha = Math.max(0, bp.life);
					ctx.fillStyle = bp.color;
					ctx.fillRect(bp.x - bp.w / 2, bp.y - bp.h / 2, bp.w, bp.h);
				}
				ctx.globalAlpha = 1;
			}

			for (const worker of mineWorkers) {
				drawMineWorker(worker);
			}

			for (const e of enemies) {
				if (e.dead || !e.active) continue;
				drawSoldier(e, true, "#b64339", "#d97162");
				ctx.fillStyle = "#ffd2c6";
				ctx.font = "700 12px Microsoft YaHei";
				ctx.textAlign = "center";
				ctx.fillText(e.name, e.x, e.y - 31);
				drawHealthBar(e.x, e.y - 26, 38, e.hp, e.maxHp, "#ff8f7d");
			}

			for (const u of enemyUnits) {
				if (u.dead) continue;
				drawSoldier(u, false, "#d37062", "#ef9f8d");
			}

			for (const u of allies) {
				if (u.dead) continue;
				drawSoldier(u, false, "#cfad5b", "#f3dd99");
			}

			if (!player.dead) {
				drawSoldier(player, true, "#cfad5b", "#ffe7a5");

				ctx.fillStyle = "#fff4c8";
				ctx.font = "700 13px Microsoft YaHei";
				ctx.textAlign = "center";
				ctx.fillText(player.name, player.x, player.y - 32);

				drawHealthBar(player.x, player.y - 27, 42, player.hp, player.maxHp, "#ffe9a8");
			}

			if (clickMarker.life > 0) {
				const alpha = clickMarker.life;
				ctx.strokeStyle = `rgba(255, 243, 171, ${alpha})`;
				ctx.lineWidth = 2;
				ctx.beginPath();
				const rr = (1 - alpha) * 42;
				ctx.arc(clickMarker.x, clickMarker.y, 12 + rr, 0, Math.PI * 2);
				ctx.stroke();
			}

			// Charge skill shockwave rings
			for (const ef of chargeEffects) {
				const a = ef.life;
				ctx.strokeStyle = `rgba(255, 220, 55, ${a * 0.9})`;
				ctx.lineWidth = 5 * a;
				ctx.beginPath();
				ctx.arc(ef.x, ef.y, ef.r, 0, Math.PI * 2);
				ctx.stroke();
				ctx.strokeStyle = `rgba(255, 140, 20, ${a * 0.5})`;
				ctx.lineWidth = 14 * a;
				ctx.beginPath();
				ctx.arc(ef.x, ef.y, ef.r * 0.52, 0, Math.PI * 2);
				ctx.stroke();
			}

			ctx.restore();
		}

		function drawMini() {
			miniCtx.clearRect(0, 0, mini.width, mini.height);
			miniCtx.fillStyle = "#2f492e";
			miniCtx.fillRect(0, 0, mini.width, mini.height);

			const sx = mini.width / CFG.worldW;
			const sy = mini.height / CFG.worldH;

			for (const b of biomes) {
				miniCtx.fillStyle = b.type === "wet" ? "rgba(100, 146, 153, 0.24)" : b.type === "hill" ? "rgba(170, 154, 116, 0.22)" : "rgba(78, 114, 68, 0.22)";
				miniCtx.beginPath();
				miniCtx.arc(b.x * sx, b.y * sy, b.r * sx, 0, Math.PI * 2);
				miniCtx.fill();
			}

			// Mountains on minimap
			miniCtx.fillStyle = "#9a8e7a";
			for (const m of mountainZones) {
				miniCtx.beginPath();
				miniCtx.arc(m.x * sx, m.y * sy, m.r * sx * 0.85, 0, Math.PI * 2);
				miniCtx.fill();
			}

			for (const o of outposts) {
				miniCtx.fillStyle = o.owner === "ally" ? "#dbc16c" : o.owner === "enemy" ? "#d66b54" : "#9e84d4";
				miniCtx.beginPath();
				miniCtx.arc(o.x * sx, o.y * sy, 3, 0, Math.PI * 2);
				miniCtx.fill();
			}

			for (const mine of mines) {
				miniCtx.fillStyle = mine.resource === "iron" ? "#c4cfdb" : "#f1c952";
				miniCtx.fillRect(mine.x * sx - 1.5, mine.y * sy - 1.5, 3, 3);
			}

// clinic cross on minimap
				const ccx = clinic.x * sx, ccy = clinic.y * sy;
				miniCtx.fillStyle = "#4ddd80";
				miniCtx.fillRect(ccx - 4, ccy - 1, 8, 2);
				miniCtx.fillRect(ccx - 1, ccy - 4, 2, 8);
				// stable marker on minimap
				const smx = stable.x * sx, smy = stable.y * sy;
				miniCtx.fillStyle = stable.outpost.owner === "ally" ? "#e8c04a" : stable.outpost.owner === "enemy" ? "#d06050" : "#a07840";
				miniCtx.fillRect(smx - 2.5, smy - 2.5, 5, 5);

			miniCtx.fillStyle = "#ffe7a5";
			for (const u of allies) {
				if (u.dead) continue;
				miniCtx.fillRect(u.x * sx, u.y * sy, 1.8, 1.8);
			}

			miniCtx.fillStyle = "#f7a78f";
			for (const u of enemyUnits) {
				if (u.dead) continue;
				miniCtx.fillRect(u.x * sx, u.y * sy, 1.8, 1.8);
			}

			miniCtx.fillStyle = "#f3d26b";
			miniCtx.beginPath();
			miniCtx.arc(player.x * sx, player.y * sy, 3.2, 0, Math.PI * 2);
			miniCtx.fill();

			miniCtx.strokeStyle = "#fff4c8";
			miniCtx.lineWidth = 1;
			miniCtx.strokeRect(camera.x * sx, camera.y * sy, canvas.width * sx, canvas.height * sy);
		}

		function resize() {
			canvas.width = window.innerWidth;
			canvas.height = window.innerHeight;
			const compactUI = window.matchMedia("(max-width: 900px), (pointer: coarse)").matches;
			mini.width = compactUI ? 176 : 240;
			mini.height = compactUI ? 118 : 160;
			camera.x = clamp(camera.x, 0, CFG.worldW - canvas.width);
			camera.y = clamp(camera.y, 0, CFG.worldH - canvas.height);
		}

		const gameState = {
			over: false,
			paused: false,
			result: ""
		};

		const moveInput = {
			up: false,
			down: false,
			left: false,
			right: false
		};

		function togglePause() {
			gameState.paused = !gameState.paused;
			pauseBtn.textContent = gameState.paused ? "继续" : "暂停";
		}

		function castCharge() {
			if (gameState.paused || gameState.over || player.dead || player.chargeCool > 0) return;
			player.chargeCool = 8;
			chargeEffects.push({ x: player.x, y: player.y, life: 1, r: 8 });
			const chargeR = 200;
			for (const u of enemyUnits) {
				if (!u.dead && dist(player, u) < chargeR) {
					pushAwayOnly(player, u, 95);
					u.hp -= 18;
				}
			}
			for (const e of enemies) {
				if (!e.active || e.dead) continue;
				if (dist(player, e) < chargeR) {
					pushAwayOnly(player, e, 65);
					e.hp -= 35;
					e.hitFlash = Math.max(e.hitFlash || 0, 0.16);
				}
			}
		}

		function issueMoveCommand(clientX, clientY) {
			if (gameState.over || gameState.paused || player.dead) return;
			const p = viewToWorld(clientX, clientY);
			player.target = {
				x: clamp(p.x, 0, CFG.worldW),
				y: clamp(p.y, 0, CFG.worldH)
			};
			clickMarker.x = player.target.x;
			clickMarker.y = player.target.y;
			clickMarker.life = 1;
		}

		function issueMiniMapCommand(clientX, clientY) {
			if (gameState.over || gameState.paused || player.dead) return;
			const p = miniToWorld(clientX, clientY);
			player.target = {
				x: clamp(p.x, 0, CFG.worldW),
				y: clamp(p.y, 0, CFG.worldH)
			};
			clickMarker.x = player.target.x;
			clickMarker.y = player.target.y;
			clickMarker.life = 1;
		}

		canvas.addEventListener("contextmenu", (e) => e.preventDefault());
		window.addEventListener("keydown", (e) => {
			tryStartBgm();
			const key = e.key.toLowerCase();
			if (key === "w" || e.key === "ArrowUp") moveInput.up = true;
			if (key === "s" || e.key === "ArrowDown") moveInput.down = true;
			if (key === "a" || e.key === "ArrowLeft") moveInput.left = true;
			if (key === "d" || e.key === "ArrowRight") moveInput.right = true;
			if (key === "w" || key === "a" || key === "s" || key === "d" || e.key.startsWith("Arrow")) {
				e.preventDefault();
			}
			if (e.code === "Space" || e.key.toLowerCase() === "p") {
				e.preventDefault();
				togglePause();
			}
			if (e.key.toLowerCase() === "q") castCharge();
		});
		window.addEventListener("keyup", (e) => {
			const key = e.key.toLowerCase();
			if (key === "w" || e.key === "ArrowUp") moveInput.up = false;
			if (key === "s" || e.key === "ArrowDown") moveInput.down = false;
			if (key === "a" || e.key === "ArrowLeft") moveInput.left = false;
			if (key === "d" || e.key === "ArrowRight") moveInput.right = false;
		});
		pauseBtn.addEventListener("click", () => {
			tryStartBgm();
			togglePause();
		});
		musicBtn.addEventListener("click", () => {
			bgmEnabled = !bgmEnabled;
			syncMusicBtn();
			if (bgmEnabled) {
				tryStartBgm();
			} else {
				stopSynthBgm();
				if (audioCtx && audioCtx.state === "running") audioCtx.suspend();
			}
		});
		chargeBtn.addEventListener("click", () => castCharge());
		canvas.addEventListener("pointerdown", (e) => {
			if (e.pointerType === "mouse" && e.button !== 0) return;
			if (e.pointerType !== "mouse") e.preventDefault();
			tryStartBgm();
			issueMoveCommand(e.clientX, e.clientY);
		}, { passive: false });
		let miniDragging = false;
		mini.addEventListener("pointerdown", (e) => {
			if (e.pointerType === "mouse" && e.button !== 0) return;
			miniDragging = true;
			if (typeof mini.setPointerCapture === "function") mini.setPointerCapture(e.pointerId);
			e.preventDefault();
			tryStartBgm();
			issueMiniMapCommand(e.clientX, e.clientY);
		}, { passive: false });
		mini.addEventListener("pointermove", (e) => {
			if (!miniDragging) return;
			e.preventDefault();
			issueMiniMapCommand(e.clientX, e.clientY);
		}, { passive: false });
		mini.addEventListener("pointerup", (e) => {
			miniDragging = false;
			if (typeof mini.releasePointerCapture === "function") {
				try { mini.releasePointerCapture(e.pointerId); } catch (_err) {}
			}
		});
		mini.addEventListener("pointercancel", () => {
			miniDragging = false;
		});
		if (!window.PointerEvent) {
			canvas.addEventListener("touchstart", (e) => {
				if (!e.touches || e.touches.length === 0) return;
				e.preventDefault();
				const t = e.touches[0];
				tryStartBgm();
				issueMoveCommand(t.clientX, t.clientY);
			}, { passive: false });
			mini.addEventListener("touchstart", (e) => {
				if (!e.touches || e.touches.length === 0) return;
				e.preventDefault();
				const t = e.touches[0];
				tryStartBgm();
				issueMiniMapCommand(t.clientX, t.clientY);
			}, { passive: false });
			mini.addEventListener("touchmove", (e) => {
				if (!e.touches || e.touches.length === 0) return;
				e.preventDefault();
				const t = e.touches[0];
				issueMiniMapCommand(t.clientX, t.clientY);
			}, { passive: false });
		}

		document.addEventListener("visibilitychange", () => {
			if (document.hidden) {
				if (audioCtx && audioCtx.state === "running") audioCtx.suspend();
			} else if (bgmEnabled) {
				tryStartBgm();
			}
		});
		syncMusicBtn();

		window.addEventListener("resize", resize);
		resize();

		let last = performance.now();
		function loop(now) {
			const dt = Math.min(0.033, (now - last) / 1000);
			const dtMs = dt * 1000;
			last = now;

			if (!gameState.over && !gameState.paused) {
				player.slashCd = Math.max(0, player.slashCd - dt);
				player.hitStop = Math.max(0, player.hitStop - dt);
				if (player.hitStop <= 0) player.slashTimer = Math.max(0, player.slashTimer - dt);
				player.attackLock = Math.max(0, player.attackLock - dt);
				player.recoverTimer = Math.max(0, player.recoverTimer - dt);
				player.hitFlash = Math.max(0, player.hitFlash - dt * 1.6);
				for (const e of enemies) {
					e.slashCd = Math.max(0, e.slashCd - dt);
					e.hitStop = Math.max(0, (e.hitStop || 0) - dt);
					if (e.hitStop <= 0) e.slashTimer = Math.max(0, e.slashTimer - dt);
					e.attackLock = Math.max(0, e.attackLock - dt);
					e.recoverTimer = Math.max(0, e.recoverTimer - dt);
					e.hitFlash = Math.max(0, e.hitFlash - dt * 1.6);
				}
				for (const u of allies) {
					u.slashCd = Math.max(0, u.slashCd - dt);
					u.slashTimer = Math.max(0, u.slashTimer - dt);
				}
				for (const u of enemyUnits) {
					u.slashCd = Math.max(0, u.slashCd - dt);
					u.slashTimer = Math.max(0, u.slashTimer - dt);
				}

				updatePlayer(dt);
				updateEnemyWaves(dt);
				updateEnemyLeaders(dt);

				const activeEnemyLeaders = enemies.filter((e) => e.active && !e.dead);
				updateUnitSwarm(allies, player, allies, enemyUnits, activeEnemyLeaders, dt);
				for (const e of activeEnemyLeaders) {
					if (!e.dead) {
						const myUnits = enemyUnits.filter((u) => !u.dead && u.owner === e);
						updateUnitSwarm(myUnits, e, myUnits, allies, [player], dt);
					}
				}

				// Zhang Fei direct melee vs enemy units
				if (!player.dead) {
					for (const u of enemyUnits) {
						if (u.dead) continue;
						const du = dist(player, u);
						if (du < CFG.attackRange + 8) {
							u.hp -= 58 * getTeamAttackMultiplier(player.team) * dt;
							applyKnockback(player, u, 0.9);
							if (player.slashCd <= 0) triggerLeaderSlash(player, u);
						}
						if (u.hp <= 0) u.dead = true;
					}
				}

				for (const e of activeEnemyLeaders) {
					if (e.dead || player.dead) continue;
					const d = dist(player, e);
					if (d < CFG.attackRange + 18) {
						player.hp -= 32 * getTeamAttackMultiplier(e.team) * dt;
						e.hp -= 52 * getTeamAttackMultiplier(player.team) * dt;
						player.hitFlash = Math.max(player.hitFlash || 0, 0.78);
						player.hitStop  = Math.max(player.hitStop  || 0, 0.09);
						e.hitFlash = Math.max(e.hitFlash || 0, 0.78);
						e.hitStop  = Math.max(e.hitStop  || 0, 0.09);
						applyKnockback(e, player, 1.2);
						if (player.slashCd <= 0) triggerLeaderSlash(player, e);
						if (e.slashCd <= 0) triggerLeaderSlash(e, player);
					}
				}

				applyCrowdCollision(allies, allies, true);
				applyCrowdCollision(enemyUnits, enemyUnits, true);
				applyCrowdCollision(allies, enemyUnits, false);
				applyCrowdCollision([player], allies, false);
				applyCrowdCollision([player], enemyUnits, false);
				applyCrowdCollision(activeEnemyLeaders, allies, false);
				applyCrowdCollision(activeEnemyLeaders, enemyUnits, false);
				applyCrowdCollision(activeEnemyLeaders, [player], false);

				spawnSystem(dtMs);
				outpostSystem(dtMs);
				mineSystem(dt, dtMs);
				clinicSystem(dt, dtMs);
				cleanup();

				// Charge cooldown
				if (player.chargeCool > 0) player.chargeCool = Math.max(0, player.chargeCool - dt);

				// Charge visual effects
				for (let i = chargeEffects.length - 1; i >= 0; i--) {
					chargeEffects[i].life -= dt * 1.6;
					chargeEffects[i].r += dt * 310;
					if (chargeEffects[i].life <= 0) chargeEffects.splice(i, 1);
				}

				// Break particles physics
				for (const o of outposts) {
					for (let i = o.breakParts.length - 1; i >= 0; i--) {
						const bp = o.breakParts[i];
						bp.x += bp.vx * dt;
						bp.y += bp.vy * dt;
						bp.vy += 220 * dt;
						bp.life -= dt * 1.4;
						if (bp.life <= 0) o.breakParts.splice(i, 1);
					}
				}
			}

			clickMarker.life = Math.max(0, clickMarker.life - dt * 1.7);

			updateCamera(dt);
			drawMap();
			drawMini();

			if (!gameState.over) {
				const allyOut = outposts.filter((o) => o.owner === "ally").length;
				const deadEnemyGenerals = enemies.filter((e) => e.dead).length;
				const txt = `主线任务: 占领城池 ${Math.min(allyOut, MISSION.needOutposts)}/${MISSION.needOutposts} | 击败敌将 ${Math.min(deadEnemyGenerals, MISSION.needGenerals)}/${MISSION.needGenerals}`;
				ctx.fillStyle = "rgba(0,0,0,0.40)";
				ctx.fillRect(canvas.width * 0.5 - 210, 10, 420, 24);
				ctx.fillStyle = "#f3f6da";
				ctx.font = "600 13px Microsoft YaHei";
				ctx.textAlign = "center";
				ctx.fillText(txt, canvas.width * 0.5, 27);
			}

			if (gameState.over) {
				ctx.fillStyle = "rgba(0, 0, 0, 0.42)";
				ctx.fillRect(0, 0, canvas.width, canvas.height);
				ctx.fillStyle = gameState.result === "游戏通关" ? "#ffe78b" : "#ffc3b5";
				ctx.font = "700 54px Microsoft YaHei";
				ctx.textAlign = "center";
				ctx.fillText(gameState.result, canvas.width * 0.5, canvas.height * 0.5 - 8);
				ctx.fillStyle = "#f2f2f2";
				ctx.font = "500 18px Microsoft YaHei";
				ctx.fillText("刷新页面可重新开始", canvas.width * 0.5, canvas.height * 0.5 + 34);
			}
			chargeBtn.disabled = gameState.paused || gameState.over || player.dead || player.chargeCool > 0;

			requestAnimationFrame(loop);
		}

		requestAnimationFrame(loop);
	</script>
</body>
</html>
