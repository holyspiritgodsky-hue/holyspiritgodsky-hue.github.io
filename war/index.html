<!DOCTYPE html>
<html lang="zh-CN">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>时空战场</title>
	<style>
		:root {
			--sky: #9ec7da;
			--ground: #7fb26b;
			--ground-dark: #5c8b53;
			--road: #8c7450;
			--river: #4a8ea8;
			--ally: #f3d26b;
			--ally-unit: #ffe7a5;
			--enemy: #e76752;
			--enemy-unit: #f7a78f;
			--neutral: #9e84d4;
			--ui-bg: rgba(0, 0, 0, 0.45);
			--ui-border: rgba(255, 255, 255, 0.22);
			--text: #f3f5ef;
		}

		html,
		body {
			margin: 0;
			width: 100%;
			height: 100%;
			overflow: hidden;
			font-family: "Segoe UI", "Microsoft YaHei", sans-serif;
			background: var(--sky);
			color: var(--text);
			user-select: none;
		}

		#game {
			width: 100vw;
			height: 100vh;
			display: block;
			cursor: crosshair;
			touch-action: none;
		}

		#miniWrap {
			position: fixed;
			right: 12px;
			bottom: 12px;
			z-index: 3;
			width: 240px;
			height: 160px;
			border-radius: 8px;
			border: 1px solid var(--ui-border);
			background: rgba(10, 12, 10, 0.6);
			overflow: hidden;
		}

		#mini {
			width: 100%;
			height: 100%;
			display: block;
			cursor: pointer;
		}

		#pauseBtn,
		#musicBtn,
		#cardsBtn,
		#labBtn {
			position: fixed;
			top: 14px;
			z-index: 4;
		}

		#pauseBtn {
			right: 14px;
		}

		#labBtn {
			right: 178px;
		}

		#cardsBtn {
			right: 262px;
		}

		#musicBtn {
			right: 92px;
		}

		#chargeBtn {
			position: fixed;
			left: 50%;
			transform: translateX(-50%);
			bottom: 16px;
			z-index: 4;
			border: 1px solid rgba(255, 223, 124, 0.55);
			background: rgba(79, 60, 14, 0.82);
			color: #ffe8a1;
			padding: 10px 14px;
			border-radius: 999px;
			font-size: 13px;
			font-weight: 700;
			cursor: pointer;
		}

		#chargeBtn:disabled {
			opacity: 0.58;
		}

		#bydTestBtn {
			position: fixed;
			left: calc(50% + 110px);
			bottom: 16px;
			z-index: 4;
			border: 1px solid rgba(168, 234, 255, 0.62);
			background: rgba(18, 68, 88, 0.85);
			color: #d9f4ff;
			padding: 10px 14px;
			border-radius: 999px;
			font-size: 13px;
			font-weight: 700;
			cursor: pointer;
		}

		#continueGameBtn {
			position: fixed;
			left: 50%;
			top: 50%;
			transform: translate(-50%, 54px);
			z-index: 9;
			display: none;
			border: 1px solid rgba(255, 227, 139, 0.72);
			background: linear-gradient(180deg, rgba(132, 92, 24, 0.95), rgba(94, 62, 15, 0.95));
			color: #fff2c0;
			padding: 10px 22px;
			border-radius: 999px;
			font-size: 14px;
			font-weight: 800;
			letter-spacing: 1px;
			cursor: pointer;
			box-shadow: 0 8px 20px rgba(0, 0, 0, 0.35);
		}

		#continueGameBtn:hover {
			filter: brightness(1.08);
		}

		#cityBuildDialog {
			position: fixed;
			z-index: 12;
			display: none;
			min-width: 220px;
			max-width: 320px;
			padding: 10px 12px;
			border-radius: 10px;
			background: rgba(12, 10, 8, 0.92);
			border: 1px solid rgba(255, 228, 160, 0.5);
			box-shadow: 0 8px 26px rgba(0, 0, 0, 0.5);
			pointer-events: auto;
		}

		#cityBuildTitle {
			font-size: 13px;
			font-weight: 700;
			color: #f6df9a;
			margin-bottom: 6px;
		}

		#cityBuildText {
			font-size: 12px;
			line-height: 1.45;
			color: #f3efe3;
			margin-bottom: 10px;
		}

		#cityBuildActions {
			display: flex;
			gap: 8px;
			justify-content: flex-end;
		}

		#cityBuildOk,
		#cityBuildCancel {
			height: 30px;
			padding: 0 10px;
			border-radius: 7px;
			font-size: 12px;
			font-weight: 700;
			cursor: pointer;
			border: 1px solid rgba(255, 255, 255, 0.28);
			color: #f6f2e6;
		}

		#cityBuildOk {
			background: rgba(120, 92, 28, 0.88);
		}

		#cityBuildCancel {
			background: rgba(54, 52, 48, 0.85);
		}

		#shipGateDialog {
			position: fixed;
			z-index: 13;
			display: none;
			min-width: 240px;
			max-width: 360px;
			padding: 12px;
			border-radius: 11px;
			background: rgba(10, 15, 22, 0.94);
			border: 1px solid rgba(143, 206, 255, 0.62);
			box-shadow: 0 10px 28px rgba(0, 0, 0, 0.56);
		}

		#shipGateTitle {
			font-size: 13px;
			font-weight: 700;
			color: #bfe6ff;
			margin-bottom: 6px;
		}

		#shipGateText {
			font-size: 12px;
			line-height: 1.45;
			color: #e7f3ff;
			margin-bottom: 10px;
		}

		#shipGateActions {
			display: grid;
			grid-template-columns: 1fr;
			gap: 7px;
		}

		#shipGateToJapan,
		#shipGateToSouth,
		#shipGateCancel {
			height: 32px;
			border-radius: 8px;
			border: 1px solid rgba(255, 255, 255, 0.28);
			font-size: 12px;
			font-weight: 700;
			cursor: pointer;
			color: #f2f8ff;
		}

		#shipGateToJapan {
			background: rgba(28, 74, 110, 0.9);
		}

		#shipGateToSouth {
			background: rgba(25, 97, 86, 0.9);
		}

		#shipGateCancel {
			background: rgba(50, 56, 66, 0.88);
		}

		#tavernDialog {
			position: fixed;
			z-index: 14;
			display: none;
			min-width: 280px;
			max-width: 360px;
			padding: 12px;
			border-radius: 11px;
			background: rgba(34, 21, 16, 0.95);
			border: 1px solid rgba(255, 209, 140, 0.62);
			box-shadow: 0 10px 28px rgba(0, 0, 0, 0.56);
		}

		#tavernTitle {
			font-size: 13px;
			font-weight: 700;
			color: #ffdca2;
			margin-bottom: 6px;
		}

		#tavernText {
			font-size: 12px;
			line-height: 1.45;
			color: #f9efdf;
			margin-bottom: 10px;
		}

		#tavernActions {
			display: grid;
			grid-template-columns: 1fr;
			gap: 7px;
		}

		#tavernRecruitSun,
		#tavernRecruitDa,
		#tavernRecruitXiao,
		#tavernClose {
			height: 32px;
			border-radius: 8px;
			border: 1px solid rgba(255, 255, 255, 0.28);
			font-size: 12px;
			font-weight: 700;
			cursor: pointer;
			color: #fff7ea;
		}

		#tavernRecruitSun { background: rgba(147, 66, 45, 0.9); }
		#tavernRecruitDa { background: rgba(72, 97, 138, 0.9); }
		#tavernRecruitXiao { background: rgba(108, 72, 138, 0.9); }
		#tavernClose { background: rgba(56, 53, 47, 0.88); }

		@media (max-width: 900px), (pointer: coarse) {
			#pauseBtn,
			#cardsBtn,
			#musicBtn,
			#labBtn,
			#chargeBtn,
			#bydTestBtn {
				font-size: 12px;
				height: 34px;
				padding: 0 10px;
			}

			#pauseBtn {
				top: max(8px, env(safe-area-inset-top));
				right: max(8px, env(safe-area-inset-right));
			}

			#labBtn {
				top: max(8px, env(safe-area-inset-top));
				right: calc(max(8px, env(safe-area-inset-right)) + 164px);
			}

			#cardsBtn {
				top: max(8px, env(safe-area-inset-top));
				right: calc(max(8px, env(safe-area-inset-right)) + 246px);
			}

			#musicBtn {
				top: max(8px, env(safe-area-inset-top));
				right: calc(max(8px, env(safe-area-inset-right)) + 82px);
			}

			#chargeBtn {
				left: max(10px, env(safe-area-inset-left));
				bottom: max(10px, env(safe-area-inset-bottom));
				transform: none;
			}

			#bydTestBtn {
				left: calc(max(10px, env(safe-area-inset-left)) + 86px);
				bottom: max(10px, env(safe-area-inset-bottom));
			}

			#miniWrap {
				right: max(8px, env(safe-area-inset-right));
				bottom: max(66px, calc(env(safe-area-inset-bottom) + 56px));
				width: 176px;
				height: 118px;
			}
		}
	</style>
</head>
<body>
	<a id="cardsBtn" class="sense-panel-btn" href="hero-cards.html">英雄展示</a>
	<a id="labBtn" class="sense-panel-btn" href="https://gameart.top">首页</a>
	<button id="musicBtn" class="sense-panel-btn">音乐: 开</button>
	<button id="pauseBtn" class="sense-panel-btn">暂停</button>
	<button id="chargeBtn">大喝</button>
	<button id="bydTestBtn">测试-比亚迪</button>
	<button id="continueGameBtn" type="button">继续游戏</button>
	<canvas id="game"></canvas>
	<div id="cityBuildDialog">
		<div id="cityBuildTitle">城建</div>
		<div id="cityBuildText">-</div>
		<div id="cityBuildActions">
			<button id="cityBuildCancel" type="button">取消</button>
			<button id="cityBuildOk" type="button">确定</button>
		</div>
	</div>
	<div id="shipGateDialog">
		<div id="shipGateTitle">远洋船厂关口</div>
		<div id="shipGateText">请选择航线</div>
		<div id="shipGateActions">
			<button id="shipGateToJapan" type="button">去往日本</button>
			<button id="shipGateToSouth" type="button">去往南美</button>
			<button id="shipGateCancel" type="button">取消</button>
		</div>
	</div>
	<div id="tavernDialog">
		<div id="tavernTitle">江东酒馆</div>
		<div id="tavernText">招募江东名将</div>
		<div id="tavernActions">
			<button id="tavernRecruitSun" type="button">招募孙尚香（-2000金）</button>
			<button id="tavernRecruitDa" type="button">招募大乔（-2500金）</button>
			<button id="tavernRecruitXiao" type="button">招募小乔（曹操人头）</button>
			<button id="tavernClose" type="button">关闭</button>
		</div>
	</div>
	<div id="miniWrap">
		<canvas id="mini"></canvas>
	</div>

	<script src="heroes.js"></script>
	<script src="sense.js"></script>
	<script>
		const canvas = document.getElementById("game");
		const ctx = canvas.getContext("2d");
		const mini = document.getElementById("mini");
		const miniCtx = mini.getContext("2d");
		const miniMapImage = new Image();
		let miniMapImageReady = false;
		miniMapImage.onload = () => { miniMapImageReady = true; };
		miniMapImage.onerror = () => { miniMapImageReady = false; };
		miniMapImage.src = "img/china-map.png";
		const pauseBtn = document.getElementById("pauseBtn");
		const musicBtn = document.getElementById("musicBtn");
		const chargeBtn = document.getElementById("chargeBtn");
		const bydTestBtn = document.getElementById("bydTestBtn");
		const continueGameBtn = document.getElementById("continueGameBtn");
		const cityBuildDialog = document.getElementById("cityBuildDialog");
		const cityBuildTitle = document.getElementById("cityBuildTitle");
		const cityBuildText = document.getElementById("cityBuildText");
		const cityBuildOk = document.getElementById("cityBuildOk");
		const cityBuildCancel = document.getElementById("cityBuildCancel");
		const shipGateDialog = document.getElementById("shipGateDialog");
		const shipGateTitle = document.getElementById("shipGateTitle");
		const shipGateText = document.getElementById("shipGateText");
		const shipGateToJapan = document.getElementById("shipGateToJapan");
		const shipGateToSouth = document.getElementById("shipGateToSouth");
		const shipGateCancel = document.getElementById("shipGateCancel");
		const tavernDialog = document.getElementById("tavernDialog");
		const tavernTitle = document.getElementById("tavernTitle");
		const tavernText = document.getElementById("tavernText");
		const tavernRecruitSun = document.getElementById("tavernRecruitSun");
		const tavernRecruitDa = document.getElementById("tavernRecruitDa");
		const tavernRecruitXiao = document.getElementById("tavernRecruitXiao");
		const tavernClose = document.getElementById("tavernClose");
		const sharedUI = window.WarSense
			? window.WarSense.initSharedUI({
				addPauseMusic: false,
				pauseButtonId: "pauseBtn",
				musicButtonId: "musicBtn",
				miniWrapId: "miniWrap",
				rightStart: 14,
				top: 14
			})
			: null;
		function applyTopPanelLayout() {
			if (!window.WarSense || !window.WarSense.layoutTopPanelButtons) return;
			const compact = window.matchMedia("(max-width: 900px), (pointer: coarse)").matches;
			window.WarSense.layoutTopPanelButtons({
				ids: ["pauseBtn", "musicBtn", "labBtn", "cardsBtn"],
				rightStart: compact ? 8 : 14,
				top: compact ? 8 : 14,
				gap: compact ? 6 : 8,
				compact
			});
		}

		function getHudTopOffset() {
			const compact = window.matchMedia("(max-width: 900px), (pointer: coarse)").matches;
			if (!compact) return 10;
			const topButtons = [pauseBtn, musicBtn, document.getElementById("labBtn"), document.getElementById("cardsBtn")];
			let maxBottom = 0;
			for (const btn of topButtons) {
				if (!btn) continue;
				const r = btn.getBoundingClientRect();
				if (r.bottom > maxBottom) maxBottom = r.bottom;
			}
			return Math.max(10, Math.floor(maxBottom + 8));
		}
		applyTopPanelLayout();
		const cityBuildDialogState = {
			open: false,
			outpost: null,
			mode: "none"
		};
		const shipGateDialogState = {
			open: false
		};
		const tavernDialogState = {
			open: false
		};

		// Procedural royalty-free BGM (single-tone synth loop)
		let audioCtx = null;
		let musicTimer = null;
		let musicStep = 0;
		let bgmEnabled = true;
		let bgmTriedAutoplay = false;

		function syncMusicBtn() {
			musicBtn.textContent = `音乐: ${bgmEnabled ? "开" : "关"}`;
		}

		function noteFreq(note) {
			return 440 * Math.pow(2, (note - 69) / 12);
		}

		function playTone(note, duration, volume, type, when) {
			if (!audioCtx) return;
			const osc = audioCtx.createOscillator();
			const gain = audioCtx.createGain();
			osc.type = type;
			osc.frequency.setValueAtTime(noteFreq(note), when);
			gain.gain.setValueAtTime(0.0001, when);
			gain.gain.exponentialRampToValueAtTime(volume, when + 0.02);
			gain.gain.exponentialRampToValueAtTime(0.0001, when + duration);
			osc.connect(gain).connect(audioCtx.destination);
			osc.start(when);
			osc.stop(when + duration + 0.02);
		}

		function stopSynthBgm() {
			if (musicTimer) {
				clearInterval(musicTimer);
				musicTimer = null;
			}
		}

		function startSynthBgm() {
			if (!audioCtx || musicTimer) return;
			// 64-step structure: A(16) + A'(16) + B(16) + C(16)
			const melody = [
				64,67,69,71,72,71,69,67,64,67,69,72,71,69,67,66,
				64,67,69,71,74,72,71,69,67,69,71,72,74,72,69,67,
				62,64,66,67,69,67,66,64,62,64,66,69,67,66,64,62,
				60,62,64,66,67,66,64,62,60,62,64,67,66,64,62,60
			];
			const bass = [
				40,40,43,43,45,45,43,43,40,40,43,43,47,45,43,42,
				40,40,43,43,47,47,45,45,43,43,45,45,47,45,43,42,
				38,38,41,41,43,43,41,41,38,38,41,41,45,43,41,40,
				36,36,40,40,41,41,40,40,36,36,40,40,43,41,40,38
			];
			const pad = [
				52,52,52,52,55,55,55,55,57,57,57,57,55,55,55,55,
				52,52,52,52,55,55,55,55,59,59,59,59,57,57,57,57,
				50,50,50,50,53,53,53,53,55,55,55,55,53,53,53,53,
				48,48,48,48,52,52,52,52,53,53,53,53,52,52,52,52
			];
			const beat = 0.28;

			musicTimer = setInterval(() => {
				if (!bgmEnabled || !audioCtx || audioCtx.state !== "running") return;
				const when = audioCtx.currentTime + 0.02;
				const i = musicStep % melody.length;
				playTone(melody[i], beat * 0.95, 0.075, "triangle", when);
				if (musicStep % 2 === 0) {
					playTone(bass[i], beat * 1.8, 0.058, "sine", when);
				}
				if (musicStep % 4 === 0) {
					playTone(melody[(i + 5) % melody.length], beat * 0.45, 0.04, "square", when + 0.06);
				}
				// every 8th step: soft pad harmonic layer
				if (musicStep % 8 === 0) {
					playTone(pad[i], beat * 3.2, 0.028, "sawtooth", when);
				}
				// phrase ending fill every 16th step
				if (musicStep % 16 === 15) {
					playTone(melody[(i + 2) % melody.length], beat * 0.28, 0.05, "square", when + 0.03);
					playTone(melody[(i + 4) % melody.length], beat * 0.22, 0.045, "triangle", when + 0.1);
				}
				musicStep += 1;
			}, beat * 1000);
		}

		function tryStartBgm() {
			if (!bgmEnabled || gameState.over) return;
			if (!audioCtx) {
				audioCtx = new (window.AudioContext || window.webkitAudioContext)();
			}
			audioCtx.resume().then(() => {
				startSynthBgm();
			}).catch(() => {
				if (!bgmTriedAutoplay) {
					musicBtn.textContent = "音乐: 点按开启";
				}
			});
			bgmTriedAutoplay = true;
		}

		const CFG = {
			worldW: 5200,
			worldH: 3400,
			heroSpeed: 235,
			heroHp: 340,
			unitHp: 44,
			unitSpeed: 160,
			unitDps: 16,
			attackRange: 20,
			aggroRange: 160,
			spawnTickMs: 1800,
			neutralTickMs: 2600,
			maxFollowersBase: 22
		};

		const MISSION = {
			needOutposts: 4,
			needGenerals: 3
		};

		const rand = (min, max) => min + Math.random() * (max - min);
		const clamp = (v, min, max) => Math.max(min, Math.min(max, v));
		const dist = (a, b) => Math.hypot(a.x - b.x, a.y - b.y);
		const GOLD_STORE_KEY = "warSharedGold";
		const IRON_STORE_KEY = "warSharedIron";
		const DEAD_HERO_STORE_KEY = "warDeadHeroes";
		const HELL_GATE_STORE_KEY = "warHellGateLevel";

		function loadSharedGold() {
			const raw = localStorage.getItem(GOLD_STORE_KEY) || sessionStorage.getItem(GOLD_STORE_KEY);
			const val = Number(raw);
			return Number.isFinite(val) ? Math.max(0, val) : 5000;
		}

		function saveSharedGold(v) {
			const safe = Math.max(0, Math.floor(Number.isFinite(v) ? v : 0));
			localStorage.setItem(GOLD_STORE_KEY, String(safe));
			sessionStorage.setItem(GOLD_STORE_KEY, String(safe));
		}

		function loadSharedIron() {
			const raw = localStorage.getItem(IRON_STORE_KEY) || sessionStorage.getItem(IRON_STORE_KEY);
			const val = Number(raw);
			return Number.isFinite(val) ? Math.max(0, val) : 0;
		}

		function saveSharedIron(v) {
			const safe = Math.max(0, Math.floor(Number.isFinite(v) ? v : 0));
			localStorage.setItem(IRON_STORE_KEY, String(safe));
			sessionStorage.setItem(IRON_STORE_KEY, String(safe));
		}

		function loadDeadHeroIds() {
			try {
				const raw = localStorage.getItem(DEAD_HERO_STORE_KEY) || sessionStorage.getItem(DEAD_HERO_STORE_KEY) || "[]";
				const parsed = JSON.parse(raw);
				if (!Array.isArray(parsed)) return new Set();
				return new Set(parsed.filter((id) => typeof id === "string"));
			} catch (_e) {
				return new Set();
			}
		}

		function saveDeadHeroIds(idsSet) {
			const list = Array.from(idsSet || []);
			const raw = JSON.stringify(list);
			localStorage.setItem(DEAD_HERO_STORE_KEY, raw);
			sessionStorage.setItem(DEAD_HERO_STORE_KEY, raw);
		}

		function loadHellGateLevel() {
			const raw = localStorage.getItem(HELL_GATE_STORE_KEY) || sessionStorage.getItem(HELL_GATE_STORE_KEY);
			const val = Number(raw);
			if (!Number.isFinite(val)) return 0;
			return clamp(Math.floor(val), 0, 3);
		}

		function saveHellGateLevel(v) {
			const safe = clamp(Math.floor(Number.isFinite(v) ? v : 0), 0, 3);
			localStorage.setItem(HELL_GATE_STORE_KEY, String(safe));
			sessionStorage.setItem(HELL_GATE_STORE_KEY, String(safe));
		}

		const camera = {
			x: 0,
			y: 0
		};

		const clickMarker = {
			x: 0,
			y: 0,
			life: 0
		};

		const grassDots = [];
		for (let i = 0; i < 2600; i += 1) {
			grassDots.push({
				x: rand(0, CFG.worldW),
				y: rand(0, CFG.worldH),
				r: rand(0.8, 2),
				c: Math.random() > 0.5 ? "#6e9f61" : "#5b8c52"

		function moveTo(entity, tx, ty, speed, dt) {
			const dx = tx - entity.x;
			const dy = ty - entity.y;
			const d = Math.hypot(dx, dy);
			if (d < 0.001) return d;
			entity.dir = Math.atan2(dy, dx);
			const step = speed * dt;
			if (d <= step) {
				entity.x = tx;
				entity.y = ty;
				return d;
			}
			entity.x += (dx / d) * step;
			entity.y += (dy / d) * step;
			return d;
		}

		function nearest(list, from, predicate) {
			let best = null;
			let bestD = Infinity;
			for (const x of list) {
				if (x.dead) continue;
				if (predicate && !predicate(x)) continue;
				const d = dist(from, x);
				if (d < bestD) {
					best = x;
					bestD = d;
				}
			}
			return { target: best, d: bestD };
		}

				const dx = entity.x - m.x;
				const dy = entity.y - m.y;
				const d = Math.hypot(dx, dy);
				const minD = m.r + r;
				if (d < minD) {
					const nx = d > 0.001 ? dx / d : 1;
					const ny = d > 0.001 ? dy / d : 0;
					entity.x = m.x + nx * minD;
					entity.y = m.y + ny * minD;
				}
			}
		}

		function pushOutEastSea(entity) {
			const r = entity.radius || 7;
			if (entity.x > eastSeaWallX - r) {
				entity.x = eastSeaWallX - r;
			}
			for (const sea of eastSeaZones) {
				const dx = entity.x - sea.x;
				const dy = entity.y - sea.y;
				const d = Math.hypot(dx, dy);
				const minD = sea.r + r;
				if (d < minD) {
					const nx = d > 0.001 ? dx / d : -1;
					const ny = d > 0.001 ? dy / d : 0;
					entity.x = sea.x + nx * minD;
					entity.y = sea.y + ny * minD;
				}
			}
		}

		function triggerBreakAnim(o) {
			o.breakParts = [];
			for (let i = 0; i < 16; i++) {
				const angle = Math.random() * Math.PI * 2;
				const spd = rand(55, 145);
				o.breakParts.push({
					x: o.x + rand(-22, 22),
					y: o.y + rand(-12, 12),
					vx: Math.cos(angle) * spd,
					vy: Math.sin(angle) * spd - 65,
					life: 1,
					w: rand(4, 11),
					h: rand(3, 7),
					color: Math.random() > 0.5 ? "#8b7055" : "#c4a97d"
				});
			}
		}

		function createMineWorker(mine, team) {
			mineWorkerSeed += 1;
			return {
				id: mineWorkerSeed,
				x: mine.x + rand(-10, 10),
				y: mine.y + rand(-8, 8),
				team,
				mine,
				phase: "toMine",
				carrying: false,
				speed: 98,
				radius: 5,
				dir: 0,
				wait: rand(0.1, 0.9),
				offsetX: rand(-16, 16),
				offsetY: rand(-10, 10)
			};
		}

		function mineWorkerTarget(worker) {
			if (worker.phase === "toMine") {
				return {
					x: worker.mine.x + worker.offsetX,
					y: worker.mine.y + worker.offsetY
				};
			}
			return {
				x: worker.mine.outpost.x + worker.offsetX * 0.38,
				y: worker.mine.outpost.y + 16 + worker.offsetY * 0.35
			};
		}

		function getTeamAttackMultiplier(team) {
			return hanyangOutpost.owner === team ? 1.22 : 1;
		}

		function triggerUnitSlash(attacker, target) {
			attacker.slashTimer = 0.12;
			attacker.slashCd = 0.34;
			if (!target) return;
			const dx = target.x - attacker.x;
			const dy = target.y - attacker.y;
			attacker.dir = Math.atan2(dy, dx);
		}

		function updatePlayer(dt) {
			if (player.dead) return;
			player.prevX = player.x;
			player.shipModeLock = Math.max(0, (player.shipModeLock || 0) - dt);
			const stableBoost = stable.outpost.owner === "ally" ? CFG.heroSpeed * 1.55 : CFG.heroSpeed;
			const bydBoost = player.onByd ? bydCar.speedMul : 1;
			const mountSpeed = stableBoost * bydBoost;
			const moveScale = (player.attackLock > 0 || player.hitStop > 0) ? 0.18 : player.recoverTimer > 0 ? 0.52 : 1;
			const moveSpeed = mountSpeed * moveScale;
			const mx = (moveInput.right ? 1 : 0) - (moveInput.left ? 1 : 0);
			const my = (moveInput.down ? 1 : 0) - (moveInput.up ? 1 : 0);
			if (mx !== 0 || my !== 0) {
				const d = Math.hypot(mx, my) || 1;
				const nx = mx / d;
				const ny = my / d;
				player.x += nx * moveSpeed * dt;
				player.y += ny * moveSpeed * dt;
				player.dir = Math.atan2(ny, nx);
				player.target.x = player.x;
				player.target.y = player.y;
			} else {
				moveTo(player, player.target.x, player.target.y, moveSpeed, dt);
			}
			player.x = clamp(player.x, 50, CFG.worldW - 50);
			player.y = clamp(player.y, 50, CFG.worldH - 50);
			pushOutMountains(player);
			pushOutEastSea(player);
		}

		function spawnBydCarNearPlayer() {
			if (player.dead) return;
			bydCar.active = true;
			bydCar.mounted = false;
			player.onByd = false;
			bydCar.x = clamp(player.x + 78, 80, CFG.worldW - 80);
			bydCar.y = clamp(player.y + 8, 80, CFG.worldH - 80);
		}

		function bydCarSystem() {
			if (!bydCar.active || player.dead) return;
			if (!bydCar.mounted) {
				if (dist(player, bydCar) < bydCar.r + player.radius + 8) {
					bydCar.mounted = true;
					player.onByd = true;
				}
				return;
			}
			bydCar.x = player.x + Math.cos(player.dir || 0) * 8;
			bydCar.y = player.y + Math.sin(player.dir || 0) * 8;
		}

		function applyKnockback(src, target, power) {
			const dx = target.x - src.x;
			const dy = target.y - src.y;
			const d = Math.max(0.001, Math.hypot(dx, dy));
			const nx = dx / d;
			const ny = dy / d;
			target.x += nx * power;
			target.y += ny * power;
			src.x -= nx * power * 0.2;
			src.y -= ny * power * 0.2;
		}

		function pushAwayOnly(src, target, power) {
			const dx = target.x - src.x;
			const dy = target.y - src.y;
			const d = Math.max(0.001, Math.hypot(dx, dy));
			const nx = dx / d;
			const ny = dy / d;
			target.x += nx * power;
			target.y += ny * power;
		}

		function triggerLeaderSlash(attacker, target) {
			if (attacker.team === "enemy") {
				attacker.slashTimer = 0.52;
				attacker.slashCd = 1.02;
				attacker.attackLock = 0.2;
				attacker.recoverTimer = Math.max(attacker.recoverTimer, 0.32);
			} else {
				attacker.slashTimer = 0.34;
				attacker.slashCd = 0.72;
				attacker.attackLock = 0.11;
				attacker.recoverTimer = Math.max(attacker.recoverTimer, 0.2);
			}
			if (!target) return;
			const dx = target.x - attacker.x;
			const dy = target.y - attacker.y;
			attacker.dir = Math.atan2(dy, dx);
		}

		function updateEnemyLeaders(dt) {
			for (const e of enemies) {
				if (e.dead || !e.active) continue;
				if (e.attackLock > 0 || e.recoverTimer > 0) continue;
				if (e.guardPos) {
					if (dist(e, player) < 116 && e.slashCd <= 0) triggerLeaderSlash(e, player);
					e.target = e.guardPos;
					e.x = e.guardPos.x;
					e.y = e.guardPos.y;
					continue;
				}
				e.thinking -= dt;
				if (e.thinking <= 0 || dist(e, e.target) < 40) {
					e.thinking = rand(1.1, 2.8);
					const bias = Math.random() > 0.45 ? player : null;
					if (bias) {
						e.target = { x: player.x + rand(-260, 260), y: player.y + rand(-260, 260) };
					} else {
						e.target = { x: rand(500, CFG.worldW - 300), y: rand(300, CFG.worldH - 300) };
					}
				}
				moveTo(e, e.target.x, e.target.y, e.speed * 0.6, dt);
				e.x = clamp(e.x, 60, CFG.worldW - 60);
				e.y = clamp(e.y, 60, CFG.worldH - 60);
				pushOutMountains(e);
				pushOutEastSea(e);
				if (dist(e, player) < 116 && e.slashCd <= 0) triggerLeaderSlash(e, player);
			}
		}

		function formationTarget(leader, index, total) {
			const ring = Math.floor(Math.sqrt(index));
			const angle = (index * 137.5 * Math.PI) / 180;
			const rad = 36 + ring * 18 + (total > 22 ? (index % 3) * 4 : 0);
			return {
				x: leader.x + Math.cos(angle) * rad,
				y: leader.y + Math.sin(angle) * rad
			};
		}

		function updateUnitSwarm(units, leader, friendly, enemyPool, enemyLeaders, dt) {
			for (let i = 0; i < units.length; i += 1) {
				const u = units[i];
				if (u.dead) continue;

				const ne1 = nearest(enemyPool, u);
				const ne2 = nearest(enemyLeaders, u, (l) => !l.dead);
				let target = null;
				let td = Infinity;

				if (ne1.target && ne1.d < td) {
					target = ne1.target;
					td = ne1.d;
				}
				if (ne2.target && ne2.d < td) {
					target = ne2.target;
					td = ne2.d;
				}

				if (target && td < CFG.aggroRange) {
					if (td <= CFG.attackRange + 6) {
						u.dir = Math.atan2(target.y - u.y, target.x - u.x);
						if (u.slashCd <= 0) triggerUnitSlash(u, target);
						target.hp -= CFG.unitDps * getTeamAttackMultiplier(u.team) * dt;
						applyKnockback(u, target, 0.9);
					} else {
						moveTo(u, target.x, target.y, u.speed, dt);
					}
				} else {
					const p = formationTarget(leader, i, friendly.length);
					moveTo(u, p.x, p.y, u.speed, dt);
				}

				u.x = clamp(u.x, 20, CFG.worldW - 20);
				u.y = clamp(u.y, 20, CFG.worldH - 20);
				pushOutMountains(u);
				pushOutEastSea(u);
				if (u.hp <= 0) u.dead = true;
			}
		}

		function applyCrowdCollision(groupA, groupB, sameGroup) {
			for (let i = 0; i < groupA.length; i += 1) {
				const a = groupA[i];
				if (!a || a.dead) continue;
				const jStart = sameGroup ? i + 1 : 0;
				for (let j = jStart; j < groupB.length; j += 1) {
					const b = groupB[j];
					if (!b || b.dead) continue;
					const dx = b.x - a.x;
					const dy = b.y - a.y;
					const d = Math.hypot(dx, dy) || 0.001;
					const minDist = (a.radius || 7) + (b.radius || 7) + 2;
					if (d < minDist) {
						const overlap = minDist - d;
						const nx = dx / d;
						const ny = dy / d;
						a.x -= nx * overlap * 0.55;
						a.y -= ny * overlap * 0.55;
						b.x += nx * overlap * 0.55;
						b.y += ny * overlap * 0.55;
					}
				}
			}
		}

		function spawnSystem(dtMs) {
			spawnSystem.timer += dtMs;
			if (spawnSystem.timer >= CFG.spawnTickMs) {
				spawnSystem.timer = 0;
				const cap = CFG.maxFollowersBase + outposts.filter((x) => x.owner === "ally").length * 2;
				if (allies.filter((u) => !u.dead).length < cap) {
					allies.push(createUnit(player, "ally"));
				}
				for (const e of enemies) {
					if (e.dead || !e.active) continue;
					const count = enemyUnits.filter((u) => !u.dead && u.owner === e).length;
					if (count < 12) enemyUnits.push(createUnit(e, "enemy"));
				}
			}
		}
		spawnSystem.timer = 0;

		function outpostSystem(dtMs) {
			for (const o of outposts) {
				const nearAlly = dist(player, o) < o.r + 24 || allies.some((u) => !u.dead && dist(u, o) < o.r + 10);
				const nearEnemy = enemies.some((e) => e.active && !e.dead && dist(e, o) < o.r + 24) || enemyUnits.some((u) => !u.dead && dist(u, o) < o.r + 10);

				// 已建设城墙时，敌军先打城墙，城墙未破前不易失城
				if (o.owner === "ally" && o.wallBuilt && o.wallHp > 0) {
					const dmgRate = o.wallLevel >= 2 ? 0.045 : 0.065;
					const regenRate = o.wallLevel >= 2 ? 0.03 : 0.02;
					if (nearEnemy) {
						o.wallHp = Math.max(0, o.wallHp - dtMs * dmgRate);
					}
					if (!nearEnemy && nearAlly) {
						o.wallHp = Math.min(o.wallMaxHp, o.wallHp + dtMs * regenRate);
					}
					if (o.wallHp <= 0) {
						o.wallBuilt = false;
						o.wallLevel = 0;
						o.wallMaxHp = 520;
						o.wallHp = 0;
					}
				}

				const oldOwner = o.owner;
				const allyWallHolding = o.owner === "ally" && o.wallBuilt && o.wallHp > 0 && nearEnemy;
				if (!allyWallHolding) {
					if (nearAlly && !nearEnemy) o.owner = "ally";
					else if (nearEnemy && !nearAlly) o.owner = "enemy";
				}
				if (o.owner !== oldOwner) triggerBreakAnim(o);
				if (o.owner !== "ally") {
					o.wallBuilt = false;
					o.wallLevel = 0;
					o.wallMaxHp = 520;
					o.wallHp = 0;
				}

				o.tick += dtMs;
				if (o.tick >= CFG.neutralTickMs) {
					o.tick = 0;
					if (o.owner === "ally" && allies.filter((u) => !u.dead).length < 30) {
						allies.push(createUnit(player, "ally"));
					}
					if (o.owner === "enemy") {
						const activeEnemyLeaders = enemies.filter((e) => e.active && !e.dead);
						const owner = activeEnemyLeaders[Math.floor(Math.random() * Math.max(1, activeEnemyLeaders.length))];
						if (owner) enemyUnits.push(createUnit(owner, "enemy"));
					}
				}
			}
		}

		function outpostBuildSystem() {
			if (player.dead) return;

			if (cityBuildDialogState.open) {
				positionCityBuildDialog(cityBuildDialogState.outpost);
				lockPlayerForCityDialog();
				return;
			}

			for (const o of outposts) {
				const inside = o.owner === "ally" && dist(player, o) < o.r + 70;
				if (inside && !o._insideBuildArea) {
					o._insideBuildArea = true;
					if (!o.wallBuilt || o.wallLevel <= 0) {
						openCityBuildDialog(o, "build");
						break;
					} else if (o.wallLevel === 1) {
						openCityBuildDialog(o, "upgrade");
						break;
					}
				} else if (!inside) {
					o._insideBuildArea = false;
				}
			}
		}

		function openHellGateBuildDialog() {
			cityBuildDialogState.open = true;
			cityBuildDialogState.outpost = hellGate;
			cityBuildDialogState.mode = "hellBuild";
			const idx = Math.min(hellGate.level, HELL_GATE_UPGRADE_COSTS.length - 1);
			const cost = HELL_GATE_UPGRADE_COSTS[idx];
			const nextLevel = hellGate.level + 1;
			setCityBuildDialogContent(

				`地狱入口：扩建阶段 ${nextLevel}/${hellGate.maxLevel}（消耗 ${cost.gold} 金 + ${cost.iron} 铁）？`,
				"扩建",

			);
			cityBuildDialog.style.display = "block";
			positionCityBuildDialog(hellGate);

		}

		function resetMoveInput() {
			moveInput.up = false;
			moveInput.down = false;
			moveInput.left = false;
			moveInput.right = false;
		}

		function isAnyModalOpen() {
			return cityBuildDialogState.open || shipGateDialogState.open || tavernDialogState.open;
		}

		function lockPlayerForCityDialog() {
			resetMoveInput();
			player.target = { x: player.x, y: player.y };
		}

		function positionCityBuildDialog(outpost) {
			if (!outpost || !cityBuildDialogState.open) return;
			const dialogW = cityBuildDialog.offsetWidth || 240;
			const dialogH = cityBuildDialog.offsetHeight || 100;
			const x = outpost.x - camera.x - dialogW / 2;
			const y = outpost.y - camera.y - outpost.r - dialogH - 12;
			const left = clamp(x, 8, canvas.width - dialogW - 8);
			const top = clamp(y, 8, canvas.height - dialogH - 8);
			cityBuildDialog.style.left = `${left}px`;
			cityBuildDialog.style.top = `${top}px`;
		}

		function setCityBuildDialogContent(title, text, okLabel, cancelLabel) {
			cityBuildTitle.textContent = title;
			cityBuildText.textContent = text;
			cityBuildOk.textContent = okLabel;
			cityBuildCancel.textContent = cancelLabel;
		}

		function openCityBuildDialog(outpost, mode) {
			cityBuildDialogState.open = true;
			cityBuildDialogState.outpost = outpost;
			cityBuildDialogState.mode = mode;
			if (mode === "build") {
				setCityBuildDialogContent("城市建设", `${outpost.name}：建设城墙（花费 ${WALL_BUILD_COST} 金）？`, "建设", "取消");
			} else if (mode === "upgrade") {
				setCityBuildDialogContent("城市升级", `${outpost.name}：升级城墙到二级（花费 ${WALL_UPGRADE_COST} 金）？`, "升级", "取消");
			} else if (mode === "hellBuild") {
				const idx = Math.min(hellGate.level, HELL_GATE_UPGRADE_COSTS.length - 1);
				const cost = HELL_GATE_UPGRADE_COSTS[idx];
				const nextLevel = hellGate.level + 1;
				setCityBuildDialogContent("地狱入口扩建", `地狱入口：扩建阶段 ${nextLevel}/${hellGate.maxLevel}（消耗 ${cost.gold} 金 + ${cost.iron} 铁）？`, "扩建", "取消");
			}
			cityBuildDialog.style.display = "block";
			positionCityBuildDialog(outpost);
			lockPlayerForCityDialog();
		}

		function closeCityBuildDialog() {
			cityBuildDialogState.open = false;
			cityBuildDialogState.outpost = null;
			cityBuildDialogState.mode = "none";
			cityBuildDialog.style.display = "none";
			resetMoveInput();
		}

		function applyCityBuildDialogAction() {
			const o = cityBuildDialogState.outpost;
			if (!o) {
				closeCityBuildDialog();
				return;
			}

			if (cityBuildDialogState.mode === "build") {
				if (playerGold >= WALL_BUILD_COST) {
					playerGold -= WALL_BUILD_COST;
					o.wallBuilt = true;
					o.wallLevel = 1;
					o.wallMaxHp = 520;
					o.wallHp = o.wallMaxHp;
					closeCityBuildDialog();
				} else {
					setCityBuildDialogContent("资金不足", "金钱不足，无法建设城墙。", "知道了", "关闭");
					cityBuildDialogState.mode = "none";
				}
				return;
			}

			if (cityBuildDialogState.mode === "upgrade") {
				if (playerGold >= WALL_UPGRADE_COST) {
					playerGold -= WALL_UPGRADE_COST;
					o.wallLevel = 2;
					o.wallMaxHp = 980;
					o.wallHp = o.wallMaxHp;
					closeCityBuildDialog();
				} else {
					setCityBuildDialogContent("资金不足", "金钱不足，无法升级城墙。", "知道了", "关闭");
					cityBuildDialogState.mode = "none";
				}
				return;
			}

			if (cityBuildDialogState.mode === "hellBuild") {
				if (hellGate.level >= hellGate.maxLevel) {
					setCityBuildDialogContent("地狱入口", "地狱入口已经扩建完成。", "知道了", "关闭");
					cityBuildDialogState.mode = "none";
					return;
				}
				const idx = Math.min(hellGate.level, HELL_GATE_UPGRADE_COSTS.length - 1);
				const cost = HELL_GATE_UPGRADE_COSTS[idx];
				if (playerGold >= cost.gold && playerIron >= cost.iron) {
					playerGold -= cost.gold;
					playerIron -= cost.iron;
					hellGate.level += 1;
					saveHellGateLevel(hellGate.level);
					hellGate.pulse = 1;
					closeCityBuildDialog();
				} else {
					setCityBuildDialogContent("资源不足", `扩建需要 ${cost.gold} 金 + ${cost.iron} 铁。当前：${Math.floor(playerGold)} 金 / ${Math.floor(playerIron)} 铁`, "知道了", "关闭");
					cityBuildDialogState.mode = "none";
				}
				return;
			}

			closeCityBuildDialog();
		}

		function hellGateSystem(dt) {
			if (player.dead) return;
			hellGate.pulse = Math.max(0, hellGate.pulse - dt * 1.8);
			if (cityBuildDialogState.open && cityBuildDialogState.mode === "hellBuild") {
				positionCityBuildDialog(hellGate);
				lockPlayerForCityDialog();
				return;
			}

			const nearBuild = dist(player, hellGate) < hellGate.r + 80;
			if (hellGate.level < hellGate.maxLevel) {
				if (nearBuild && !hellGate.insideBuildArea) {
					hellGate.insideBuildArea = true;
					openHellGateBuildDialog();
				}
				if (!nearBuild) hellGate.insideBuildArea = false;
				return;
			}

			const nearPortal = dist(player, hellGate) < hellGate.portalR;
			if (nearPortal && !hellGate.insidePortalArea) {
				hellGate.insidePortalArea = true;
				hellGate.pulse = 1;
				enterHellPage();
			}
			if (!nearPortal) hellGate.insidePortalArea = false;
		}

		function mineSystem(dt, dtMs) {
			for (let i = mineWorkers.length - 1; i >= 0; i -= 1) {
				const worker = mineWorkers[i];
				const owner = worker.mine.outpost.owner;
				if (owner === "neutral") {
					mineWorkers.splice(i, 1);
					continue;
				}
				worker.team = owner;
				if (worker.wait > 0) {
					worker.wait = Math.max(0, worker.wait - dt);
					continue;
				}
				const target = mineWorkerTarget(worker);
				const remaining = moveTo(worker, target.x, target.y, worker.speed, dt);
				if (worker.phase === "toMine" && remaining <= 8) {
					worker.phase = "toOutpost";
					worker.carrying = true;
					worker.wait = rand(0.28, 0.75);
					worker.mine.sparkle = 1;
				} else if (worker.phase === "toOutpost" && remaining <= worker.mine.outpost.r * 0.42) {
					worker.phase = "toMine";
					worker.carrying = false;
					worker.wait = rand(0.2, 0.55);
					if (worker.mine.resource === "gold" && worker.team === "ally") {
						playerGold += 120;
						spawnGoldPopup(worker.mine.outpost.x, worker.mine.outpost.y - 18, "+120金", "#f2d66f");
					}
					if (worker.mine.resource === "iron" && worker.team === "ally") {
						playerIron += 45;
						spawnGoldPopup(worker.mine.outpost.x, worker.mine.outpost.y - 18, "+45铁", "#d6e3f2");
					}
				}
				worker.x = clamp(worker.x, 16, CFG.worldW - 16);
				worker.y = clamp(worker.y, 16, CFG.worldH - 16);
				pushOutMountains(worker);
				pushOutEastSea(worker);
			}

			for (const mine of mines) {
				mine.sparkle = Math.max(0, mine.sparkle - dt * 1.8);
				if (mine.outpost.owner === "neutral") {
					mine.tick = 0;
					continue;
				}
				mine.tick += dtMs;
				const activeWorkers = mineWorkers.filter((worker) => worker.mine === mine).length;
				if (mine.tick >= 2200 && activeWorkers < 3) {
					mine.tick = 0;
					mineWorkers.push(createMineWorker(mine, mine.outpost.owner));
				}
			}
		}

		function clinicSystem(dt, dtMs) {
			clinic.pulse = Math.max(0, clinic.pulse - dt * 1.8);
			if (clinic.outpost.owner === "neutral") {
				clinic.tick = 0;
				return;
			}

			const healRadius = 180;
			const nearClinic = (entity, extra) => !entity.dead && dist(entity, clinic) <= healRadius + (extra || 0);

			if (clinic.outpost.owner === "ally") {
				if (nearClinic(player, 14)) {
					player.hp = Math.min(player.maxHp, player.hp + 20 * dt);
				}
				for (const u of allies) {
					if (nearClinic(u, 4)) u.hp = Math.min(u.maxHp, u.hp + 12 * dt);
				}
			} else if (clinic.outpost.owner === "enemy") {
				for (const e of enemies) {
					if (!e.active || !nearClinic(e, 14)) continue;
					e.hp = Math.min(e.maxHp, e.hp + 18 * dt);
				}
				for (const u of enemyUnits) {
					if (nearClinic(u, 4)) u.hp = Math.min(u.maxHp, u.hp + 12 * dt);
				}
			}

			clinic.tick += dtMs;
			if (clinic.tick >= 900) {
				clinic.tick = 0;
				clinic.pulse = 1;
			}
		}

		function generateLightningSegs(x1, y1, x2, y2, roughness) {
			const pts = [{ x: x1, y: y1 }];
			for (let i = 1; i < 8; i++) {
				const t = i / 8;
				pts.push({
					x: x1 + (x2 - x1) * t + (Math.random() - 0.5) * roughness * 2,
					y: y1 + (y2 - y1) * t
				});
			}
			pts.push({ x: x2, y: y2 });
			return pts;
		}

		function updateSunArrows(dt) {
			for (let i = sunArrows.length - 1; i >= 0; i--) {
				const a = sunArrows[i];
				a.x += a.vx * dt;
				a.y += a.vy * dt;
				a.life -= dt;
				let hit = false;
				for (const u of enemyUnits) {
					if (u.dead) continue;
					if (Math.hypot(a.x - u.x, a.y - u.y) < (u.radius || 7) + 6) {
						u.hp -= a.damage;
						hit = true;
						break;
					}
				}
				if (!hit) {
					for (const e of enemies) {
						if (!e.active || e.dead) continue;
						if (Math.hypot(a.x - e.x, a.y - e.y) < (e.radius || 12) + 7) {
							e.hp -= a.damage;
							e.hitFlash = Math.max(e.hitFlash || 0, 0.4);
							hit = true;
							break;
						}
					}
				}
				if (hit || a.life <= 0) sunArrows.splice(i, 1);
			}
		}

		function nearestEnemyForHero(hero, range) {
			let best = null;
			let bestD = Infinity;
			for (const u of enemyUnits) {
				if (u.dead) continue;
				const d = dist(hero, u);
				if (d < range && d < bestD) { best = u; bestD = d; }
			}
			for (const e of enemies) {
				if (!e.active || e.dead) continue;
				const d = dist(hero, e);
				if (d < range && d < bestD) { best = e; bestD = d; }
			}
			return { target: best, d: bestD };
		}

		function drawJiayuguan() {
			const jy = jiayuguan;
			if (jy.x + 100 < camera.x || jy.x - 100 > camera.x + canvas.width) return;
			if (jy.y + 80 < camera.y || jy.y - 80 > camera.y + canvas.height) return;
			const sx2 = jy.x - canvas.width / 2 + camera.x; // unused

			const hw = jy.w / 2;
			const hh = jy.h / 2;

			// Drop shadow
			ctx.fillStyle = "rgba(30,22,10,0.30)";
			ctx.beginPath();
			ctx.ellipse(jy.x + 10, jy.y + hh + 10, hw * 1.1, 14, 0, 0, Math.PI * 2);
			ctx.fill();

			// Wall body
			ctx.fillStyle = "#b8a07a";
			ctx.fillRect(jy.x - hw, jy.y - hh, jy.w, jy.h);
			ctx.fillStyle = "#d9c49a";
			ctx.fillRect(jy.x - hw + 3, jy.y - hh + 3, jy.w - 6, jy.h * 0.38);

			// Battlements top row
			ctx.fillStyle = "#c8b085";
			for (let i = -3; i <= 3; i++) {
				if (i === 0) continue;
				ctx.fillRect(jy.x + i * 12 - 4, jy.y - hh - 10, 8, 10);
			}

			// Gate arch
			ctx.fillStyle = "#2a1e0e";
			ctx.beginPath();
			ctx.arc(jy.x, jy.y + 4, 13, Math.PI, 0);
			ctx.rect(jy.x - 13, jy.y + 4, 26, hh - 2);
			ctx.fill();

			// Gate door planks
			ctx.fillStyle = "#4a3218";
			ctx.fillRect(jy.x - 12, jy.y + 4, 11, hh - 4);
			ctx.fillRect(jy.x + 1, jy.y + 4, 11, hh - 4);
			ctx.strokeStyle = "#2a1a08";
			ctx.lineWidth = 1.2;
			for (let i = 1; i < 4; i++) {
				ctx.beginPath();
				ctx.moveTo(jy.x - 12, jy.y + 4 + i * (hh - 4) / 4);
				ctx.lineTo(jy.x - 1, jy.y + 4 + i * (hh - 4) / 4);
				ctx.moveTo(jy.x + 1, jy.y + 4 + i * (hh - 4) / 4);
				ctx.lineTo(jy.x + 12, jy.y + 4 + i * (hh - 4) / 4);
				ctx.stroke();
			}

			// Watchtower
			ctx.fillStyle = "#c09f70";
			ctx.fillRect(jy.x - 18, jy.y - hh - 28, 36, 22);
			ctx.fillStyle = "#a07840";
			ctx.beginPath();
			ctx.moveTo(jy.x - 22, jy.y - hh - 28);
			ctx.lineTo(jy.x, jy.y - hh - 50);
			ctx.lineTo(jy.x + 22, jy.y - hh - 28);
			ctx.closePath();
			ctx.fill();

			// Glowing portal aura in archway
			const t = performance.now() * 0.002;
			const aura = 0.28 + 0.14 * Math.sin(t);
			const grad = ctx.createRadialGradient(jy.x, jy.y + 2, 2, jy.x, jy.y + 2, 18);
			grad.addColorStop(0, `rgba(220,210,130,${aura + 0.25})`);
			grad.addColorStop(1, "rgba(200,180,80,0)");
			ctx.fillStyle = grad;
			ctx.beginPath();
			ctx.arc(jy.x, jy.y + 2, 18, Math.PI, 0);
			ctx.rect(jy.x - 18, jy.y + 2, 36, hh);
			ctx.fill();

			// Name label
			ctx.fillStyle = "rgba(248,238,210,0.95)";
			ctx.font = "bold 14px Microsoft YaHei";
			ctx.textAlign = "center";
			ctx.fillText(jy.name, jy.x, jy.y - hh - 56);

			// Proximity hint
			if (!player.dead && dist(player, jy) < jy.portalR + 80) {
				ctx.fillStyle = "rgba(255,245,190,0.92)";
				ctx.font = "12px Microsoft YaHei";
				ctx.fillText("进入嘉峪关 → 西方大陆", jy.x, jy.y - hh - 70);
			}
		}

		function drawHellGate() {
			const g = hellGate;
			if (g.x + 110 < camera.x || g.x - 110 > camera.x + canvas.width) return;
			if (g.y + 92 < camera.y || g.y - 92 > camera.y + canvas.height) return;

			ctx.fillStyle = "rgba(0,0,0,0.34)";
			ctx.beginPath();
			ctx.ellipse(g.x + 8, g.y + 24, 48, 16, 0, 0, Math.PI * 2);
			ctx.fill();

			ctx.fillStyle = "#4a3c30";
			ctx.fillRect(g.x - 42, g.y - 8, 84, 36);
			ctx.fillStyle = "#6f5a47";
			ctx.fillRect(g.x - 30, g.y - 30, 60, 22);
			ctx.fillStyle = "#241914";
			ctx.beginPath();
			ctx.arc(g.x, g.y + 2, 17, Math.PI, 0);
			ctx.rect(g.x - 17, g.y + 2, 34, 26);
			ctx.fill();

			const portalPower = g.level / g.maxLevel;
			if (portalPower > 0) {
				const glow = 0.25 + portalPower * 0.3 + (g.pulse > 0 ? g.pulse * 0.25 : 0);
				const grad = ctx.createRadialGradient(g.x, g.y + 2, 4, g.x, g.y + 2, 22 + portalPower * 8);
				grad.addColorStop(0, `rgba(255, 110, 70, ${Math.min(0.9, glow + 0.25)})`);
				grad.addColorStop(1, "rgba(160, 40, 28, 0)");
				ctx.fillStyle = grad;
				ctx.beginPath();
				ctx.arc(g.x, g.y + 2, 24 + portalPower * 6, Math.PI, 0);
				ctx.rect(g.x - 24, g.y + 2, 48, 30);
				ctx.fill();
			}

			ctx.fillStyle = "#f6ead6";
			ctx.font = "700 12px Microsoft YaHei";

		function updateLancelotAlly(dt) {
			if (!lancelot_ally) return;
			const l = lancelot_ally;
			l.attackCd = Math.max(0, (l.attackCd || 0) - dt);
			l.slashTimer = Math.max(0, (l.slashTimer || 0) - dt);
			if (heroDetailRuntime && heroDetailRuntime.updateLancelotAlly) {
				heroDetailRuntime.updateLancelotAlly({
					hero: l,
					dt,
					player,
					enemyUnits,
					enemyLeaders: enemies.filter((e) => e.active && !e.dead),
					dist,
					moveToward: moveTo
				});
			} else {
				const dx = player.x - l.x;
				const dy = player.y - l.y;
				const d = Math.hypot(dx, dy);
				if (d > 70) {
					l.x += (dx / d) * Math.min(l.speed * dt, d - 55);
					l.y += (dy / d) * Math.min(l.speed * dt, d - 55);
					l.dir = Math.atan2(dy, dx);
				}
			}

			l.x = clamp(l.x, 20, CFG.worldW - 20);
			l.y = clamp(l.y, 20, CFG.worldH - 20);
			pushOutMountains(l);
			pushOutEastSea(l);
		}

		function drawLightningBolts() {
			for (const bolt of lightningBolts) {
				const a = bolt.life;
				ctx.save();
				ctx.shadowColor = `rgba(100,200,255,${a * 0.8})`;
				ctx.shadowBlur = 22 * a;
				ctx.strokeStyle = `rgba(160,220,255,${a * 0.85})`;
				ctx.lineWidth = 3.5 * a;
				ctx.lineJoin = "round";
				ctx.beginPath();
				ctx.moveTo(bolt.segs[0].x, bolt.segs[0].y);
				for (let i = 1; i < bolt.segs.length; i++) ctx.lineTo(bolt.segs[i].x, bolt.segs[i].y);
				ctx.stroke();
				ctx.shadowBlur = 8 * a;
				ctx.strokeStyle = `rgba(255,255,255,${a * 0.9})`;
				ctx.lineWidth = 1.5 * a;
				ctx.beginPath();
				ctx.moveTo(bolt.segs[0].x, bolt.segs[0].y);
				for (let i = 1; i < bolt.segs.length; i++) ctx.lineTo(bolt.segs[i].x, bolt.segs[i].y);
				ctx.stroke();
				ctx.restore();
				ctx.strokeStyle = `rgba(180,230,255,${a * 0.55})`;
				ctx.lineWidth = 2.2 * a;
				ctx.beginPath();
				ctx.arc(bolt.tx, bolt.ty, bolt.splashR * (0.6 + (1 - a) * 0.5), 0, Math.PI * 2);
				ctx.stroke();
			}
		}

		function cleanup() {
			for (const l of [player, ...enemies]) {
				if (!l.dead && l.hp <= 0) l.dead = true;
			}
			if (zhugeliang && !zhugeliang.dead && zhugeliang.hp <= 0) zhugeliang.dead = true;
			if (lancelot_ally && !lancelot_ally.dead && lancelot_ally.hp <= 0) lancelot_ally.dead = true;
			if (sunshangxiang && !sunshangxiang.dead && sunshangxiang.hp <= 0) sunshangxiang.dead = true;
			if (daqiao && !daqiao.dead && daqiao.hp <= 0) daqiao.dead = true;
			if (xiaoqiao && !xiaoqiao.dead && xiaoqiao.hp <= 0) xiaoqiao.dead = true;
			if (elizabeth && !elizabeth.dead && elizabeth.hp <= 0) elizabeth.dead = true;
			syncDeadHeroIdsFromCurrentState();
			const allyOut = outposts.filter((o) => o.owner === "ally").length;
			const deadEnemyGenerals = enemies.filter((e) => e.dead).length;
			const aliveEnemies = enemies.filter((e) => e.active && !e.dead).length;
			const missionDone = allyOut >= MISSION.needOutposts && deadEnemyGenerals >= MISSION.needGenerals;
			if (!gameState.freePlay && (missionDone || aliveEnemies === 0)) gameState.result = "游戏通关";
			if (player.dead) gameState.result = "失败";
			if (gameState.result) gameState.over = true;
		}

		function updateCamera(dt) {
			const targetX = player.x - canvas.width / 2;
			const targetY = player.y - canvas.height / 2;
			const smooth = 1 - Math.pow(0.001, dt);
			camera.x += (targetX - camera.x) * smooth;
			camera.y += (targetY - camera.y) * smooth;
			camera.x = clamp(camera.x, 0, CFG.worldW - canvas.width);
			camera.y = clamp(camera.y, 0, CFG.worldH - canvas.height);
		}

		function drawHealthBar(x, y, w, hp, maxHp, color) {
			ctx.fillStyle = "rgba(20,20,20,0.7)";
			ctx.fillRect(x - w / 2, y, w, 5);
			ctx.fillStyle = color;
			ctx.fillRect(x - w / 2 + 1, y + 1, (w - 2) * clamp(hp / maxHp, 0, 1), 3);
		}

		function drawSoldier(entity, isLeader, baseColor, accentColor) {
			ctx.save();
			ctx.translate(entity.x, entity.y);

			const scale = isLeader ? 1.25 : 0.82;
			ctx.scale(scale, scale);

			// mounted horse body
			if (isLeader && entity === player && player.mounted) {
				ctx.fillStyle = "#8b5e3c";
				ctx.beginPath();
				ctx.ellipse(0, 13, 14, 7.5, 0, 0, Math.PI * 2);
				ctx.fill();
				ctx.fillStyle = "#7a4a24";
				ctx.beginPath();
				ctx.ellipse(10, 5, 6.5, 5, -0.5, 0, Math.PI * 2);
				ctx.fill();
				ctx.strokeStyle = "#5a3010";
				ctx.lineWidth = 2.2;
				ctx.beginPath();
				ctx.moveTo(-9, 18); ctx.lineTo(-10, 26);
				ctx.moveTo(-3, 20); ctx.lineTo(-3, 28);
				ctx.moveTo(3, 20);  ctx.lineTo(4, 28);
				ctx.moveTo(9, 17);  ctx.lineTo(10, 25);
				ctx.stroke();
			}

			ctx.strokeStyle = "rgba(0,0,0,0.35)";
			ctx.lineWidth = 2;
			ctx.beginPath();
			ctx.moveTo(0, 2);
			ctx.lineTo(-4, 9);
			ctx.moveTo(0, 2);
			ctx.lineTo(4, 9);
			ctx.stroke();

			ctx.fillStyle = baseColor;
			ctx.fillRect(-4.6, -8.2, 9.2, 12.2);

			ctx.fillStyle = accentColor;
			ctx.fillRect(-6.2, -6.8, 2.6, 6);
			ctx.fillRect(3.6, -6.8, 2.6, 6);

			ctx.strokeStyle = "#2f2518";
			ctx.lineWidth = 2;
			ctx.beginPath();
			ctx.moveTo(-2, 4);
			ctx.lineTo(-2.5, 11);
			ctx.moveTo(2, 4);
			ctx.lineTo(2.5, 11);
			ctx.stroke();

			ctx.fillStyle = isLeader && entity.head ? entity.head : "#e7c59e";
			ctx.beginPath();
			ctx.arc(0, -11.5, 4.6, 0, Math.PI * 2);
			ctx.fill();

			ctx.fillStyle = "#2f1e16";
			ctx.fillRect(-5, -14.8, 10, 2.8);

			if (isLeader) {
				const empoweredBlade = entity === player && !!player.goldBlade;
				const weaponType = entity.weaponType || "saber";
				ctx.save();
				ctx.rotate((entity.dir || 0) + 0.06);
				if (empoweredBlade) {
					ctx.shadowColor = "rgba(255, 221, 96, 0.95)";
					ctx.shadowBlur = 14;
				}

				if (weaponType === "pudao") {
					// swing weight shift: blade tip extends at mid-swing (下劈重心变化)
					if (entity.slashTimer > 0) {
						const swingP = 1 - entity.slashTimer / 0.34;
						const ext = Math.sin(clamp(swingP, 0, 1) * Math.PI) * 4.5;
						ctx.translate(ext * 0.28, -ext * 0.6);
					}

					// counterweight knob at butt of handle (刀背配重)
					ctx.fillStyle = empoweredBlade ? "#a07830" : "#4d3621";
					ctx.beginPath();
					ctx.ellipse(-5.2, 7.2, 3.2, 2.1, 0.9, 0, Math.PI * 2);
					ctx.fill();

					// shaft
					ctx.strokeStyle = empoweredBlade ? "#8a682a" : "#6b4c2d";
					ctx.lineWidth = 3;
					ctx.beginPath();
					ctx.moveTo(-3.2, 4.6);
					ctx.lineTo(16.8, -21.4);
					ctx.stroke();

					// blade body
					ctx.fillStyle = empoweredBlade ? "#f0cd60" : "#cfd7e1";
					ctx.beginPath();
					ctx.moveTo(16.2, -21.8);
					ctx.lineTo(24.6, -31.2);
					ctx.lineTo(22.6, -15.8);
					ctx.lineTo(18.4, -19.1);
					ctx.closePath();
					ctx.fill();

					// blade spine — dark ridge (刀背)
					ctx.strokeStyle = empoweredBlade ? "#7a5515" : "#8a9aaa";
					ctx.lineWidth = 1.6;
					ctx.beginPath();
					ctx.moveTo(16.6, -21.4);
					ctx.lineTo(22.8, -15.6);
					ctx.stroke();

					// cutting edge highlight
					ctx.fillStyle = empoweredBlade ? "#f7df92" : "#ecf2f8";
					ctx.beginPath();
					ctx.moveTo(18.3, -20.1);
					ctx.lineTo(22.1, -24.6);
					ctx.lineTo(21.3, -18.6);
					ctx.closePath();
					ctx.fill();

					// edge line (刀刃)
					ctx.strokeStyle = empoweredBlade ? "#f5d46d" : "#d8e0e9";
					ctx.lineWidth = 1.4;
					ctx.beginPath();
					ctx.moveTo(16.6, -21.2);
					ctx.lineTo(23.6, -29.1);
					ctx.stroke();

					// guard (护格)
					ctx.fillStyle = empoweredBlade ? "#f3c95a" : "#c9d2dd";
					ctx.fillRect(14.7, -19.8, 2.3, 2.3);
				} else if (weaponType === "spear") {
					ctx.strokeStyle = "#61462c";
					ctx.lineWidth = 2.3;
					ctx.beginPath();
					ctx.moveTo(-2, 4);
					ctx.lineTo(18, -20);
					ctx.stroke();
					ctx.strokeStyle = "#d5dce5";
					ctx.lineWidth = 1.6;
					ctx.beginPath();
					ctx.moveTo(18, -20);
					ctx.lineTo(23, -24);
					ctx.lineTo(21, -18);
					ctx.stroke();
				} else if (weaponType === "hammer") {
					ctx.strokeStyle = "#5a4026";
					ctx.lineWidth = 2.9;
					ctx.beginPath();
					ctx.moveTo(-2, 3);
					ctx.lineTo(9, -15);
					ctx.stroke();
					ctx.fillStyle = "#adb8c4";
					ctx.fillRect(9, -20, 9, 8);
					ctx.fillStyle = "#87919d";
					ctx.fillRect(10.2, -18.8, 2.4, 5.6);
					ctx.fillRect(14.2, -18.8, 2.4, 5.6);
				} else if (weaponType === "halberd") {
					ctx.strokeStyle = "#5f452b";
					ctx.lineWidth = 2.4;
					ctx.beginPath();
					ctx.moveTo(-2, 4);
					ctx.lineTo(14, -19);
					ctx.stroke();
					ctx.strokeStyle = "#d0d9e2";
					ctx.lineWidth = 1.8;
					ctx.beginPath();
					ctx.moveTo(13.5, -19.2);
					ctx.quadraticCurveTo(22, -24, 21, -10.5);
					ctx.moveTo(14.5, -16.5);
					ctx.lineTo(7.5, -20.5);
					ctx.stroke();
				} else {
					ctx.strokeStyle = "#5f4327";
					ctx.lineWidth = 2.2;
					ctx.beginPath();
					ctx.moveTo(-2, 4);
					ctx.lineTo(14, -18);
					ctx.stroke();
				}

				ctx.restore();

				ctx.strokeStyle = "rgba(255, 248, 209, 0.9)";
				ctx.lineWidth = 2;
				ctx.beginPath();
				ctx.arc(0, -2, 14 + Math.sin(performance.now() * 0.01) * 1.2, 0, Math.PI * 2);
				ctx.stroke();

				if (entity.hitFlash > 0) {
					const hf = entity.hitFlash;
					// outer warm bloom
					ctx.fillStyle = `rgba(255, 210, 100, ${clamp(hf * 0.38, 0, 0.36)})`;
					ctx.beginPath();
					ctx.ellipse(0, -5.5, 14, 16, 0, 0, Math.PI * 2);
					ctx.fill();
					// inner white core
					ctx.fillStyle = `rgba(255, 252, 230, ${clamp(0.18 + hf * 0.52, 0, 0.72)})`;
					ctx.beginPath();
					ctx.ellipse(0, -5.5, 9.8, 11, 0, 0, Math.PI * 2);
					ctx.fill();
				}

				if (entity.slashTimer > 0) {
					const t = clamp(entity.slashTimer / 0.34, 0, 1);
					const heavy = entity.attackLock > 0 ? 0.5 : entity.recoverTimer > 0 ? -0.25 : 0;
					const swing = (1 - t) * 1.5 - 0.85 + heavy;
					const facing = entity.dir || 0;
					const sa = facing - 1.35 + swing;
					const ea = facing + 0.22 + swing;

					ctx.strokeStyle = empoweredBlade ? `rgba(255, 218, 86, ${0.48 + (1 - t) * 0.42})` : `rgba(255, 231, 156, ${0.38 + (1 - t) * 0.52})`;
					ctx.lineWidth = 4.6;
					ctx.beginPath();
					ctx.arc(0, -8, 18.8, sa, ea);
					ctx.stroke();

					ctx.strokeStyle = empoweredBlade ? `rgba(255, 248, 198, ${0.32 + (1 - t) * 0.44})` : `rgba(255, 255, 255, ${0.25 + (1 - t) * 0.4})`;
					ctx.lineWidth = 1.8;
					ctx.beginPath();
					ctx.arc(0, -8, 15.2, sa + 0.05, ea - 0.08);
					ctx.stroke();
				}
			} else if (entity.slashTimer > 0) {
				const t = clamp(entity.slashTimer / 0.12, 0, 1);
				const swing = (1 - t) * 1.35 - 0.72;
				const facing = entity.dir || 0;
				const sa = facing - 1.05 + swing;
				const ea = facing + 0.05 + swing;

				ctx.strokeStyle = `rgba(255, 228, 150, ${0.28 + (1 - t) * 0.45})`;
				ctx.lineWidth = 2.1;
				ctx.beginPath();
				ctx.arc(0, -5, 10.5, sa, ea);
				ctx.stroke();

				ctx.strokeStyle = `rgba(255, 255, 255, ${0.16 + (1 - t) * 0.28})`;
				ctx.lineWidth = 0.9;
				ctx.beginPath();
				ctx.arc(0, -5, 8.2, sa + 0.03, ea - 0.04);
				ctx.stroke();
			}

			ctx.restore();
		}

		function drawMineWorker(worker) {
			ctx.save();
			ctx.translate(worker.x, worker.y);
			const body = worker.team === "ally" ? "#d4b35e" : "#cd6e5d";
			const accent = worker.team === "ally" ? "#f7e3a0" : "#f1b0a0";
			ctx.strokeStyle = "rgba(0,0,0,0.28)";
			ctx.lineWidth = 1.4;
			ctx.beginPath();
			ctx.moveTo(0, 1);
			ctx.lineTo(-2.2, 5.6);
			ctx.moveTo(0, 1);
			ctx.lineTo(2.2, 5.6);
			ctx.stroke();

			ctx.fillStyle = body;
			ctx.fillRect(-2.8, -4.5, 5.6, 7.2);
			ctx.fillStyle = accent;
			ctx.fillRect(-3.7, -3.3, 1.2, 4.2);
			ctx.fillRect(2.5, -3.3, 1.2, 4.2);

			ctx.fillStyle = "#ecc8a0";
			ctx.beginPath();
			ctx.arc(0, -6.8, 2.5, 0, Math.PI * 2);
			ctx.fill();

			if (worker.carrying) {
				ctx.fillStyle = worker.mine.resource === "iron" ? "#b7c0ca" : "#f3cf59";
				ctx.fillRect(2.2, -6.2, 4.1, 4.1);
				ctx.strokeStyle = worker.mine.resource === "iron" ? "rgba(235, 241, 247, 0.65)" : "rgba(255, 249, 201, 0.65)";
				ctx.lineWidth = 0.9;
				ctx.strokeRect(2.2, -6.2, 4.1, 4.1);
			}
			ctx.restore();
		}

		function drawMap() {
			const bg = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
			bg.addColorStop(0, "#86b576");
			bg.addColorStop(1, "#6f9f63");
			ctx.fillStyle = bg;
			ctx.fillRect(0, 0, canvas.width, canvas.height);

			ctx.save();
			ctx.translate(-camera.x, -camera.y);

			for (const b of biomes) {
				if (b.x < camera.x - b.r || b.x > camera.x + canvas.width + b.r) continue;
				if (b.y < camera.y - b.r || b.y > camera.y + canvas.height + b.r) continue;
				const g = ctx.createRadialGradient(b.x, b.y, b.r * 0.15, b.x, b.y, b.r);
				if (b.type === "wet") {
					g.addColorStop(0, "rgba(107, 143, 118, 0.45)");
					g.addColorStop(1, "rgba(96, 127, 109, 0.02)");
				} else if (b.type === "hill") {
					g.addColorStop(0, "rgba(170, 155, 117, 0.4)");
					g.addColorStop(1, "rgba(154, 141, 104, 0.02)");
				} else {
					g.addColorStop(0, "rgba(75, 109, 63, 0.42)");
					g.addColorStop(1, "rgba(70, 100, 60, 0.02)");
				}
				ctx.fillStyle = g;
				ctx.beginPath();
				ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
				ctx.fill();

				if (b.type === "wet") {
					ctx.strokeStyle = "rgba(86, 125, 131, 0.22)";
					ctx.lineWidth = 2;
					for (let i = 0; i < 6; i += 1) {
						ctx.beginPath();
						const rr = b.r * (0.32 + i * 0.11);
						ctx.arc(b.x + i * 4, b.y - i * 3, rr, 0.3, Math.PI * 1.35);
						ctx.stroke();
					}
				} else if (b.type === "hill") {
					ctx.strokeStyle = "rgba(177, 160, 122, 0.22)";
					ctx.lineWidth = 2;
					for (let i = 0; i < 5; i += 1) {
						ctx.beginPath();
						ctx.ellipse(b.x, b.y, b.r * (0.35 + i * 0.13), b.r * (0.2 + i * 0.08), 0.2, 0, Math.PI * 2);
						ctx.stroke();
					}
				} else {
					ctx.fillStyle = "rgba(44, 68, 41, 0.2)";
					for (let i = 0; i < 70; i += 1) {
						const px = b.x + rand(-b.r * 0.75, b.r * 0.75);
						const py = b.y + rand(-b.r * 0.75, b.r * 0.75);
						if (Math.hypot(px - b.x, py - b.y) > b.r * 0.8) continue;
						ctx.fillRect(px, py, 2, 2);
					}
				}
			}

			for (const g of grassDots) {
				if (g.x < camera.x - 10 || g.x > camera.x + canvas.width + 10) continue;
				if (g.y < camera.y - 10 || g.y > camera.y + canvas.height + 10) continue;
				ctx.fillStyle = g.c;
				ctx.beginPath();
				ctx.arc(g.x, g.y, g.r, 0, Math.PI * 2);
				ctx.fill();
			}

			for (const h of hills) {
				if (h.x < camera.x - h.r || h.x > camera.x + canvas.width + h.r) continue;
				if (h.y < camera.y - h.r || h.y > camera.y + canvas.height + h.r) continue;
				const grad = ctx.createRadialGradient(h.x - h.r * 0.2, h.y - h.r * 0.25, h.r * 0.2, h.x, h.y, h.r);
				grad.addColorStop(0, `rgba(185, 176, 130, ${h.a + 0.06})`);
				grad.addColorStop(1, "rgba(120, 116, 82, 0)");
				ctx.fillStyle = grad;
				ctx.beginPath();
				ctx.arc(h.x, h.y, h.r, 0, Math.PI * 2);
				ctx.fill();
			}

			ctx.strokeStyle = "rgba(55, 93, 116, 0.52)";
			ctx.lineWidth = 42;
			ctx.lineCap = "round";
			ctx.beginPath();
			ctx.moveTo(420, 260);
			ctx.bezierCurveTo(1100, 900, 2200, 1150, 3200, 1600);
			ctx.bezierCurveTo(3900, 1880, 4600, 2500, 4980, 3060);
			ctx.stroke();

			ctx.strokeStyle = "#4e97b3";
			ctx.lineWidth = 31;
			ctx.beginPath();
			ctx.moveTo(420, 260);
			ctx.bezierCurveTo(1100, 900, 2200, 1150, 3200, 1600);
			ctx.bezierCurveTo(3900, 1880, 4600, 2500, 4980, 3060);
			ctx.stroke();

			ctx.strokeStyle = "#8c7450";
			ctx.lineWidth = 22;
			ctx.beginPath();
			ctx.moveTo(350, 560);
			ctx.lineTo(2200, 540);
			ctx.lineTo(4780, 840);
			ctx.stroke();

			ctx.beginPath();
			ctx.moveTo(420, 1640);
			ctx.lineTo(2300, 1700);
			ctx.lineTo(4850, 2340);
			ctx.stroke();

			ctx.beginPath();
			ctx.moveTo(600, 3000);
			ctx.lineTo(2480, 2620);
			ctx.lineTo(4860, 2860);
			ctx.stroke();

			ctx.strokeStyle = "rgba(199, 171, 120, 0.45)";
			ctx.setLineDash([7, 9]);
			ctx.lineWidth = 3;
			ctx.beginPath();
			ctx.moveTo(350, 560);
			ctx.lineTo(2200, 540);
			ctx.lineTo(4780, 840);
			ctx.moveTo(420, 1640);
			ctx.lineTo(2300, 1700);
			ctx.lineTo(4850, 2340);
			ctx.moveTo(600, 3000);
			ctx.lineTo(2480, 2620);
			ctx.lineTo(4860, 2860);
			ctx.stroke();
			ctx.setLineDash([]);

			for (const f of forests) {
				if (f.x < camera.x - 12 || f.x > camera.x + canvas.width + 12) continue;
				if (f.y < camera.y - 12 || f.y > camera.y + canvas.height + 12) continue;
				ctx.fillStyle = "rgba(39, 60, 31, 0.25)";
				ctx.beginPath();
				ctx.arc(f.x + 2, f.y + 3, f.r * 1.1, 0, Math.PI * 2);
				ctx.fill();
				ctx.fillStyle = f.c;
				ctx.beginPath();
				ctx.arc(f.x, f.y, f.r, 0, Math.PI * 2);
				ctx.fill();
			}

			for (const r of rocks) {
				if (r.x < camera.x - 20 || r.x > camera.x + canvas.width + 20) continue;
				if (r.y < camera.y - 20 || r.y > camera.y + canvas.height + 20) continue;
				ctx.fillStyle = "rgba(95, 98, 91, 0.65)";
				ctx.fillRect(r.x - r.w * 0.5, r.y - r.h * 0.5, r.w, r.h);
				ctx.fillStyle = "rgba(147, 153, 142, 0.45)";
				ctx.fillRect(r.x - r.w * 0.42, r.y - r.h * 0.42, r.w * 0.48, r.h * 0.36);
			}

			// 东部海洋可视化（不透明覆盖，彻底隐藏海面道路与树木）
			ctx.save();
			ctx.beginPath();
			ctx.moveTo(eastSeaWallX, -120);
			ctx.lineTo(CFG.worldW + 260, -120);
			ctx.lineTo(CFG.worldW + 260, CFG.worldH + 120);
			ctx.lineTo(eastSeaWallX, CFG.worldH + 120);
			ctx.closePath();
			const seaGradMain = ctx.createLinearGradient(eastSeaWallX, 0, CFG.worldW + 120, 0);
			seaGradMain.addColorStop(0, "rgba(66, 135, 178, 0.98)");
			seaGradMain.addColorStop(1, "rgba(36, 90, 128, 1)");
			ctx.fillStyle = seaGradMain;
			ctx.fill();
			ctx.strokeStyle = "rgba(196, 230, 244, 0.76)";
			ctx.lineWidth = 3;
			ctx.stroke();
			ctx.restore();

			// ===== WESTERN MOUNTAIN RANGE =====
			const mountainVisualAnchors = [];
			for (const m of mountainZones) {
				if (m.x + m.r < camera.x || m.x - m.r > camera.x + canvas.width) continue;
				if (m.y + m.r < camera.y || m.y - m.r > camera.y + canvas.height) continue;

				const baseY = m.y + m.r * 0.66;
				const left = m.x - m.r * 0.92;
				const right = m.x + m.r * 0.94;
				const peaks = m.name ? 8 : 6;
				const ridge = [];

				for (let i = 0; i <= peaks; i++) {
					const t = i / peaks;
					const px = left + (right - left) * t;
					const seed = (m.x * 0.013 + m.y * 0.017 + i * 1.73);
					const n1 = Math.sin(seed) * 0.5 + 0.5;
					const n2 = Math.cos(seed * 1.9) * 0.5 + 0.5;
					const shoulder = 1 - Math.abs(t * 2 - 1);
					const height = m.r * (0.56 + shoulder * 0.50 + n1 * 0.20 + n2 * 0.12);
					ridge.push({ x: px, y: baseY - height });
				}

				ctx.fillStyle = "rgba(28, 24, 20, 0.30)";
				ctx.beginPath();
				ctx.moveTo(left + m.r * 0.16, baseY + m.r * 0.24);
				for (const p of ridge) ctx.lineTo(p.x + m.r * 0.18, p.y + m.r * 0.2);
				ctx.lineTo(right + m.r * 0.2, baseY + m.r * 0.24);
				ctx.closePath();
				ctx.fill();

				const mg = ctx.createLinearGradient(m.x, baseY - m.r * 1.12, m.x, baseY + m.r * 0.34);
				mg.addColorStop(0, "#d4ccb2");
				mg.addColorStop(0.42, "#a28f6c");
				mg.addColorStop(1, "#6d5f4c");
				ctx.fillStyle = mg;
				ctx.beginPath();
				ctx.moveTo(left, baseY);
				for (const p of ridge) ctx.lineTo(p.x, p.y);
				ctx.lineTo(right, baseY);
				ctx.closePath();
				ctx.fill();

				ctx.fillStyle = "rgba(77, 66, 52, 0.18)";
				ctx.beginPath();
				ctx.ellipse(m.x, baseY + m.r * 0.08, m.r * 0.86, m.r * 0.19, 0, 0, Math.PI * 2);
				ctx.fill();

				ctx.fillStyle = "rgba(236, 233, 224, 0.85)";
				ctx.beginPath();
				const snowEnd = Math.max(2, Math.floor(ridge.length * 0.55));
				ctx.moveTo(ridge[1].x, ridge[1].y + m.r * 0.1);
				for (let i = 2; i < snowEnd; i++) {
					ctx.lineTo(ridge[i].x, ridge[i].y + m.r * 0.08 + Math.sin(i * 1.3) * m.r * 0.03);
				}
				ctx.lineTo(ridge[snowEnd].x, ridge[snowEnd].y + m.r * 0.16);
				ctx.lineTo(ridge[1].x + m.r * 0.18, ridge[1].y + m.r * 0.24);
				ctx.closePath();
				ctx.fill();

				ctx.strokeStyle = "rgba(53, 44, 34, 0.24)";
				ctx.lineWidth = 1.3;
				for (let i = 1; i < ridge.length - 1; i++) {
					const rp = ridge[i];
					const lineH = m.r * (0.2 + (i % 3) * 0.12);
					ctx.beginPath();
					ctx.moveTo(rp.x, rp.y + m.r * 0.06);
					ctx.lineTo(rp.x + m.r * 0.09, Math.min(baseY - 4, rp.y + lineH));
					ctx.stroke();
				}

				// Named mountain label
				if (m.name) {
					ctx.fillStyle = "rgba(248, 240, 220, 0.88)";

					ctx.fillText(m.name, m.x, baseY - m.r * 1.02);
				}

				mountainVisualAnchors.push({
					x: m.x,
					y: m.y,
					r: m.r,
					baseY,
					topY: baseY - m.r * 1.12,
					left: m.x - m.r * 0.92,
					right: m.x + m.r * 0.94
				});

			// Connect adjacent mountains vertically so visual wall matches collision wall.
			const chainAnchors = mountainVisualAnchors
				.filter((a) => a.x < 420)

			for (let i = 0; i < chainAnchors.length - 1; i++) {
				const a = chainAnchors[i];
				const b = chainAnchors[i + 1];
				const midY = (a.y + b.y) * 0.5;
				const inJiayuguanBand = Math.abs(midY - jiayuguan.y) < 170;
				if (inJiayuguanBand) continue; // Keep intentional pass opening near 嘉峪关.

				const gapY = b.topY - a.baseY;
				if (gapY <= 10) continue;
				if (gapY > 420) continue;

				const left = Math.min(a.left, b.left) + 8;
				const right = Math.max(a.right, b.right) - 8;
				const top = a.baseY - 6;
				const bottom = b.topY + 8;

				const cg = ctx.createLinearGradient(0, top, 0, bottom);
				cg.addColorStop(0, "rgba(103, 89, 69, 0.74)");
				cg.addColorStop(1, "rgba(78, 67, 52, 0.84)");
				ctx.fillStyle = cg;
				ctx.beginPath();
				ctx.moveTo(left, top);
				ctx.lineTo(right, top + 4);
				ctx.lineTo(right - 10, bottom);
				ctx.lineTo(left + 10, bottom + 2);
				ctx.closePath();
				ctx.fill();

				ctx.fillStyle = "rgba(48, 41, 33, 0.24)";

			// 武当山茅屋

			for (const mine of mines) {

			const clinicBanner = clinic.outpost.owner === "ally" ? "#cfb35e" : clinic.outpost.owner === "enemy" ? "#ca705f" : "#8f7bc0";
			ctx.fillStyle = "rgba(0,0,0,0.22)";

			ctx.fillStyle = "#cab6a2";

			ctx.lineTo(clinic.x + 29, clinic.y - 19);

			ctx.fillStyle = "#f6ead6";

			ctx.fillText(clinic.name, clinic.x, clinic.y - 42);

			// stable (马场) near 北平
			const stableWall = stable.outpost.owner === "ally" ? "#b59b57" : stable.outpost.owner === "enemy" ? "#b15b4a" : "#7b6aa8";
			const stableGate = stable.outpost.owner === "ally" ? "#d7c079" : stable.outpost.owner === "enemy" ? "#d68170" : "#9f8bcc";

			ctx.fill();
			ctx.fillStyle = "#d6bc7e";
			ctx.fillRect(stable.x - 46, stable.y - 22, 92, 58);
			ctx.strokeStyle = stableWall;
			ctx.lineWidth = 5;
			ctx.strokeRect(stable.x - 46, stable.y - 22, 92, 58);

			ctx.beginPath();
			ctx.moveTo(stable.x - 46, stable.y + 8);

			ctx.fillStyle = "#7a4e28";
			ctx.beginPath();
			ctx.ellipse(stable.x - 6, stable.y + 22, 16, 8, 0, 0, Math.PI * 2);
			ctx.fill();
			ctx.beginPath();

			ctx.fill();
			ctx.fillStyle = stableGate;
			ctx.fillRect(stable.x + 30, stable.y - 38, 4, 22);
			ctx.beginPath();
			ctx.moveTo(stable.x + 34, stable.y - 38);
			ctx.lineTo(stable.x + 53, stable.y - 29);

			ctx.closePath();
			ctx.fill();
			ctx.fillStyle = "#f6ead6";
			ctx.font = "700 11px Microsoft YaHei";
			ctx.textAlign = "center";
			ctx.fillText(stable.name, stable.x, stable.y - 48);

			for (const o of outposts) {

				const gate = o.owner === "ally" ? "#d7c079" : o.owner === "enemy" ? "#d68170" : "#9f8bcc";

				if (o.wallBuilt && o.wallHp > 0) {

					ctx.strokeStyle = "rgba(62,49,34,0.45)";
					ctx.lineWidth = 2;
					ctx.strokeRect(o.x - 55, o.y - 49, 110, 98);
					drawHealthBar(o.x, o.y - 62, 64, o.wallHp, o.wallMaxHp, o.wallLevel >= 2 ? "#a8ddff" : "#88d0ff");
					if (o.wallLevel >= 2) {
						ctx.fillStyle = "#e7eef8";

						ctx.textAlign = "center";

				ctx.fillStyle = "rgba(0,0,0,0.22)";

				// Gate-break debris particles
				for (const bp of o.breakParts) {
					ctx.globalAlpha = Math.max(0, bp.life);

					ctx.fillRect(bp.x - bp.w / 2, bp.y - bp.h / 2, bp.w, bp.h);

			for (const worker of mineWorkers) {

			for (const e of enemies) {

				drawHealthBar(e.x, e.y - 26, 38, e.hp, e.maxHp, "#ff8f7d");

			drawSunshangxiang();

				else drawSoldier(player, true, player.body || "#cfad5b", player.accent || "#ffe7a5");

				ctx.fillStyle = "#fff4c8";
				ctx.font = "700 13px Microsoft YaHei";
				ctx.textAlign = "center";
				ctx.fillText(player.name, player.x, player.y - 32);

				drawHealthBar(player.x, player.y - 27, 42, player.hp, player.maxHp, "#ffe9a8");
			}

			if (clickMarker.life > 0) {
				const alpha = clickMarker.life;
				ctx.strokeStyle = `rgba(255, 243, 171, ${alpha})`;
				ctx.lineWidth = 2;
				ctx.beginPath();
				const rr = (1 - alpha) * 42;
				ctx.arc(clickMarker.x, clickMarker.y, 12 + rr, 0, Math.PI * 2);
				ctx.stroke();
			}

			// Charge skill shockwave rings
			for (const ef of chargeEffects) {
				const a = ef.life;
				ctx.strokeStyle = `rgba(255, 220, 55, ${a * 0.9})`;
				ctx.lineWidth = 5 * a;
				ctx.beginPath();
				ctx.arc(ef.x, ef.y, ef.r, 0, Math.PI * 2);
				ctx.stroke();
				ctx.strokeStyle = `rgba(255, 140, 20, ${a * 0.5})`;

			// 诸葛亮雷电效果
