<!DOCTYPE html>
<html lang="zh-CN">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>西方大陆</title>
	<style>
		:root {
			--sky: #8ab0c8;
			--text: #f3f5ef;
		}
		html, body {
			margin: 0; width: 100%; height: 100%;
			overflow: hidden;
			font-family: "Segoe UI", "Microsoft YaHei", sans-serif;
			background: var(--sky);
			color: var(--text);
			user-select: none;
		}
		#game { width: 100vw; height: 100vh; display: block; cursor: crosshair; touch-action: none; }
		#miniWrap {
			position: fixed; right: 12px; bottom: 12px; z-index: 3;
			width: 240px; height: 160px; border-radius: 8px;
			border: 1px solid rgba(255,255,255,0.22);
			background: rgba(10,12,10,0.6); overflow: hidden;
		}
		#mini { width: 100%; height: 100%; display: block; cursor: pointer; }
		#backBtn {
			position: fixed; top: 14px; right: 14px; z-index: 4;
			border: 1px solid rgba(255,255,255,0.35);
			background: rgba(26,34,26,0.85); color: #f2f5ee;
			height: 36px; padding: 0 16px; border-radius: 8px;
			font-size: 13px; font-weight: 600; cursor: pointer;
		}
		#backBtn:hover { background: rgba(45,58,45,0.9); }
		/* ── Quest dialog ─────────────────────────────────────────────────── */
		#questDialog {
			display: none;
			position: fixed; left: 50%; bottom: 80px;
			transform: translateX(-50%);
			z-index: 10;
			width: min(560px, 92vw);
			background: rgba(12,10,6,0.93);
			border: 1.5px solid rgba(200,185,130,0.6);
			border-radius: 10px;
			padding: 14px 20px 12px 20px;
			box-shadow: 0 4px 28px rgba(0,0,0,0.7);
			pointer-events: none;
		}
		#questDialog .qdSpeaker {
			font-size: 13px; font-weight: 700;
			color: #e8c86a; margin-bottom: 4px; letter-spacing: 1px;
		}
		#questDialog .qdText {
			font-size: 13px; color: #f0e8d0; line-height: 1.6;
		}
		#questDialog .qdHint {
			font-size: 11px; color: rgba(200,190,160,0.55);
			margin-top: 6px; text-align: right;
		}
		/* ── Quest tracker ────────────────────────────────────────────────── */
		#questTracker {
			display: none;
			position: fixed; left: 14px; top: 60px; z-index: 5;
			background: rgba(0,0,0,0.55);
			border: 1px solid rgba(200,180,100,0.35);
			border-radius: 7px; padding: 7px 13px;
			font-size: 12px; color: #e8d8a0; min-width: 180px;
			pointer-events: none;
		}
		#questTracker .qtTitle { font-weight: 700; font-size: 12px; color: #f0d060; margin-bottom: 3px; }
		#titleBar {
			position: fixed; top: 14px; left: 50%; transform: translateX(-50%);
			z-index: 4; background: rgba(0,0,0,0.45);
			padding: 6px 22px; border-radius: 8px;
			font-size: 15px; font-weight: 700; color: #e8d8b0;
			letter-spacing: 2px;
		}
	</style>
</head>
<body>
	<div id="titleBar">⚔ 西方大陆 — 欧洲战场</div>
	<button id="backBtn" onclick="location.href='index.html'">← 返回东方</button>
	<div id="questDialog">
		<div class="qdSpeaker" id="qdSpeaker"></div>
		<div class="qdText" id="qdText"></div>
		<div class="qdHint">（靠近继续…）</div>
	</div>
	<div id="questTracker">
		<div class="qtTitle">📜 当前任务</div>
		<div id="qtDesc">-</div>
	</div>
	<canvas id="game"></canvas>
	<div id="miniWrap"><canvas id="mini"></canvas></div>

	<script>
	const canvas = document.getElementById("game");
	const ctx = canvas.getContext("2d");
	const mini = document.getElementById("mini");
	const miniCtx = mini.getContext("2d");

	// ── World ─────────────────────────────────────────────────────────────────
	const W = 1800, H = 1200;

	const rand  = (a, b) => a + Math.random() * (b - a);
	const clamp = (v, a, b) => Math.max(a, Math.min(b, v));
	const dist  = (a, b) => Math.hypot(a.x - b.x, a.y - b.y);

	const camera = { x: 0, y: 0 };

	// ── Procedural terrain seeds ──────────────────────────────────────────────
	const grassDots = Array.from({ length: 800 }, () => ({
		x: rand(0, W), y: rand(0, H),
		r: rand(0.8, 2.2),
		c: Math.random() > 0.5 ? "#7aaa68" : "#649758"
	}));

	const hills = Array.from({ length: 55 }, () => ({
		x: rand(60, W - 60), y: rand(50, H - 50),
		r: rand(40, 120), a: rand(0.07, 0.18)
	}));

	const forests = Array.from({ length: 450 }, () => ({
		x: rand(0, W), y: rand(0, H),
		r: rand(2, 5),
		c: Math.random() > 0.5 ? "#4a7a40" : "#3e6a36"
	}));

	// ── European rivers (coords ×0.3 of original) ──────────────────────────────
	const rivers = [
		// Rhine
		{ pts: [[282,54],[294,156],[276,258],[258,354],[246,456],[264,546],[288,636]] },
		// Danube
		{ pts: [[630,270],[750,294],[870,315],[990,336],[1110,378],[1230,432],[1350,480]] },
		// Seine
		{ pts: [[204,420],[222,480],[234,540],[246,600],[264,654]] },
		// Elbe
		{ pts: [[480,60],[498,150],[516,240],[534,330]] },
		// Vistula
		{ pts: [[810,60],[825,150],[840,246],[855,360]] }
	];

	// ── Alps mountain range (coords ×0.3 of original) ────────────────────────
	const alpsMountains = [
		{ x: 360,  y: 540,  r: 57, name: "阿尔卑斯山" },
		{ x: 432,  y: 516,  r: 50 },
		{ x: 498,  y: 498,  r: 52 },
		{ x: 564,  y: 510,  r: 47 },
		{ x: 624,  y: 528,  r: 45 },
		{ x: 678,  y: 546,  r: 42 },
		{ x: 396,  y: 588,  r: 42 },
		{ x: 468,  y: 570,  r: 39 },
		{ x: 534,  y: 558,  r: 36 },
		// Pyrenees
		{ x: 120,  y: 780,  r: 51, name: "比利牛斯山" },
		{ x: 180,  y: 768,  r: 48 },
		{ x: 240,  y: 762,  r: 43 },
		{ x: 300,  y: 774,  r: 40 },
		// Carpathians
		{ x: 750,  y: 420,  r: 44, name: "喀尔巴阡山" },
		{ x: 810,  y: 402,  r: 39 },
		{ x: 870,  y: 414,  r: 37 },
		// Scandinavian
		{ x: 420,  y: 60,   r: 45, name: "斯堪的纳维亚山" },
		{ x: 480,  y: 72,   r: 42 },
		{ x: 360,  y: 102,  r: 39 },
		// Urals (right edge)
		{ x: 1710, y: 180,  r: 47, name: "乌拉尔山" },
		{ x: 1725, y: 270,  r: 45 },
		{ x: 1716, y: 360,  r: 43 },
		{ x: 1722, y: 450,  r: 42 },
	];

	// ── European cities (coords ×0.3 of original) ──────────────────────────────────
	const cities = [
		{ x: 246,  y: 324,  name: "巴黎",       r: 32 },
		{ x: 438,  y: 294,  name: "柏林",       r: 32 },
		{ x: 570,  y: 366,  name: "维也纳",     r: 32 },
		{ x: 780,  y: 510,  name: "布达佩斯",   r: 32 },
		{ x: 960,  y: 570,  name: "基辅",       r: 34 },
		{ x: 1200, y: 390,  name: "莫斯科",     r: 38 },
		{ x: 288,  y: 150,  name: "伦敦",       r: 30 },
		{ x: 330,  y: 870,  name: "马德里",     r: 30 },
		{ x: 510,  y: 810,  name: "罗马",       r: 32 },
		{ x: 660,  y: 660,  name: "雅典",       r: 30 },
		{ x: 1080, y: 180,  name: "斯德哥尔摩", r: 30 },
		{ x: 870,  y: 150,  name: "华沙",       r: 30 },
	];

	// ── 嘉峪关 return portal (RIGHT edge) ─────────────────────────────────────
	const returnGate = {
		x: W - 80, y: H / 2,
		w: 80, h: 52,
		name: "嘉峪关（返回）",
		portalR: 50
	};

	// ════════════════════════════════════════════════════════════════════════
	// ── QUEST: 救王后格尼薇儿 ──────────────────────────────────────────────
	// ════════════════════════════════════════════════════════════════════════

	// 卡美洛城堡 — 亚瑟王所在地（地图中西部，伦敦偏南）
	const camelot = { x: 270, y: 420, r: 46, name: "卡美洛城堡" };

	// 黑暗要塞 — 莫德雷德关押王后处（地图北部）
	const darkTower = { x: 680, y: 100, r: 38, name: "黑暗要塞" };

	// 守卫士兵（初始在要塞周围）
	const mordredGuards = [
		{ x: 640, y: 80,  r: 10, hp: 3, dead: false, hitFlash: 0 },
		{ x: 720, y: 90,  r: 10, hp: 3, dead: false, hitFlash: 0 },
		{ x: 680, y: 140, r: 10, hp: 3, dead: false, hitFlash: 0 },
	];

	// 亚瑟王 NPC（跟随/移动逻辑）
	const arthur = {
		x: camelot.x + 30, y: camelot.y + 10,
		speed: 180, dir: 0, radius: 12,
		showDialog: false, dialogTimer: 0,
		walkTarget: null
	};

	// 格尼薇儿（被救后出现，待在要塞旁）
	const guinevere = {
		x: darkTower.x + 55, y: darkTower.y + 30,
		visible: false, dir: 0
	};

	// 兰斯洛特（成功后加入跟随队伍）
	let lancelot = null;

	/*
	  quest.stage:
	  0 = 未开始（靠近卡美洛触发）
	  1 = 亚瑟介绍（玩家靠近卡美洛，显示对话）
	  2 = 前往要塞（追踪提示）
	  3 = 战斗中（靠近要塞，击败守卫动画）
	  4 = 守卫已灭，格尼薇儿已救
	  5 = 亚瑟庆贺（亚瑟走来，显示对话）
	  6 = 兰斯洛特加入（任务完成）
	*/
	const quest = {
		stage: 0,
		timer: 0,
		battleTimer: 0, // 战斗动画计时
		guardsDead: false,
	};

	// UI helpers
	const qdEl       = document.getElementById("questDialog");
	const qdSpeaker  = document.getElementById("qdSpeaker");
	const qdText     = document.getElementById("qdText");
	const qtTracker  = document.getElementById("questTracker");
	const qtDesc     = document.getElementById("qtDesc");

	function showDialog(speaker, text) {
		qdSpeaker.textContent = speaker;
		qdText.textContent    = text;
		qdEl.style.display    = "block";
	}
	function hideDialog() { qdEl.style.display = "none"; }
	function setTracker(text) {
		qtTracker.style.display = text ? "block" : "none";
		qtDesc.textContent = text || "";
	}

	// ── Quest update (called every frame) ─────────────────────────────────────
	function updateQuest(dt) {
		const dpCamelot = dist(player, camelot);
		const dpTower   = dist(player, darkTower);

		quest.timer = Math.max(0, quest.timer - dt);

		switch (quest.stage) {

		// ── Stage 0: 等待玩家靠近卡美洛 ────────────────────────────────────
		case 0:
			if (dpCamelot < camelot.r + 90) {
				quest.stage = 1;
				quest.timer = 0;
				setTracker("聆听亚瑟王的委托");
			}
			break;

		// ── Stage 1: 亚瑟对话（第一句）─────────────────────────────────────
		case 1:
			showDialog("亚瑟王",
				"勇士！我的王后格尼薇儿被叛将莫德雷德掳走，关押在北方的黑暗要塞中。\n请替我救回她，卡美洛将永远铭记你的恩情！");
			if (dpCamelot > camelot.r + 180) {
				hideDialog();
				quest.stage = 2;
				setTracker("前往黑暗要塞，救出格尼薇儿");
			}
			break;

		// ── Stage 2: 玩家前往要塞 ───────────────────────────────────────────
		case 2:
			hideDialog();
			if (dpTower < darkTower.r + 120) {
				quest.stage = 3;
				quest.battleTimer = 2.2; // 战斗动画时长
				setTracker("击败莫德雷德的守卫！");
			}
			break;

		// ── Stage 3: 战斗动画 ───────────────────────────────────────────────
		case 3:
			{
				quest.battleTimer -= dt;
				// 逐渐击杀守卫
				const elapsed = 2.2 - quest.battleTimer;
				for (let i = 0; i < mordredGuards.length; i++) {
					const g = mordredGuards[i];
					if (!g.dead && elapsed > i * 0.55 + 0.3) {
						g.dead = true;
					}
					if (!g.dead) g.hitFlash = Math.sin(elapsed * 18) * 0.5 + 0.5;
				}
				showDialog("莫德雷德的守卫", "……不……不可能……！");
				if (quest.battleTimer <= 0) {
					quest.stage = 4;
					quest.timer = 1.5;
					guinevere.visible = true;
					quest.guardsDead  = true;
					setTracker("格尼薇儿已获救！返回卡美洛");
				}
			}
			break;

		// ── Stage 4: 等待，格尼薇儿显现 ────────────────────────────────────
		case 4:
			showDialog("格尼薇儿",
				"谢谢你，勇敢的战士！快带我回卡美洛……亚瑟一定在焦急等待。");
			if (quest.timer <= 0 && dpCamelot < camelot.r + 150) {
				quest.stage = 5;
				quest.timer = 0;
				// 亚瑟走向玩家
				arthur.walkTarget = { x: player.x + 30, y: player.y + 20 };
				setTracker("亚瑟王前来道谢");
			}
			break;

		// ── Stage 5: 亚瑟道谢 ───────────────────────────────────────────────
		case 5:
			{
				const dArthur = dist(arthur, { x: arthur.walkTarget?.x ?? camelot.x, y: arthur.walkTarget?.y ?? camelot.y });
				if (arthur.walkTarget) {
					if (dArthur > 8) {
						const dx = arthur.walkTarget.x - arthur.x;
						const dy = arthur.walkTarget.y - arthur.y;
						const d  = Math.hypot(dx, dy);
						arthur.x += (dx / d) * arthur.speed * dt;
						arthur.y += (dy / d) * arthur.speed * dt;
						arthur.dir = Math.atan2(dy, dx);
					} else {
						arthur.walkTarget = null;
					}
				}
				showDialog("亚瑟王",
					"壮士！你的英勇令我铭刻于心。我最信赖的骑士——兰斯洛特，\n愿以剑为礼，跟随你踏遍天地！");
				if (quest.timer <= 0 && dist(arthur, player) < 100) {
					quest.timer = 2.8;
					quest.stage = 6;
				}
			}
			break;

		// ── Stage 6: 兰斯洛特加入 ───────────────────────────────────────────
		case 6:
			if (!lancelot) {
				lancelot = {
					x: camelot.x - 20, y: camelot.y + 40,
					speed: 250, dir: 0, radius: 13,
					glowPhase: 0
				};
				showDialog("兰斯洛特",
					"主公！兰斯洛特·迪·雷克效忠于你。东方或西方，吾剑所向，所向披靡！");
				setTracker("✦ 兰斯洛特已加入队伍");
				// 更新 sessionStorage，让返回时能带走
				try {
					const saved = JSON.parse(sessionStorage.getItem('warHeroes') || '{}');
					saved.lancelot = true;
					sessionStorage.setItem('warHeroes', JSON.stringify(saved));
				} catch(e) {}
			}
			if (quest.timer <= 0) {
				hideDialog();
				quest.stage = 7; // 完成
			}
			break;

		case 7:
			hideDialog();
			break;
		}
	}

	// ── Quest drawing ──────────────────────────────────────────────────────────

	function drawCamelot() {
		const c = camelot;
		const t = performance.now() * 0.001;

		// Glow if stage 0 (未触发时提示)
		if (quest.stage <= 1) {
			const glow = 0.18 + 0.10 * Math.sin(t * 2.2);
			ctx.fillStyle = `rgba(255,230,120,${glow})`;
			ctx.beginPath(); ctx.arc(c.x, c.y, c.r + 28, 0, Math.PI * 2); ctx.fill();
		}

		// Castle body
		ctx.fillStyle = "#a09070";
		ctx.fillRect(c.x - 40, c.y - 35, 80, 62);
		ctx.fillStyle = "#c8b888";
		ctx.fillRect(c.x - 38, c.y - 33, 76, 20);

		// Towers
		const tower = (tx, ty) => {
			ctx.fillStyle = "#8a7a60";
			ctx.fillRect(tx - 10, ty - 50, 20, 50);
			ctx.fillStyle = "#b0a080";
			ctx.fillRect(tx - 10, ty - 50, 20, 12);
			// battlements
			for (let i = 0; i < 3; i++)
				ctx.fillRect(tx - 9 + i * 7, ty - 56, 5, 7);
			// pointed roof
			ctx.fillStyle = "#6a4a2a";
			ctx.beginPath();
			ctx.moveTo(tx, ty - 68); ctx.lineTo(tx - 12, ty - 50); ctx.lineTo(tx + 12, ty - 50);
			ctx.closePath(); ctx.fill();
		};
		tower(c.x - 32, c.y + 27);
		tower(c.x + 32, c.y + 27);
		tower(c.x,      c.y + 27 - 8); // center keep higher

		// Main gate arch
		ctx.fillStyle = "#2a1e10";
		ctx.beginPath();
		ctx.arc(c.x, c.y + 27, 13, Math.PI, 0);
		ctx.rect(c.x - 13, c.y + 27, 26, 8);
		ctx.fill();

		// Banner
		ctx.fillStyle = "#8844aa";
		ctx.fillRect(c.x - 2, c.y - 68, 3, 20);
		ctx.beginPath();
		ctx.moveTo(c.x + 1, c.y - 68);
		ctx.lineTo(c.x + 18, c.y - 62);
		ctx.lineTo(c.x + 1, c.y - 56);
		ctx.closePath(); ctx.fill();
		// dragon symbol on banner
		ctx.fillStyle = "#f0e040";
		ctx.font = "bold 9px serif"; ctx.textAlign = "center";
		ctx.fillText("龙", c.x + 9, c.y - 59);

		// Name
		ctx.fillStyle = "#f8e8c0";
		ctx.font = "bold 13px Microsoft YaHei";
		ctx.textAlign = "center";
		ctx.fillText(c.name, c.x, c.y - 72);
		if (quest.stage === 0) {
			ctx.fillStyle = "rgba(255,235,150,0.88)";
			ctx.font = "11px Microsoft YaHei";
			ctx.fillText("（接近查看）", c.x, c.y - 58);
		}
	}

	function drawDarkTower() {
		const t = darkTower;
		const now = performance.now() * 0.001;

		// Ominous glow if guards alive
		if (!quest.guardsDead) {
			const glow = 0.15 + 0.12 * Math.sin(now * 1.8);
			ctx.fillStyle = `rgba(160,20,20,${glow})`;
			ctx.beginPath(); ctx.arc(t.x, t.y, t.r + 40, 0, Math.PI * 2); ctx.fill();
		}

		// Base
		ctx.fillStyle = "#3a3028";
		ctx.fillRect(t.x - 28, t.y - 22, 56, 52);
		ctx.fillStyle = "#504540";
		ctx.fillRect(t.x - 26, t.y - 20, 52, 14);

		// Tower shaft
		ctx.fillStyle = "#2e2820";
		ctx.fillRect(t.x - 16, t.y - 68, 32, 68);
		ctx.fillStyle = "#443c34";
		ctx.fillRect(t.x - 14, t.y - 66, 28, 10);

		// Dark battlements
		ctx.fillStyle = "#2a2018";
		for (let i = -2; i <= 2; i++)
			ctx.fillRect(t.x + i * 9 - 3, t.y - 76, 6, 9);

		// Arrow slit window
		ctx.fillStyle = "#c84020";
		ctx.fillRect(t.x - 2, t.y - 52, 4, 10);

		// Name
		ctx.fillStyle = quest.guardsDead ? "#80b080" : "#e04040";
		ctx.font = "bold 12px Microsoft YaHei";
		ctx.textAlign = "center";
		ctx.fillText(quest.guardsDead ? "（已解放）" : t.name, t.x, t.y - 82);
		if (quest.stage === 2) {
			ctx.fillStyle = "rgba(255,100,100,0.88)";
			ctx.font = "11px Microsoft YaHei";
			ctx.fillText("⚠ 目标", t.x, t.y - 95);
		}
	}

	function drawMordredGuards() {
		for (const g of mordredGuards) {
			if (g.dead) continue;
			const flash = g.hitFlash;
			ctx.save();
			ctx.translate(g.x, g.y);
			// helm
			ctx.fillStyle = flash > 0.5 ? "#ffffff" : "#505060";
			ctx.beginPath(); ctx.arc(0, -10, 5, 0, Math.PI * 2); ctx.fill();
			// body / armor
			ctx.fillStyle = flash > 0.5 ? "#ff8888" : "#404050";
			ctx.fillRect(-4, -6, 8, 10);
			// legs
			ctx.strokeStyle = "#2a2030"; ctx.lineWidth = 2;
			ctx.beginPath();
			ctx.moveTo(-2, 4); ctx.lineTo(-2, 10);
			ctx.moveTo(2, 4);  ctx.lineTo(2, 10);
			ctx.stroke();
			// spear
			ctx.strokeStyle = "#8a6840"; ctx.lineWidth = 1.5;

	function updateLancelot(dt) {
		if (!lancelot) return;
		const dx = player.x - lancelot.x, dy = player.y - lancelot.y;
		const d  = Math.hypot(dx, dy);
		if (d > 55) {
			const step = lancelot.speed * dt;
			lancelot.x += (dx / d) * Math.min(step, d - 45);
			lancelot.y += (dy / d) * Math.min(step, d - 45);
			lancelot.x = Math.max(20, Math.min(W - 20, lancelot.x));
			lancelot.y = Math.max(20, Math.min(H - 20, lancelot.y));
			lancelot.dir = Math.atan2(dy, dx);
		}
	}

	function pushOutMountains(entity) {
		const r = entity.radius || 7;
		for (const m of alpsMountains) {
			const dx = entity.x - m.x, dy = entity.y - m.y;
			const d = Math.hypot(dx, dy);
			const minD = m.r + r;
			if (d < minD) {
				const nx = d > 0.001 ? dx / d : 1;
				const ny = d > 0.001 ? dy / d : 0;
				entity.x = m.x + nx * minD;
				entity.y = m.y + ny * minD;
			}
		}
	}

	function moveTo(entity, tx, ty, speed, dt) {
		const dx = tx - entity.x, dy = ty - entity.y;
		const d = Math.hypot(dx, dy);
		if (d < 0.001) return d;
		entity.dir = Math.atan2(dy, dx);
		const step = speed * dt;
		if (d <= step) { entity.x = tx; entity.y = ty; return d; }
		entity.x += (dx / d) * step;
		entity.y += (dy / d) * step;
		return d;
	}

	function viewToWorld(cx, cy) {
		return { x: cx + camera.x, y: cy + camera.y };
	}
	function miniToWorld(clientX, clientY) {
		const rect = mini.getBoundingClientRect();
		return {
			x: clamp((clientX - rect.left) / rect.width, 0, 1) * W,
			y: clamp((clientY - rect.top) / rect.height, 0, 1) * H
		};
	}

	function drawMap() {
		// Sky bg
		const bg = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
		bg.addColorStop(0, "#8fadc2"); bg.addColorStop(1, "#7a9fb5");
		ctx.fillStyle = bg;
		ctx.fillRect(0, 0, canvas.width, canvas.height);

		ctx.save();
		ctx.translate(-camera.x, -camera.y);

		// Grass dots
		for (const g of grassDots) {
			if (g.x < camera.x - 10 || g.x > camera.x + canvas.width + 10) continue;
			if (g.y < camera.y - 10 || g.y > camera.y + canvas.height + 10) continue;
			ctx.fillStyle = g.c;
			ctx.beginPath(); ctx.arc(g.x, g.y, g.r, 0, Math.PI * 2); ctx.fill();
		}

		// Hills
		for (const h of hills) {
			if (h.x < camera.x - h.r || h.x > camera.x + canvas.width + h.r) continue;
			if (h.y < camera.y - h.r || h.y > camera.y + canvas.height + h.r) continue;
			const grad = ctx.createRadialGradient(h.x - h.r * 0.2, h.y - h.r * 0.25, h.r * 0.2, h.x, h.y, h.r);
			grad.addColorStop(0, `rgba(175,168,128,${h.a + 0.05})`);
			grad.addColorStop(1, "rgba(120,116,82,0)");
			ctx.fillStyle = grad;
			ctx.beginPath(); ctx.arc(h.x, h.y, h.r, 0, Math.PI * 2); ctx.fill();
		}

		// Rivers
		ctx.lineCap = "round";
		for (const rv of rivers) {
			if (rv.pts.length < 2) continue;
			ctx.strokeStyle = "rgba(60,110,150,0.48)"; ctx.lineWidth = 28;
			ctx.beginPath(); ctx.moveTo(rv.pts[0][0], rv.pts[0][1]);
			for (let i = 1; i < rv.pts.length; i++) ctx.lineTo(rv.pts[i][0], rv.pts[i][1]);
			ctx.stroke();
			ctx.strokeStyle = "#5a9ec0"; ctx.lineWidth = 18;
			ctx.beginPath(); ctx.moveTo(rv.pts[0][0], rv.pts[0][1]);
			for (let i = 1; i < rv.pts.length; i++) ctx.lineTo(rv.pts[i][0], rv.pts[i][1]);
			ctx.stroke();
		}

		// Forests
		for (const f of forests) {
			if (f.x < camera.x - 12 || f.x > camera.x + canvas.width + 12) continue;
			if (f.y < camera.y - 12 || f.y > camera.y + canvas.height + 12) continue;
			ctx.fillStyle = "rgba(36,58,28,0.22)";
			ctx.beginPath(); ctx.arc(f.x + 2, f.y + 3, f.r * 1.1, 0, Math.PI * 2); ctx.fill();
			ctx.fillStyle = f.c;
			ctx.beginPath(); ctx.arc(f.x, f.y, f.r, 0, Math.PI * 2); ctx.fill();
		}

		// Mountains
		for (const m of alpsMountains) {
			if (m.x + m.r < camera.x || m.x - m.r > camera.x + canvas.width) continue;
			if (m.y + m.r < camera.y || m.y - m.r > camera.y + canvas.height) continue;
			drawMountain(ctx, m, !!m.name);
		}

		// Cities
		for (const c of cities) {
			if (c.x + 80 < camera.x || c.x - 80 > camera.x + canvas.width) continue;
			if (c.y + 80 < camera.y || c.y - 80 > camera.y + canvas.height) continue;
			drawCity(c);
		}

		// ── Quest objects ──────────────────────────────────────────────────
		drawCamelot();
		drawDarkTower();
		drawMordredGuards();
		drawGuinevere();
		drawArthur();
		drawLancelot();

		// Return gate
		drawReturnGate();

		// Player
		drawPlayer();

		// Companion
		drawCompanion();

		// Click marker
		if (clickMarker.life > 0) {
			const a = clickMarker.life;
			ctx.strokeStyle = `rgba(255,243,171,${a})`; ctx.lineWidth = 2;
			ctx.beginPath();
			ctx.arc(clickMarker.x, clickMarker.y, 12 + (1 - a) * 40, 0, Math.PI * 2);
			ctx.stroke();
		}

		ctx.restore();

		// HUD title
		ctx.fillStyle = "rgba(0,0,0,0.38)";
		ctx.fillRect(canvas.width * 0.5 - 180, 10, 360, 26);
		ctx.fillStyle = "#e8d8b0";
		ctx.font = "600 14px Microsoft YaHei";
		ctx.textAlign = "center";
		ctx.fillText("⚔ 西方大陆 — 欧洲战场  |  接近嘉峪关可返回", canvas.width * 0.5, 28);
	}

	// Europe continent outline (world coords 3600×2400, clockwise from NW)
	const europeOutline = [
		[288,0],[330,18],[390,9],[450,0],[510,24],[570,9],[630,0],
		[750,0],[840,54],[780,108],[690,81],[600,108],
		[870,135],[1020,54],[1200,27],[1380,81],
		[1620,108],[1740,270],[1770,600],[1740,900],
		[1440,990],[1350,900],[1260,960],
		[1110,1050],[1020,1140],[930,1200],[840,1140],[780,1050],
		[690,1020],[630,1110],[600,1200],[540,1140],
		[510,1020],[420,1050],[330,990],[240,900],
		[180,810],[120,690],[90,570],[120,450],
		[150,420],[240,360],[210,300],[180,240],
		[240,210],[300,150],[270,90],[240,45],[288,0]
	];

	function drawMini() {
		miniCtx.clearRect(0, 0, mini.width, mini.height);
		const sx = mini.width / W, sy = mini.height / H;

		// Ocean background
		miniCtx.fillStyle = "#2e5c80";
		miniCtx.fillRect(0, 0, mini.width, mini.height);

		// Europe continent silhouette
		miniCtx.fillStyle = "#4a7a48";
		miniCtx.beginPath();
		miniCtx.moveTo(europeOutline[0][0] * sx, europeOutline[0][1] * sy);
		for (let i = 1; i < europeOutline.length; i++)
			miniCtx.lineTo(europeOutline[i][0] * sx, europeOutline[i][1] * sy);
		miniCtx.closePath();
		miniCtx.fill();
		// Coastline stroke
		miniCtx.strokeStyle = "rgba(90,150,200,0.5)";
		miniCtx.lineWidth = 0.8;
		miniCtx.stroke();

		// Rivers on minimap
		miniCtx.strokeStyle = "rgba(74,142,178,0.75)"; miniCtx.lineWidth = 1.2;
		for (const rv of rivers) {
			if (rv.pts.length < 2) continue;
			miniCtx.beginPath(); miniCtx.moveTo(rv.pts[0][0] * sx, rv.pts[0][1] * sy);
			for (let i = 1; i < rv.pts.length; i++) miniCtx.lineTo(rv.pts[i][0] * sx, rv.pts[i][1] * sy);
			miniCtx.stroke();
		}

		// Mountains
		miniCtx.fillStyle = "rgba(168,152,122,0.82)";
		for (const m of alpsMountains) {
			miniCtx.beginPath(); miniCtx.arc(m.x * sx, m.y * sy, Math.max(1.5, m.r * sx * 0.9), 0, Math.PI * 2); miniCtx.fill();
		}

		// Cities
		for (const c of cities) {
			miniCtx.fillStyle = "#e8d080";
			miniCtx.beginPath(); miniCtx.arc(c.x * sx, c.y * sy, 2, 0, Math.PI * 2); miniCtx.fill();
		}

		// Return gate (right edge)
		miniCtx.fillStyle = "#d4c07a";
		miniCtx.fillRect(returnGate.x * sx - 3, returnGate.y * sy - 2, 6, 4);

		// Quest: camelot marker
		miniCtx.fillStyle = quest.stage <= 1 ? "#f0d060" : "#8050c0";
		miniCtx.beginPath(); miniCtx.arc(camelot.x * sx, camelot.y * sy, 3, 0, Math.PI * 2); miniCtx.fill();
		// Quest: dark tower marker
		if (!quest.guardsDead) {
			miniCtx.fillStyle = "#e03030";
			miniCtx.beginPath(); miniCtx.arc(darkTower.x * sx, darkTower.y * sy, 3, 0, Math.PI * 2); miniCtx.fill();
		}
		// Lancelot on minimap
		if (lancelot) {
			miniCtx.fillStyle = "#a0c8ff";
			miniCtx.beginPath(); miniCtx.arc(lancelot.x * sx, lancelot.y * sy, 2.5, 0, Math.PI * 2); miniCtx.fill();
		}

		// Player dot
		miniCtx.fillStyle = "#f3d26b";
		miniCtx.beginPath(); miniCtx.arc(player.x * sx, player.y * sy, 3, 0, Math.PI * 2); miniCtx.fill();

		// Viewport rect
		miniCtx.strokeStyle = "rgba(255,244,200,0.85)"; miniCtx.lineWidth = 1;
		miniCtx.strokeRect(camera.x * sx, camera.y * sy, canvas.width * sx, canvas.height * sy);
	}

	function resize() {
		canvas.width = window.innerWidth; canvas.height = window.innerHeight;
		const compact = window.matchMedia("(max-width: 900px),(pointer: coarse)").matches;
		mini.width = compact ? 176 : 240; mini.height = compact ? 118 : 160;
		camera.x = clamp(camera.x, 0, W - canvas.width);
		camera.y = clamp(camera.y, 0, H - canvas.height);
	}
	window.addEventListener("resize", resize);
	resize();

	// ── Input ─────────────────────────────────────────────────────────────────
	window.addEventListener("keydown", e => {
		const k = e.key.toLowerCase();
		if (k === "w" || e.key === "ArrowUp")    { moveInput.up    = true; e.preventDefault(); }
		if (k === "s" || e.key === "ArrowDown")  { moveInput.down  = true; e.preventDefault(); }
		if (k === "a" || e.key === "ArrowLeft")  { moveInput.left  = true; e.preventDefault(); }
		if (k === "d" || e.key === "ArrowRight") { moveInput.right = true; e.preventDefault(); }
	});
	window.addEventListener("keyup", e => {
		const k = e.key.toLowerCase();
		if (k === "w" || e.key === "ArrowUp")    moveInput.up    = false;
		if (k === "s" || e.key === "ArrowDown")  moveInput.down  = false;
		if (k === "a" || e.key === "ArrowLeft")  moveInput.left  = false;
		if (k === "d" || e.key === "ArrowRight") moveInput.right = false;
	});

	function issueMove(wx, wy) {
		player.target = { x: clamp(wx, 0, W), y: clamp(wy, 0, H) };
		clickMarker.x = player.target.x; clickMarker.y = player.target.y;
		clickMarker.life = 1;
	}

	canvas.addEventListener("pointerdown", e => {
		if (e.pointerType === "mouse" && e.button !== 0) return;
		const p = viewToWorld(e.clientX, e.clientY);
		issueMove(p.x, p.y);
	});

	let miniDrag = false;
	mini.addEventListener("pointerdown", e => {
		miniDrag = true;
		if (mini.setPointerCapture) mini.setPointerCapture(e.pointerId);
		e.preventDefault();
		const p = miniToWorld(e.clientX, e.clientY);
		issueMove(p.x, p.y);
	}, { passive: false });
	mini.addEventListener("pointermove", e => {
		if (!miniDrag) return;
		e.preventDefault();
		const p = miniToWorld(e.clientX, e.clientY);
		issueMove(p.x, p.y);
	}, { passive: false });
	mini.addEventListener("pointerup", () => miniDrag = false);

	// ── Game loop ─────────────────────────────────────────────────────────────
	let last = performance.now();
	function loop(now) {
		const dt = Math.min(0.033, (now - last) / 1000);
		last = now;

		// Player movement
		const mx = (moveInput.right ? 1 : 0) - (moveInput.left ? 1 : 0);
		const my = (moveInput.down  ? 1 : 0) - (moveInput.up   ? 1 : 0);
		if (mx !== 0 || my !== 0) {
			const nd = Math.hypot(mx, my) || 1;
			player.x += (mx / nd) * player.speed * dt;
			player.y += (my / nd) * player.speed * dt;
			player.dir = Math.atan2(my, mx);
			player.target.x = player.x; player.target.y = player.y;
		} else {
			moveTo(player, player.target.x, player.target.y, player.speed, dt);
		}
		player.x = clamp(player.x, 30, W - 30);
		player.y = clamp(player.y, 30, H - 30);
		pushOutMountains(player);

		// Portal: return gate
		if (!returnGate._triggered && dist(player, returnGate) < returnGate.portalR - 10) {
			returnGate._triggered = true;
			try {
				const saved = JSON.parse(sessionStorage.getItem('warHeroes') || '{}');
				saved.lancelot = !!(lancelot);
				sessionStorage.setItem('warHeroes', JSON.stringify(saved));
			} catch(e) {}
			window.location.href = "index.html";
		}

		// Companion
		updateCompanion(dt);

		// Quest
		updateQuest(dt);

		// Lancelot follow
		updateLancelot(dt);

		// Camera
		const tx = player.x - canvas.width / 2;
		const ty = player.y - canvas.height / 2;
		const smooth = 1 - Math.pow(0.001, dt);
		camera.x += (tx - camera.x) * smooth;
		camera.y += (ty - camera.y) * smooth;
		camera.x = clamp(camera.x, 0, W - canvas.width);
		camera.y = clamp(camera.y, 0, H - canvas.height);

		clickMarker.life = Math.max(0, clickMarker.life - dt * 1.7);

		drawMap();
		drawMini();

		requestAnimationFrame(loop);
	}
	requestAnimationFrame(loop);
	</script>
</body>
